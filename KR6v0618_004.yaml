body:
  text: 南傳大藏經於漢譯教法中的地位吳老擇居士説到高雄菩妙法師發起進行南傳大藏經的翻譯這是中國佛教界的一件大事菩妙法師的大心與卓見值得隨喜讚歎南傳大藏經是巴利語三藏的日文譯本巴利語是從恆河流域而向西南傳布的優禪尼一帶佛法所使用的當地方言阿育王西元前三世紀時開始傳入錫蘭今名斯里蘭卡展轉傳誦西元前一世紀末為了聖教的保存才全部記録下來但流傳久了有些已經轉譯為錫蘭文西元五世紀初摩竭陀的覺音三藏南來錫蘭深究三藏與各家注疏覺音不但為經律論作釋著佛法的綱要書清淨道論還將三藏聖典全部以巴利語寫定巴利語三藏從此確定的流傳下來在現存的佛教聖典中巴利語三藏可説是最古老的了現存的混合梵語聖典大抵是西元七世紀起寫下的釋尊本著人類平等的原則對於佛説的教法是聽隨國俗言音所解學習佛經的所以印度佛教界所用的語言傳説有四大類巴利語就是其中的一種但在現在巴利語是從印度流傳下來的代表初期的佛法所以受到近代佛學界的重視巴利語三藏是上座部的上座部有分別説與説一切有二系分別説又分出化地法藏飲光赤銅鍱四部巴利語三藏屬於分別説中的赤銅鍱部世親的成業論就這樣的稱呼他所以錫蘭佛教界自稱上座部也自稱分別説者或赤銅鍱部這雖然是部派的但所傳經律應用印度中古時期的方言到底去佛世不遠便於探求印度初期佛法的實態把握佛法的特質成為佛弟子的信行在佛法的研究中可説是太重要了巴利語三藏中律藏近於同一系的法藏部的四分律經藏分五部前四部與四阿含相當第五小部其他部派是稱為雜藏的小部共十五種有些成立要遲一些語音也小有差別小部中的佛譬喻譬喻的一分説到了十方佛的來集佛種姓與所行藏説菩薩的波羅蜜多行本生共五四七則從傳説的事迹中顯出了菩薩的德行與風格有的部派依雜藏而別立菩薩藏可以想見其間的關係了論藏有七部六部是阿毗達磨第七論事傳説是阿育王時目犍連子帝須所造有些內容是後起的評破其他部派的異義集巴利語的論義有七部而説一切有部的一身六足也是七部赤銅鍱部傳五師相承有部也有五師相承説這應有古代共同的傳説吧巴利語三藏的譯為華文是非常有意義的一擴大華文佛教的內容華文佛教是以中期大乘佛法為主前有初期佛法的三藏下通後期祕密大乘佛法的教典初期三藏主要從北道經西域而傳入的從南方海道來的在宋齊梁間西元四二四五一八年有師子國比丘尼來依律授比丘尼戒二部得戒廣州方面譯出五百本生經他毗利上座律兩部都佚失了建康譯出善見毗婆沙律解脫道論覺音的清淨道論是依此而修正充實的這些都從巴利語佛教中來但沒有能受到當時佛教界的重視現在全部翻譯過來足以彌補這方面的偏缺二從比較研究而正確理解佛法我國過去所譯的初期佛法三藏屬於衆多部派部帙繁多但沒有巴利語的三藏如譯出而作公正的比較研究那一定有更好的理解如律藏過去譯有大衆部的摩訶僧祇律化地部的五分律法藏部的四分律説一切有部的十誦律與根本説一切有部律五部廣律還有飲光部的解脫戒經正量部的律論等以過去所譯的與赤銅鍱部律作比較在組織方面可以理解律部的成立過程內容方面可以發現釋尊的依法攝僧制立僧伽律制的原則與實施更能從部派分化理解適應不同地區民情而有所差別三探求佛法與大乘佛法間的通道佛法本來是一味的因根機傳承等而有不同的開展我國以大乘佛法為主一向以巴利語三藏等佛法為小乘然深一層探究大乘甚深義本於雜阿含相應部等四部阿含而十方世界有佛菩薩波羅蜜多廣大行是從小部雜藏中來的我國佛教界應依巴利語三藏的漢譯本探求佛法與大乘佛法的通道互相尊重現在佛教已進入世界性的時代了巴利語三藏傳入錫蘭又傳到緬泰高棉等地區巴利語有語音而沒有書寫的文字所以各地都用當地的字母寫下巴利語三藏近代又有英文緬文日文等譯本南傳大藏經就是日文的譯本從昭和十年到十六年西元一九三五四一年由高楠博士紀念會譯編刊行的四十多年前我國曾發起普慧大藏經編有依南傳大藏經而分別譯出的部分抗戰勝利太虛大師東還提議改名為民國大藏經依日文翻譯部分主張依錫蘭巴利語本參考英譯本而加以訂正由於政情的急劇變化不能實現全譯與刊行對中國佛教來説真是一大憾事現在菩妙法師發起來翻譯印行真是太好了我一心祝願願譯藏的完善而能順利的完成雜阿含經之研究頁一九五一九六
