body:
  text: 我有明珠一顆讀後一讀現代禪雜志知道李元松新著我有明珠一顆這本書的第一章目録有子題印順法師間接影響禪的式微一項式微是衰落的意思中國人所說的禪宋末以來就逐漸衰落到近代可說式微極了這怎麼能說我間接影響了禪的衰落呢託人買了一本看看到底是怎樣說的在第一章中先說明今人難現證道果的原因是缺乏理想的修行環境中了三藏十二部的毒惡知識太多了然後說到印順法師間接影響禪的式微內容是說由於印順法師對台灣佛教的思想具有最大的影響力許多佛教徒及學者都可追溯係受其影響才對禪者存有排拒的心態這對現代禪的發揚無疑是一大傷害二五頁這是障礙了現代禪的發揚怎麼標題為影響禪的式微衰落可說文不對題如為了讓一般讀者將禪的衰落責任誤會而歸咎於我那現代禪者的文字可說相當的善巧了我不知道我的作品是否真的影響了現代禪的發揚如真的有些影響我覺得作者也就是現代禪的創立者應該負起相當的責任如我有明珠一顆二三頁說我以前也曾從他所著的妙雲集中獲得修行的啓示這怕也會影響他那顆明珠吧他在與現代人論現代禪二集一再的說我鼓勵他們讀三類經書阿含經般若系統妙雲集這是一小部大藏經三一頁印順法師的妙雲集功德無量他提倡人間佛教理性的佛教使知識份子加入佛門而令整個佛教有所改變四頁佛教的新氣象正在醞釀之中特別要讚歎的是印順法師事實上若不是他所著的妙雲集為整個中國佛教理出一個新方向替重視理性的現代佛教澄清許多深奧精闢的理趣我認為佛教這股新氣象至少要遲上二十年五五頁我平凡的自己缺少想做祖師精神面對衰落不堪的中國佛教只是從經論中提出些純正而又認為契合現代時機的佛法介紹給佛教界如在大地撒種也要看當地的土質等不是主觀願望所能決定的所以我只是提出些經論的見解寫出刊行沒有什麼成果的預期也就不會自我吹噓設法來擴大影響想不到竟得到了作者的認同不但自己從妙雲集獲得修行的啓示還鼓勵他們讀妙雲集讚歎妙雲集的功德無量認為如沒有妙雲集中國佛教這股新氣象至少要遲上二十年那不是如沒有妙雲集現在也還沒有現代禪嗎對我的妙雲集這樣的鼓勵學衆讚歎稱揚到頭來竟影響了作者現代禪的發揚所以如真的對現代禪有些障礙那作者應自我反省負起應負的責任與現代人論現代禪二集有一篇提到了我並表示不同的意見如三三三四頁說如果將他們指禪宗類比為真常唯心系我還沒有什麼意見但將他們歸類為梵我合一我就認為是仁智之見了妙雲集中聞思部分談的很多但修慧及如何從與定心相應的般若慧頓入無漏慧談的較少他的批評從某個層次看很有道理但從定心智慧到無漏慧他本身談的少再想去批評禪宗我認為發揮的不多按這一段共八十二字文字寫得相當的含蓄他對我的批評明顯的說我對定心智慧到無漏慧談的少也就是知道得不多所以也不用再想去批評禪了這篇文字又被編入經驗主義的現代禪三六三七頁末了卻附上一段按語李元松按七十九年五月重新讀妙雲集深深為以上所講的八十二個字感到慚愧事實上印順導師四十年前在妙雲集中討論有關修慧與無漏慧的開示可說俯拾皆是自己當時的談話純根據早先時妙雲集的印象以致有以上八十二個字的膚淺之語在此謹先向導師的座處頂禮懺悔並請讀者諒解這一錯誤的訊息這篇文字本是不同意我對禪宗的評論而講的不知為了什麼又附上這段按語並表示向我懺悔這麼一來那我對禪宗的評論應該是可以而說得不太離譜了這不等於為我的妙雲集宣傳會引起有礙現代禪的發揚嗎在最近出版的我有明珠一顆又回到按語以前八十二個字的立場如二四頁說妙雲集中將禪宗列為真常唯心系並認為禪宗含有外道思想我認為這是需要再探究的當然認為禪宗帶有外道成份的人並不是只有印順法師禪宗祖師所以引用某類經文甚至引用道家的經文不能因此而歸類為梵我合一的外道年紀大了幾歲我的記憶力也多少衰退但在我的記憶裡並沒有將禪宗歸類為梵我合一的外道作者本是贊同妙雲集而一再稱揚的為了現代禪的發揚不能同意我的論述但又同意了而向我懺悔現在又不同意連認為可以的真常唯心也要再探究了否定又肯定肯定又否定現代禪者的隨心所欲確是使人感到為難的二現代禪成立不久我沒有多少了解所以也不想多作評論現在只從我有明珠一顆中所說阿含般若禪皆為趣入涅槃的方便表示我所知道的意義阿含是趣向涅槃的解脫道解脫與涅槃是印度固有的術語所以說解脫涅槃並不等於佛法說解脫涅槃的外道在釋迦佛時也是不少的要正確了解釋迦佛所說的解脫而趣入涅槃的正道才不致漂流佛門以外釋尊在初轉法輪時先說遠離欲樂遠離苦行二邊的中道中道就是正道正道以正見慧為先導如實知見四諦為什麼衆生生而又死死而又生無可奈何的生死不已苦苦的主要原因集是我在認知上是我見我所見在染著上是我愛我所愛佛證知我是虛妄錯亂而可以勘破的所以說一切法從因緣生因緣生所以是無常的無常故苦苦故無我無我所突破了生死大苦的癥結才能趣向涅槃解脫滅佛說見道見四諦得初果的得法眼淨也說三結斷三結是薩迦耶見有身見即我見疑戒禁取三結煩惱斷與得無漏智如光明現而黑暗消失一樣如不永斷見惑主要即三結那裡有淨法眼可得經論中立三解脫門無常苦故無願解脫無我故空解脫涅槃故無相解脫其實三解脫門同緣一實所以被稱為無二解脫之門一般泛說八萬法門那只是初方便接引如進入修證那只有這不二解脫門也就因此說諸行無常諸法無我涅槃寂靜為三法印以印定佛法的如實性般若系經典及初期大乘大論師龍樹菩薩的中論等也受到現代禪的尊重般若經是通教三乘但為菩薩約通教三乘說一切法空即諸法無我二空也名二無我所以論修慧的契入現證與阿含相通如般若經說二乘的若忍若智皆是菩薩無生法忍十地經說同得無分別法性龍樹的大智度論明確的說三法印與一法印無二中論雖廣說一切法空而觀法品仍以觀無我我所而證入在這一意義上般若的解脫道是與阿含相同的但現代禪似乎沒有注意到般若的但屬菩薩這不妨從阿含說起釋尊時代的教化以聲聞弟子證阿羅漢果為主佛也被稱為阿羅漢但佛到底並不等於一般阿羅漢所以稱佛為如來應供阿羅漢正遍知正等覺三名更稱佛為如來佛十號阿羅漢是正覺者佛是無上的正等覺者所以說到功德阿羅漢是五分法身六通而佛是十力四無所畏十八不共法等這些是阿含所明示的到了部派分化雖有不同意見而佛是一切智者勝過聲聞的阿羅漢仍為佛教界所公認佛為什麼會勝過阿羅漢由於佛在過去生中歷劫修菩薩大行才能圓成阿耨多羅三藐三菩提無上等正覺菩薩修行的大行難行佛教界傳有衆多的菩薩故事名為本生菩薩的修行以大悲心為本重於利濟救度衆生不是聲聞行者那樣的但求自己解脫佛因地菩薩所修行的是六或十波羅蜜四攝都是以布施為第一所以成佛的因行是菩薩的菩提道攝得解脫道而不是以解脫道為先的約解脫涅槃說是三乘共的但聲聞如毛孔空佛菩薩如太虛空可說質同而量異古人譬喻為三獸渡河渡分深淺金剛經說一切賢聖皆以無為法而有差別也就是這一意義現代禪者尊重般若中觀卻不知大乘般若法門的宗要說解脫道而不說菩提道知觀行而不知廣大行知通三乘而不知但屬菩薩這所以雖標揭般若系統的名目卻遠離大乘般若法門的實際意義與現代人論現代禪三一三二頁有這樣的一段話佛法在人間他對人世有益這點是毫無疑問的只是我們在抉擇何者是了義佛法時是否應該將較可利益人類對衆生較有利之一項列入判斷呢事實上有些人之所以主張初期大乘之優越性多少便是建立在此種觀念上進言之他們認為初期大乘不但發揮阿含深義並且對人類有情懷有一分最深摯的愛心對世間表現出最積極最活潑的態度故而他是佛陀本懷了義佛教對此筆者稍有異義我以為解脫道最重要那是屬於第二義的說有些人他們沒有明白的說到我但我確是這樣說的現代禪重於修改過的解脫道不重菩薩的菩提道事實上也不用談般若了般若系統是大乘經主要是說菩薩行的論法義經說一切法空一切法不生不滅世間即涅槃論發心修行十善菩薩發大心菩提心上求佛道下度衆生正是從人乘正法而進入大乘菩提心從大悲心世俗稱為愛心而來所以說菩薩但從大悲生經說菩薩發心修行是依菩提心大悲心般若慧無所得為方便而修六度等大行菩薩不是只為自己解脫而是重慈悲利濟衆生的從初發心到成佛般若經立菩薩十地次第華嚴經更有十住十行十回向十地等位次菩薩決不是急求證入當下成佛的所以菩薩在修行過程中如悲願還不足那在修空無我慧時要記著今是學時非是證時以免急求解脫而落入聲聞果證菩薩如證入聲聞果對成佛來說是被貶斥為焦芽敗種的要修到悲慧深徹才契入無生忍但還是忍而不證實際利益衆生的事還多呢佛就是這樣的歷劫廣修菩薩大行利他為先從利他中完成自利這所以佛是福慧的究竟圓滿者現代禪自己說是佛教還成立菩薩僧團那應該行菩薩行以成佛為理想的可是不說發菩提心長養大悲心反而輕視菩薩的菩提道為第二義這是違反般若系大乘經的我有明珠一顆引述我的話一七六頁說菩薩道的本意是人乘菩薩行以五戒十善的凡夫身來力行菩薩道相信以此上求下化的發心未來世必能再轉生為人繼續修行他不是勘尋出處逐字引用而是記憶所及的所以大體相近用字可能會引起誤解不妨再解說一下人乘菩薩行是以人乘善行戒為基而發菩提心的隨能力所及而努力於慈悲智慧及利益衆生的菩薩行初發大心者的修行不能誤解為菩薩道的本意來世必能繼續修行就是歷劫在生死中修行由初發心而到久發心久發心而進入不退轉由不退轉而成佛依小品般若經四位略說菩薩越修功德越大利濟衆生的功能也越大菩薩道是不限於初心的不過弘揚菩薩道總要從人的初發心說起我這樣說他批評為大乘佛教的本意果真是人乘的菩薩行那是印順法師個人的看法而已初發心學菩薩十善菩薩發大心十信位我不覺得是個人的意見相反的推崇般若系統大乘經卻不說發菩提心大悲心竟以大悲利生的菩提道為第二義才是現代禪老師李元松的個人看法而已他也不同意我說禪宗是小乘急證精神的復活他自己卻我有明珠一顆一七三一七七頁說臨濟與德山都是禪門的天王巨星死在他們手下證得阿羅漢的不知凡幾原來禪門所證得的是阿羅漢這不是聲聞乘小乘的聖果嗎這是現代禪的新解說在古代禪師們怕都說是見性成佛的我曾說禪宗是小乘急證精神之復活現代禪批評說那是印順法師個人的看法不過事實確是如此禪師們是證阿羅漢的那就與我見解相同了禪這裡說的是印度傳來而中國化了的禪菩提達磨傳來的是如來禪以楞伽經印心楞伽是唯識說而又有如來藏思想的唐初道信在黃梅營宇立象在楞伽禪的基礎上引入文殊所說摩訶般若波羅蜜經這部傳出較遲的般若經說到如來界及我界即不二相明顯的說到了如來界藏道信引用這部經的一行三昧這才長坐不臥的弘忍重念佛淨心看心看淨的方便普及的發達起來慧能在文殊所說摩訶般若波羅蜜中又融攝了大般涅槃經的定慧等故明見佛性見性成佛成為中國禪宗最受尊重的六祖從達摩到慧能還是不離經教的由於大唐開始衰亂五代的衰亂更甚北方的義學衰落禪者也日漸中國化一則由於以心傳心不立文字的傳說引發離經教而自成一套的禪語如祖師西來意本分事本來人本來面目無位真人這個那個白牯牛等再則見性成佛到底性是什麼性在何處點出性在作用而引人去悟入的如傳燈録卷三大正五一二一八中說王曰性在何處答曰性在作用王曰是何作用波羅提即說偈曰在胎為身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂佛性在作用所以禪師們的指示不但說是心也直指說是汝更多在見聞動作中去啓示如揚眉瞬目擎拳豎拂叉手棒打腳踢推倒禪床踢翻淨瓶撥虛空等外還有斬蛇殺貓放火斫手指打落水去等這樣的接引學人為中國禪風最特出的雖然第一義不落言詮不是語文語表所能表達的也不是身體動作身表所能表達的但如當機善用方便身體的動作使學人不知所措受怖受驚而內心極度震動也有能使人進入宗教經驗的可能不過身表的任何動作語表的大喝大笑也相同在受教者來說這是不明確的可能會引起誤會所以如泛濫起來不免有皮匠禪等笑話了西元三世紀起印度佛教界傳出不少的真常經典主要是說衆生本有如來界如來藏我佛性這些是異名同實等真我與自性清淨心真心說合流由於四世紀起虛妄唯識系流行真我真心攝受唯識學而成真常唯心系禪宗是屬於這一系的在真常大乘經中還是說到菩薩六或十度十地等而禪宗雖自稱最上乘直顯心性即心即佛卻棄菩提道而不論這所以太虛大師有說大乘教修小乘行的慨歎現代禪少說真心真我說初期大乘的緣起性空其實印度經論中的緣起性空與唯識者的遍計所執性空如來藏佛性我等說者的雜染法空而如來藏稱性功德不空不但是義理的體系不同還都依自宗而評他說為不了義中國佛教長於融通禪者初期採用了文殊所說摩訶般若波羅蜜經摩訶般若波羅蜜為講說壇經的主體弘忍以來漸取簡短的金剛般若波羅蜜經到神會更適應當時而專說金剛般若波羅蜜經了而同時也引用大乘起信論所以禪宗的內容決不是以緣起性空說為主的如慧能以下南嶽門下是直顯心性青原以下受江東牛頭禪的影響而被稱為泯絶無寄然泯絶無寄也還是無心即真心的所以論禪宗的思想與空有關而核心到底是真心或真我系的三我有明珠一顆一四頁這樣說現代禪的標幟好像是一個人在那兒打坐其實是熊熊烈火中的一朵蓮花蓮花代表的是涅槃境界火則是代表情欲意思是七情六欲中的佛心現代禪為什麼違反釋迦佛所說遠離樂欲與苦行二邊的中道正行而在現代禪的道次第中開始就說已有的情欲可以盡情發揮呢從這一標幟的解說中可以大概的了解七情六欲是中國術語大致與煩惱相當大乘經中說煩惱即菩提等維摩詰經說煩惱泥中乃有衆生起佛法耳正如卑濕淤泥乃能生蓮華這是什麼意義龍樹的中論這樣說涅槃之實際及與世間際如是二際者無毫釐差別這是經說世間即涅槃的解說約實際說世間與涅槃無二無別實際是真如空性等異名然約依緣起滅說世間雜染生死法如幻化涅槃也如幻化雖一切無自性卻是不能說無別的否則人人是佛根本不需要佛教更不用說禪與修證了龍樹大智度論說癡實相即是智慧取著智慧者即是癡諸法如入法性中無有別異愚癡實相即是智慧若分別著此智慧即是愚癡如是愚癡智慧有何別異這就是煩惱即菩提的解說龍樹的解說是依思益梵天所問經的經明五力說法說愚癡與般若不二是隨宜說不是了義說卑濕淤泥中生蓮華應如大般涅槃經後分說一切無明煩惱等結悉是佛性何以故佛性因故此是因中說果從無明行及諸煩惱得有漏善五陰是名佛性從善五陰乃至獲得阿耨多羅三藐三菩提禪者所推重的金剛經也說是法平等無有高下以行一切善法故則得阿耨多羅三藐三菩提淤泥中生蓮華是從淤泥中透出高出水面到蓮華開時不但出淤泥而不染還微妙香潔呢總不能微妙香潔的蓮華與卑濕淤泥和合不二吧不過大乘經的隨宜說法在生死衆生心中適應印度神教的復興時節可能會有不同的解說如後期的祕密佛教與印度教性力派相同從男女交合中去修行成就現代禪成立不久從這一標幟情欲中的佛心去看可能還有現代密呢也許現代禪高階層人物早已禪密雙修只是在成立不久階段還沒有明朗的宣揚而已
