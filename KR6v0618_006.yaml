body:
  text: 印順法師對大乘起源的思考讀後一現代禪二十期有溫金柯君的印順法師對大乘起源的思考一文他在我的著作中發現了有趣的現象那就是他對大乘佛教的起源的詮釋尤其是大乘佛教的起源與在家衆的關係這個問題出現了好幾種講法甚至可以說是互不相容的講法於是他依時間的先後先舉民國三十一年寫的印度之佛教大乘思想之闡發出家僧中以大衆及分別說者之功績為多在家信衆不可磨滅之功績尤多次舉同年寫的青年之佛教青年佛教運動小史覺得稍有不同三十二年寫的大乘是佛說論與印度之佛教的講法一致三十八年的佛法概論提出旁流與主流的說法而說新的社會淨土中有菩薩僧大多是沒有出家僧的佛的真身是現在家相的從這一段時間開始印順法師明確的形成了大乘佛教是以在家佛教為主的認知四十年講的勝鬘經講記與佛法概論相同四十一年所講的從依機設教來說明人間佛教又作了一種解釋否定大乘佛教出於出家衆而肯定的認為大乘佛法起源於在家人四十七年在台灣講的修身之道也還繼續著相同的看法但在六十九年出版的初期大乘佛教之起源與開展完全推翻了佛法概論以來上述的結論這使他感到有趣佛法概論以來的說明想像的成分相當的多相反的最早提出來的印度之佛教的解釋及證據反而是比較確切的也更接近印順法師在初期大乘佛教之起源與開展一書的看法這樣的歷史命題的解釋竟會愈來愈離開確切的證據而一度奔逸於想像式的說明到底為了什麼他以為晚年竟不說毗盧遮那是佛的真身反而代以人間佛教的人菩薩行以釋尊時代的佛法為本認為印順法師早期的大乘觀和後期的大乘觀有一種性質上的差異也就是思想矛盾和轉變了二正如聖嚴與宏印法師所說我的著作太多使讀者不容易認清我的思想溫君相當讚賞我最是想像而沒有實據的雖然這種想像滿合理的在家為中心的佛法為什麼不一直想像下去滿足溫君的願望要在初期大乘佛教之起源與開展中說初期大乘的傳宏者多數是比丘也有少數的在家人呢說我早期的大乘觀和後期的大乘觀有一種性質上的差異但這是不對的他自己也說三十一年寫作的印度之佛教更接近印順法師在六十九年出版的初期大乘佛教之起源與開展一書的看法關於大乘佛教的起源我在印度佛教史的觀點是前後一致的佛法概論等似乎不同那不是佛教史是通俗的論述但也不是隨意論述是依大乘經而這樣說的下面再為解說從前閲藏時我讀到阿含經與各部廣律有現實人間的親切感真實感而不如部分大乘經表現於信仰與理想之中遊心法海六十年九頁也許大乘經有信仰與理想的特性使我的解說也成為想像式吧在著作界如有長達五十年的寫作歷程後來的有些修正補充或提出不同的意見原是極平常的事但我覺得民國二十七年到四川四十一年來台灣這中間的十四年是思想確定時期修正補充是不可免的而為學的立場與觀念一直到現在是沒有什麼不同的印度之佛教自序三頁說自爾以來為學之方針日定深信佛教於長期之發展中必有以流變而失真者探其宗本明其流變抉擇而洗鍊之願自治印度佛教始我的研究印度佛教史是想從歷史的流變中抉擇而洗鍊之提供契理契機的佛法以有益於佛教與社會四十一年所講的人間佛教要略說人間佛教為古代佛教所本有的現在不過將他的重要理論綜合而抽繹出來所以不是創新而是將固有的刮垢磨光佛在人間九九頁契理契機之人間佛教二頁也說我不是復古的也不是創新的是主張不違反佛法的本質從適應現實中振興純正的佛法秉持這一理念印度之佛教自序提出了能立本於根本佛教之淳朴宏闡中期佛教之行解梵天化之機應慎攝取後期佛教之確當者庶足以復興佛教而暢佛之本懷也歟七頁七十八年寫的契理契機之人間佛教第六節就依此而作解說這雖沒有提到出家與在家但我的思想原則是沒有什麼差異的該文所提出的初期大乘佛教之起源與開展對大乘起源與居士關係之詮釋確實是改口了首先要略加解釋一文殊師利現出家比丘相這點我確乎修正了但不是完全否定了無論是一髻的五髻的騎著獅子的文殊師利菩薩被稱為童子我一向是認為在家相的來台灣以後讀大智度論讀到慈氏妙德即文殊尸利菩薩等是出家菩薩大正二五一一一上引起我極大的疑惑後來搜集有關文殊的經典發現早期大乘經中的文殊有些是出家的初期大乘佛教之起源與開展九二九九三頁但我不否認在大乘佛教的發展中有人與天雙重性格的文殊後來都是現天在家相的二文殊師利普賢毗盧遮那民國五十年前發表了文殊與普賢編入佛教史地考論在初期大乘佛教之起源與開展四六五四七四頁引用了而作更完備的說明梵王為主融攝舍利弗的德性形成文殊師利帝釋為主融攝大目犍連的德性成為普賢人間天上的兩大脅侍成為二大菩薩二大脅侍間的釋迦佛就成為毗盧遮那其實早在印度之佛教三六頁就說到魔天外道天龍夜叉等與菩薩同化之傾向日益顯著如梵童子之與文殊因陀羅即帝釋之與普賢摩醯首羅天成佛之與大自在天其顯例也三佛的真身是現在家相這與文殊現在家相一樣毗盧遮那佛像都是在家相的然在華嚴經中佛在摩竭提國阿蘭若法菩提場中始成正覺大正一一中與釋迦成佛相同只是表徵的境地崇高些如來名號品大正一五八下說或名一切義成悉達多或名釋迦牟尼或名第七仙或名毗盧遮那或名瞿曇氏或名大沙門釋迦與毗盧遮那還是一而二二而一的沒有嚴格的區別但在十地品大正一二八中說菩薩住此法雲地多作摩醯首羅天王摩醯首羅天是印度教的大自在天與佛教的色究竟天相當十地品只說多作到楞伽經就說色界究竟天離欲得菩提了大正一六六三八上這也是大乘佛法由人而天是在家相的演化歷程天上成佛的是真身釋迦佛是化身成為大乘佛教界的共信四大乘佛教只是佛教的梵天化我沒有這個意思我始終是大乘的信仰者大乘佛法的開展是多方面的天梵化只是其中的一項天化是適應民間的印度教信仰由微而著不斷的擴展起來所以我對大乘不是否定只是抉擇而洗鍊之刮垢磨光大乘佛教的方便適應其中天化的發展到神祕淫欲為道說什麼明王金剛對純正的佛法聲聞菩薩的正常道是嚴重的扭曲所以我主張反天梵化而回歸人間這決不是來台灣以後的思想轉變在寫作印度之佛教的前一年民國三十年寫了一篇佛在人間末了說在大乘佛教的發展中如果如太虛大師所說有依人乘而發心趣向的大乘有依天乘而發趣的大乘那麼人間成佛與天上成佛就是明顯的分界線佛陀怎樣被升到天上我們還得照樣歡迎到人間人間佛教的信仰者不是人間就是天上此外沒有你模稜兩可的餘地佛在人間一五頁三再來解說佛法概論等似乎不同而被稱為想像式的意見一青年佛教運動小史這是三十一年寫的原名青年佛教與佛教青年全書分三部分青年佛教運動小史青年佛教參訪記現在編入青年的佛教雜華雜記編入華雨香雲這是依華嚴經入法界品寫的關於大乘佛教新的祇園的出現經上說是菩薩摩訶薩五百人五百聲聞衆無量諸世主由於佛的加被之力求一切智廣大願力而引發的大正一三一九上下我這樣寫有稱為菩薩的有稱為聲聞的還有叫做世主的世間的統治者就是天神龍羅剎夜叉們青年的佛教二三頁溫君引文而沒有注意世主們但經文確是說到世主而且是無量世主的從這三類衆生的信願深解顯發大乘佛的境界怎能說與前引大乘以教化在家菩薩為中心這一命題是一貫的呢這是含有天化成分的經上說到此六千比丘是舍利弗自所同住出家未久大正一三三下六千比丘受文殊的教化回向大乘而代表傳統佛教的上座舍利弗雖讚歎文殊而還是聲聞所以我在雜華雜記華雨香雲一五七頁說比丘信大乘多是初學的這是非常明白而值得注意的事溫君又誤解了以為大乘思想的起源與出家的聲聞無關出家人是大乘的初學者足見他對這一問題的猶豫依入法界品大乘佛法是菩薩聲聞世主們所共同引發的怎麼說與出家的聲聞無關出家未久是什麼意義入法界品中善財所參訪的善見比丘這位大菩薩比丘不也自稱我年既少出家又近大正一三四九下嗎佛教初分為上座與大衆二部大毗婆沙論大正二七五一一下說耆年雖多而僧數少成為上座部耆年雖少而僧數多成為大衆部舍利弗問經意大同大衆部中老上座少而僧衆多多的當然是少壯了佛藏經大正一五七九上下也說一味僧寶分為五部爾時世間年少比丘多有利根喜樂難問推求佛法第一實義在印度的佛教史上大乘佛法主要是從大衆部系的少壯比丘發揚起來的出家未久我年既少年少比丘善財是童子文殊師利也是童子所以我稱之為青年佛教如雜華雜記三節所說出家未久的六千比丘贊同大乘而修學大乘所以我說比丘信大乘多是初學的這是非常明白而值得注意的事這到底有什麼可猶豫呢二佛法概論這部論是改編阿含講要增補三乘行果而成的所以對菩薩衆的德行比較簡略些由於大乘經不同的兩大類型所以我提出了旁流與主流的看法旁流是在大乘經中聲聞出家衆處於旁聽的地位也有助佛說大乘法的或受到菩薩們的譏責最後聲聞衆回入大乘菩薩道主流是直入大乘的有的大乘經沒有聲聞出家衆參與為什麼稱之為旁流與主流因為大乘是以修菩薩行成佛道的崇高理想為目的所以在大乘佛法的開展中直入大乘的取得了主流的地位換言之大乘初興是不離聲聞僧的大乘思想的弘傳對傳統佛教的聲聞僧作出或融攝或批評的不同適應等到大乘的法門大啓那就直說佛果與菩薩行了維摩詰善財常啼在家相的文殊表徵了人間菩薩也是天的形相溫君以主流為在家衆為大乘思想的主要來源那是根本誤會了說到佛與淨土從人間釋迦佛演化到色究竟天成佛如上文已經說到佛的國土釋迦佛是現實世界穢土到彌勒成佛時那時輪王統一天下以德行化導人間人口衆多物産豐富人民過著和平安樂的生活彌勒佛同時出世弘揚出世出世而又入世的佛法世間太平佛法興盛這是早期傳說的人間淨土在大乘經中十方淨土形形式式都是天國化的如阿閦佛的妙喜淨土阿彌陀佛的極樂淨土經上都說如欲界第六天上阿閦佛現出家相有出家弟子但沒有律的組合國中有女人但沒有不淨月經懷孕與生育也沒有苦痛人間能上通天國這是欲界天式的淨土阿彌陀佛的極樂國土起初是有出家阿羅漢的後來沒有了成為純菩薩的淨土極樂國是沒有女人的也就沒有男女沒有家庭沒有家也就沒有出家這是近於梵天式的與色究竟天成佛原則上是無所謂在家出家的但在人間看來不現出家相那就是在家相了民國十五年前王弘願要傳密法還依毗盧遮那現在家相而作為在家人可以傳密的理證呢大乘經中這樣說我就這樣說基於現實人間成佛的觀點我從釋迦佛的發心及成佛後的遊行教化引起我的信敬與熱心我在三十年寫的佛在人間寫下出家更接近了人間佛在人