衆部系的安達羅派以為釋迦過去生中值迦葉佛時入決定異部宗輪論大正四九一五下說菩薩為欲饒益有情願生惡趣隨意能往這與大乘的得無生忍一樣菩薩有凡聖二階聖位菩薩能示現生於惡趣的本生本是印度民間與神教有關傳說的先賢聖德或是民間的神話故事這些偉大的德行特別是利濟衆生的施捨一切都化為如來過去生中的菩薩行如本生所說過去生中偉大的德行部派佛教都綜略而稱之為波羅蜜多大毗婆沙論大正二七八九二上中說毗婆沙師立施戒精進智慧四波羅蜜多外國師說施戒忍精進靜慮般若六波羅蜜多還有別說六波羅蜜多是四波羅蜜多而加聞與忍的外國師說的六波羅蜜多與法藏部及大衆部系的說出世部相同巴利語的赤銅鍱部別立施戒出離智慧精進忍真諦決定慈捨十種波羅蜜多過去生中長期修習波羅蜜多大行當然能圓成無上的佛果了說到佛起初都是現實人間的佛陀但引起了大衆系及法藏部等佛身無漏與說一切有部等佛身有漏的論辨依一般人的信仰與理想引出大衆部等所說如來色身實無邊際如來威力亦無邊際諸佛壽量亦無邊際一剎那心了一切法一剎那心相應般若知一切法如異部宗輪論所說大正四九一五中下這樣佛是壽命無量的永遠的存在是無所不在無所不能無所不知的論事南傳五八四一二四一三說大衆部主張十方世界有佛這些佛菩薩的信仰是部派佛教中流出的大乘思想的淵源近於大乘的是大衆部系及分別說系中的化地法藏部等這類思想的發展顯然是適應印度民間而展開的通俗化出世而又入世利濟衆生的佛法流傳於部派佛教的佛與菩薩思想當然也流傳於印度民間出家少壯與在家佛弟子自然會引發彼既丈夫我亦爾的大心發心修菩薩行成佛立志在長期三大阿僧祇劫或四或七大阿僧祇劫等生死中利濟衆生而圓成佛道西元前一世紀中這一學風開始興起多方面傳出而主要是般若般若重在了達一切法如幻性空在發菩薩菩提心大悲心隨分隨力的修行六波羅蜜不修深禪定不斷盡煩惱所以能不同於聲聞果證而直趣菩提大道當時傳統的佛教出家衆是不能去淫坊酒肆屠場伎樂處的那佛法不能普及新開展的大乘如在家菩薩維摩詰若至博奕戲處輒以度人入諸淫舍示欲之過入諸酒肆能立其志大正一四五三九上以在家身分到這些地方不是為了舒解自己的情欲而是為了化導衆生初期的賢護善守等八大菩薩智論明記他們的生處大正二五一一一上與維摩詰等應有相當的事實依據又如南印度的善財童子雖是釋迦本生善財王子大正二四六下六四下的改寫但參學所見的除出家衆六人外多是在家的建築師醫生語言學者航海家法官國王外道家庭婦女等大乘興起於南印度普及民間各階層也應有事實成分還有適應民間宗教而有夜遊神空行夜叉等大乘法的普及民間而有些傑出的菩薩行者是可以理解的但大乘的如實道平實而深徹的為了普及化在般若法華等經中善男子善女人也成為法師原語為法唄𠽋進行讀背誦寫供養經典解說等初學者的宗教行儀在大乘發展中有些經典是沒有出家衆在座的那是更理想化更天神化了佛弟子對佛的永恆懷念本生的流行適應印度民間所以在甚深廣大的菩薩行崇高的佛身佛土觀中不免受到了影響一本生傳說中的菩薩都是偉大的個人或畜類與天神德行大衆部系又律重根本方便隨宜所以初期大乘行者是重戒而不重律儀的也就是重德化而不重僧團法治的大乘經所說的菩薩在家的非常多而在現實的印度獨立特行的出家與在家菩薩都是沒有組織的如初期大乘佛教之起源與開展一一九五一二頁所說大乘佛法的弘傳還是依龍樹等從還在流行發展中的部派佛教僧團中出家而修學大乘的菩薩比丘大乘才能更廣大的延續下來二釋尊容忍民間信仰的天神而本生又多天神菩薩所以初期大乘的菩薩道是佛教的人間化也是天化金剛力士本是護法的夜叉而已在大乘佛教中就尊稱為菩薩化身海龍王緊那羅王犍闥婆王阿修羅王這些大力鬼王高等畜生的天神稱為菩薩的也不少連魔王也有不可思議大菩薩這些天菩薩在大乘法會中助佛揚化也還是本著悲智行願的精神助佛說六波羅蜜四攝等大乘法佛在人間四一頁但在一般信衆心中這些像在家人的天菩薩是大菩薩不但勝過聲聞比丘也勝過人間發心修菩薩行的終於天上勝過了人間這樣印度神天教所有的祭祀護摩咒術苦行也漸漸的觸攝到佛法中來還有超現實的佛菩薩加深了神祕的信仰他力加持與祈求都在大乘中出現了一般都信仰讚歎不可思議的佛菩薩而不重真正利濟人類從利他中完成自利的菩薩道心性怯劣急求自利的有求生佛國的易行道在家者為多印度佛教的後期出家與在家的一齊修行即身成佛的易行乘正常的菩薩道偶而說到而已印度佛教的末日也近了我說人間佛教是對佛法的天化清除不符佛法特質的部分所以說探其宗本明其流變抉擇而洗鍊之印度之佛教序三頁不是創新而是將固有的刮垢磨光佛在人間九九頁五我在四十二年寫了一篇建設在家佛教的方針所以要提出在家佛教有三點意義一經文的啓發如維摩詰的多方設教善財所參訪的善知識多數是在家衆的不同教化勝鬘夫人的教化使阿瑜陀城人七歲以上的都歸信佛教這不一定是事實但表示了大乘佛法中在家佛教的形象佛是修菩薩行而成的在佛的本生中形形色色不是以出家衆為主的二教界的事實大乘佛經這樣當然有在家而修菩薩行的但沒有教團的組合晉法顯所見的巴連弗邑華氏城的婆沃私婆迷是大乘婆羅門舉國瞻仰賴此一人弘宣佛法外道不能加陵衆僧國內大德沙門諸大乘比丘皆宗仰焉大正五一八六二中西元七世紀在家的唯識學者月官受到那爛陀寺衆的列隊歡迎在那爛陀寺七年與中觀者月稱進行了長期的論辨多羅那他印度佛教史二四章在家的大論師受僧衆迎接長住寺內那時在家衆在佛教中的地位有點不同了祕密大乘興起據說鬱地耶那國王因陀羅部底傳出甚深密法香跋拉國王子月賢在馱那羯磔迦大塔處得到時輪法而傳布現代佛教學術叢刊七二冊五五頁五八頁這是在家而傳出密法了依此去看西藏佛教寧瑪派是在家的噶居派的祖師馬爾巴是在家的薩迦派的教主夫人幾年前也來過台灣呢中國內地的佛教姑且不說隋唐時代的三階教等民國成立李政剛等發起佛教會後自動取消上海有世界佛教居士林後各地也有成立的上海還有佛教青年會曾發展到杭州漢口有佛教正信會由於印光大師文鈔的流通江浙地區成立不少念佛的蓮社印光大師痛心於佛教僧界的三濫贊同居士的結社念佛弘一大師出家前印光大師也曾勸阻他這些在家佛教還是歸依三寶或請大法師講經與開示的特出的是南京支那內學院歐陽竟無老居士發表了內學院院訓在釋師訓的闢謬中強調居士是僧是福田是師範可以說法閲戒可入比丘中次第坐等內學第三輯九一七頁還有廣東王弘願的傳授密法這是以在家衆為師主的團體台灣的在家佛教團體如中華佛教居士會等台中李炳南居士成立的蓮社承印光大師的意趣而更進一步雖歸依三寶而由炳老代授不知現在如何是一徹底的在家教團即使有出家人從炳老修學也不能進入這一團體政治開放以來佛法的類似佛法的在家佛教越來越多了三我的意識來源在沒有出家以前就感覺佛法與現實佛教界的差距出家後贊同太虛大師的人生佛教在研讀中覺得大乘正常的菩提道實源於釋尊的教化身教言教開展出菩薩行的如實道只是受到印度文化神教的影響不能充分落實反而適應印度神教演化為通俗的神祕的宗教佛教傳來中國重玄理山林來生度鬼寺院也家庭化為子孫制到清末民初一般僧侶的品質低落受到社會的歧視我曾感慨的說出家人對佛法不大留心而對軍政名流護法居士卻一味奉承逢迎按時送禮請齊自己無知卻奉承逢迎攀緣權勢所以如果說有四寶加居士寶那只因僧不成寶怪不得別人華雨香雲三四頁建設在家佛教的方針也說並非由於白衣說法而成為末法反之正由於出家佛教的衰落而有白衣說法的現象如出家衆的德學集團具足教證功德白衣弟子那裡還想在獅子窟裡作野干鳴呢由於出家衆的德學衰落真誠的在家弟子要起來贊助弘揚半知不解的也敢來一顯身手教制教典與教學九頁我還想到基督教由於新教的改革運動傳統的基督教天主教也因而大為改進中國在家佛教的如法成立出家佛教也可能因而更為純正健全如依然故我那在新的時代中走向衰滅也不用怪別人了面對現實反省自己自己的出家僧侶從大乘經的啓發中所以寫下了建設在家佛教的方針早一些白聖老法師曾建議分僧伽為二類一為中國傳統出家受戒一是近於日本式的但我所提出的是在家的佛教在共同的佛教組織中應各從自己的岡位上去努力自己所知所行的業務即是修學菩薩道的道場與自己有關的種種人即是自己所攝受教化的大衆這才能淨化世間才能利樂人群如建立在家佛教不能把握這主要意義而只是強調厭離娑婆賣弄神祕說過人法那就大可不必多此一舉了教制教典與教學八八八九頁六關於大乘佛法之起源問題平川彰博士在初期大乘佛教之研究提出三項理由推定大乘與出家的部派佛教無關是出於非僧非俗的寺塔集團他所依據的文證經一一的勘察都是不能成立的平川彰是日本著名的大學者為什麼要這樣說呢我以為這是他忠於日本佛教要為日本式的佛教求得教理上的根據所以我在初期大乘佛教之起源與開展九頁中說果真如平川彰所說的這樣初起的大乘教團倒與現代日本式的佛教相近這一說大概會受到日本佛教界歡迎的也許這就是構想有非僧非俗寺塔集團者的意識來源溫君引用我從依機設教來說明人間佛教所說大乘法不是從出家比丘的基礎而發揚起來的大乘的昌盛與在家佛弟子有密切的關係認為這與平川彰的結論應該沒有太大的不同但奇怪的是印順法師不明文否定自己的結論起源於部派佛教反問曾經一度影響他馳騁於想像式的歷史解釋的意識來源是什麼溫君是不免誤解了我在民國三十年所寫的佛在人間已確定了我的回歸人間而反天化的立場大乘思想的起源三十一年寫的印度之佛教與六十九年出版的初期大乘佛教之起源與開展並無太大不同如本文二所說起源是出於大衆部少壯派的青年部分的分別說者但從部派而大乘起初是少數的會受到傳統的局限與排斥我說大乘發揚起來大乘的昌盛與在家佛弟子有密切關係起源與發揚昌盛是不同的而溫君卻將起源與發揚昌盛畫上了等號不僧不俗的寺塔集團與我所說的在家衆不同而溫君卻以為沒有太大的不同這才怪我不否定自己的結論進而問我的意識來源是什麼這應該是在家的主體意識在作怪我贊同菩薩道的宏揚是不會反對在家佛教的但我所樂意見到的決不是但求往生只管打坐也不是認同外道瑤池門一貫道等的或著重氣功的在家佛教
