body:
  text: 憶福嚴二三事談佛教在人間民國八十三年四月八日臺灣佛學院志編纂組經由常覺法師引介帶領前往新竹圓光寺拜訪福嚴佛學院導師印順長老恭請長老概介福嚴初創時期的辦學概況長老目前將屆九十高齡後學佛子能藉此因緣親炙一代高僧都感因緣殊勝難遇因此也請問了一些有關佛教在人間的特質及菩薩行與易行道的發展編纂組特將當日長老的開示整理成稿禮請常覺法師審閲並呈印順長老斧正一福嚴佛學院草創概況問請老和尚談談福嚴精舍最初辦學的概況答當初福嚴精舍的修建可以説都是為了學但是開始的時候和一般的學院並不相同它是一個大家自己學習一起研究的學團並沒有對外招生凡是有志於學能夠學的僧青年只要是志同道合都可以來這個學團共住精舍從民國四十二年建立以來起初是香港來的一部分人後來彌勒內院的另一部分人也來參加這些人都是從大陸出來的也都是有學佛基礎的像演培續明仁俊常覺等法師當然也還有少數台籍的同學我那時身體不好教學經驗也不足有時候會稍微講一點專題演講但並沒有預定一定要怎麼講所以同學除了在那裡可以自己學習佛法也希望他們可以出來教學那時研學的內容以三年時間為限我為學衆們選讀了各宗各派的代表經典如講教理禪定智慧的各取一些代表性的還談不上深入研究主要是希望大家在初學期間從博學中求得廣泛的了解才不致引生門戶之見至於要深入研究則可視個人根性好樂選擇一門深入談到制度我實際上是不擅長那時只有一個共住原則就是無事不得下山不要竄寮不要説太多的間話認真用功看書讀經和聽課所幸大家都是來學佛法的都能安心用功我們很朴素很簡單除了早晚打掃外説不上有什麼制度這是早期的情況福嚴一直沒有院長制直到民國五十年續明法師任住持他就將精舍改成一個學院型的福嚴學舍到了民國五十三年他因身體不好想到海外遊化休息一下不意竟病死在印度後來名義上由演培法師當住持實務上則由常覺法師等負責問老和尚邀請辦學的人選時可有什麼條件考慮呢答福嚴精舍的環境與一貫風格平常等於是關起門來自修的一年僅有一次法會且只有白天時間信徒會回來看看所以也可説是一個純粹以學為主的道場沒有經懺佛事也不打佛七沒有香火也少信衆往來起初時候來精舍共住共學的都是法師所以沒有向外邀請法師民國四十六年開始一同寺成立女衆佛學院老師並不需要到外面聘請由我們山上推派幾位去擔任授課只有國文課是外聘教授或信徒擔任問老和尚提到早期辦學的時候重點不在制度的設立而是原則的給豫為什麼會訂這些原則答是阿學生沒有事不能下山因為大家都是來學佛法的不要東跑西跑的出家人不能一天到晚你找我我找你充嗑子間聊的否則佛法難有成就那時我們都不會講閩南話所以沒有什麼活動下山沒事做是浪費時間現在的出家人活動空間比較大這是想像不到的變動這樣的變動有好的也有壞的影響緣起法有正面的作用也有負面的作用就如同一件事情你看來很好很好的過分發展了慢慢的裡面也會産生問題就是這樣那個時候生活很輕鬆很淡泊簡單自然就少問題但是好處在這裡缺點也就在這裡我是個不會活動沒用的人所以大家共住下來也都比較傾向於學講到修學佛法也還是要能夠放得下安心好好學一下才能夠對佛法有比較深刻的認識否則會説會講的就博得聽衆的奉承把場面弄得轟轟烈烈的外緣太多也把大好的修學時光荒廢了倒不如安心修學持之以恆對佛法有正確深刻的認識來得好問老和尚後來曾經為福嚴佛學院擬定課程這套課程開設的次第是怎樣安排的呢答出家生活和在家生活是不同的出家人稱作宗教師所以態度行為都應該與一般人不同用佛法來講應該知道佛陀的教誨應該朴素實際一點因而在佛法中像遺教經這一類有關出家人正當生活的都必須要學這是出家人應該學習的基本課題過去中國自從禪宗和淨土興盛以後其他的教典佛法的義理都慢慢的衰弱下來顯得沒有用不必要了到了民國初年大陸上才興起教理復興的趨勢所以真正要理解佛法的深義印度的佛教史中國佛教史都要了解此外我們需要對佛法每一系統的思想都了解我指的是大乘三系所以中觀唯識楞伽經勝鬘經大乘起信論都是要講的我在講學方面向來都依據經典的本意來講讓同學理解它的意旨那麼就不會像有的人依照自己所想像的就把它講成什麼樣子這樣容易曲解佛法讓人不明瞭佛法的真義至於這個好不好或那一個比較好那是另外一回事問關於各宗各派都介紹有沒有偏向中國的還是印度的宗派答先講印度的然後中國的我為福嚴初期的學衆所擬定的三年讀經次第也是這樣的先開印度的因為佛法究竟是從印度傳來的到中國以後經過翻譯透過中國人的思想文化了解上多多少少有點變化不同比方佛教的制度中國佛教的制度和印度佛教的制度完全不同佛教在印度寺院都是公有的不是屬於那一個人的有人來住就是這個寺院的現前僧就可在這個地方吃住中國大陸上的叢林雖已經不太相同但多少還保有一點十方常住的特質南宋以後叢林以外寺院大都私有化子孫化了這是受到中國家庭本位文化的影響師父傳徒弟徒弟傳徒孫在中國人看來很合適以為應該如此事實上師父帶徒弟胼手胝足的努力往往可以維持一個道場的相當發展但這樣與印度原有的制度已經完全不一樣了在中國真正公有的反而大家都沒有興趣二佛教在人間問老和尚的著作裡面相當的注重歷史的延續性整個都從歷史的角度來貫串所有的佛法答佛教講的這個法永遠是這樣的講到修證的內容應該是沒有時間性的不過佛法是佛所證悟的但從佛口宣説出來的或是由身體表示出來的這種身教言教流布到社會就會顯出時空的關係釋迦牟尼佛當年建立的制度有很多一部分是適應當時印度社會的情形佛法裡面有一句話説毗奈耶因緣所顯要談戒律就要知道佛為什麼要制這個戒比方佛教的制度當它傳到不同的地方種種情形種種關係種種觀念也就慢慢不自覺地起變化因為它要適應那個地方如佛不戴帽子不穿鞋子這種戒律傳到寒冷的地方怎麼可以通行自然而然的比丘們的衣服就起了變化因為弘揚的地方不同為了適應不同的時空因緣所以每一部的戒律就有些不相同像錫蘭泰國它們比較接近佛那一個時代的佛法為什麼呢因為它們是熱帶地區與印度很相近所以接近一點但它們也有不同的地方比方佛世本來有比丘尼為什麼泰國錫蘭卻沒有呢也許是他們男女的觀念太重視男性了還有八關齋戒三個月是佛在世時所沒有的顯示他們制度的不同處這是佛法已落在人間的實例人間的佛教是現實的不是想像的就現實的佛教來講從起初的原始佛教慢慢發展到部派慢慢地大乘佛教接著也興起了這麼這一來就形成時間地點種種實際因緣關係的不同當然裡面也有個人的特質但重要的是時間關係所以根據我剛才講的真正釋迦牟尼佛的佛法比較朴素純正純真像中國看風水看相這種神道不分的方式會引起副作用出家人絶對是不能做這種事情有沒有效對不對是另外一個問題釋迦牟尼佛的弟子絶對不隨便顯神通為什麼不能顯你顯神通那就慢慢影響社會興妖作怪這是有嚴重副作用的佛教不是站在個人的立場我自己要怎麼做而是從團體的活動當中去了解應該怎麼樣較適宜這才是真正的戒律三菩薩行與易行道問剛才老和尚提到宋代的子孫寺院興起是受到中國家庭本位文化的影響為什麼從宋朝以後中國叢林制的禪宗會特別盛行答我的看法是這樣的它是一種隨緣隨時的變化當然諸如所穿的衣服學制佛法理論什麼都會改變這種問題並不只中國印度也有這個傾向在印度佛教方面就像初期佛教經論比較簡單朴實而大乘佛法一開始就比較通俗化一般化方便化所以有念佛的易行道易行道好像容易行但並不是到極樂世界就一切圓滿了到了那裡還要學不過在那個地方學習穩當究竟不會退轉印度佛教也有這一種傾向傾向簡單化快而容易真正的菩薩行殊勝難行一般人聽起來菩薩不好做不敢學但也不能説大乘菩薩不好最好修易行道成佛快一點要他為衆生長期處在生死當中那不要説是三大阿僧祇劫一點點時間就受不了啦所以後來密宗有即身成佛禪宗有即心即佛的説法它們的基本精神是相通的都是從如來藏思想發展出來的如來藏思想認為一切衆生都有佛性猶如衣裡明珠本來具足只要拿出來一點隨即顯發出來非常快速這種傾向在印度發展後與印度教配合起來便發展成祕密佛教講成佛要即身成佛即心即佛所以易行道易行乘密宗便盛行了
