body:
  text: 鼓山與虛雲和尚陳錫璋居士編撰的福州鼓山湧泉寺歷代住持禪師傳略以下簡稱傳略承湛然寺智者圖書館寄贈一部給我非常感謝讀了這部書才知道鼓山湧泉寺的住持敘述其次第傳承的是清黃任編的鼓山志從開山到清乾隆年間的遍照興隆禪師凡七十二代虛雲和尚以下簡稱虛老輯編增校鼓山列祖聯芳集以下簡稱聯芳集對鼓山志所遺失的遍求塔墓及碑記等予以補足乾隆興隆禪師以下又一一增補到虛老前一代達本禪師共百二十九代傳略更補入虛老圓暎盛慧普雨共百三十三代傳略對聯芳集所記認為有可疑的加以指出對禪師們的生卒年月盡可能的紀錄出來傳說而有異說的也加以引述這可說是一部很難得的鼓山列祖志了民國二十年我曾在鼓山住了一學期見到了虛老對那時鼓山的法務也知道一些覺得與傳略有些不同因此我買了一部虛雲和尚年譜以下簡稱年譜來參考年譜是岑學呂居士所編香港佛經流通處出版的年譜的內容分二一虛雲和尚自述年譜初編民國三十八年一九四九年止二一九五年起別立年譜初編附記自述年譜是一九五一年雲門事變後虛老自述一生的事蹟由弟子證圓們隨說隨錄不成片段經岑學呂考訂而成的虛老住世百二十年說就依此而推定我讀了這本年譜對虛老有深一層的理解發現在虛老的寫作中有與百二十歲不合的文字所以以虛老為中心將傳略所說而與事實不符的虛老的年齡可能不是百二十歲的分別的敘述如下一虛老的年齡虛老的年齡依自述年譜為百二十歲這是在雲門事變後虛老自述的但在自述年譜以前虛老的年齡在佛教界一直是個謎如幻生滄海文集卷中頁三九五三九六說他的戒弟子優曇在香港當面請問過虛老而虛老卻沒有明確的答復卻將問題岔開了其實不但一般的弟子就連受命編定雲門山志年譜的岑學呂也不知道如年譜頁一三八附記說師之年齡向不告人杜生疑謗也予以辛卯一九五一編雲門山志序中約計師為一百有六歲志刊成師再以年譜囑編計其年當為一百十二歲矣附記於此以正山志序年齡之誤手定年譜的年齡是確實的嗎胡適之早已懷疑了我在虛老自己的詩文中發現有少十年也就是百十歲的可能提出來貢讀者參考一傳略四四頁引聯芳集說不慧繼席又經七年愧無大建白而波折之經屢矣行年八十還鄉日短佛應世二千九百六十二年民國二十四年一九三五乙亥夏曆五月朔住山幻遊老人虛雲識於聖箭堂中時年九十六歲傳略引文中的是傳略編者所附加的時年九十六歲是依百二十歲說而推定的與虛老聯芳集所說不合虛老出家受戒都在鼓山湧泉寺對出家人來說鼓山是他的家鄉民國十八年他回鼓山任湧泉寺住持二十四年離職只有七年所以說又經七年還鄉日短虛老明說行年八十可論定他在民國十八年還鄉已是八十高齡了這樣到四十八年示寂是高壽百十歲了如把行年八十解說為辭去鼓山住持那一年二十四年那就只有百零四歲了這是不太可能的二傳略四四五四四六頁在虛老住持鼓山時期附有虛老的兩首詩一是別鼓山四十餘載始回感賦久與家山別今來髮已斑二是還鼓山訪古月禪師卅載他鄉客一筇故國香四十餘載與卅載顯然是矛盾的這兩首詩決不是虛老回鼓山任住持時的寫作因為古月禪師民國八年一九一九己未七月圓寂了傳略四三一頁依年譜所說虛老出家受戒後住山洞及任鼓山職事共七年同治六年一八六七起離鼓山而修苦行參學他方而去到光緒三十三年一九七因鼓山妙蓮和尚示寂虛老初次回鼓山參與荼毘典禮從一八六七到一九七是四十一年這就是別鼓山四十餘載的意義古月禪師曾任鼓山住持是一位專修禪坐的苦行僧有不少神奇事跡的傳說虛老在鼓山任職事期間年譜也說山中有古月禪師為眾中苦行第一虛老時與深談七六頁這次久別歸來還鼓山訪古月禪師也是理所當然的別鼓山四十餘載為什麼說卅載他鄉客呢依我的理解詩中的卅載他鄉客是當時的實情而詩題的四十餘載始回是經過後來改定的同時的寫作而時間相差了十年這與虛老住持鼓山而說行年八十還鄉日短不是恰好相合嗎依虛老的詩文推論他的實際年齡極可能是百十歲二虛老住持鼓山的法務與人事虛老住持鼓山期間對於禪戒律佛學法務方面有推動振興的理念如年譜八六八七頁說禮請金山霞後堂為首座兼主持禪堂請蘇州靈巖慈舟法師主律院慈法師深究律宗弘揚淨土皆巍然法門龍象也又創辦佛學社以造就年青學子佛學社應該是佛學院的筆誤虛老這番振興佛教的理念雖沒有什麼成就但到底是難得的這一部分傳略四四五頁寫作設立佛學院為造就僧才闡揚教法禮請金山寺月霞禪師來寺擔任首座兼主持禪堂蘇州慈舟老法師來寺主持律院宗鏡大醒印順心道等法師為教授傳略將禪律佛學三者統一在設立佛學院的標題下是明顯的誤會了他廣引參與法務的法師並附以注釋卻造成了更多的錯誤民國二十年秋季鼓山成立佛學院我也住了一學期對當時的人事也知道一些不妨一一的寫出來以糾正傳略的謬誤一霞後堂傳略寫作月霞老禪師並依佛光大辭典中國近代佛教史證明月霞的事跡四六三頁月霞法師曾在金山等參學但是清末民初一位弘揚華嚴宗的大德民國六年在杭州玉泉寺圓寂虛老任鼓山住持是民國十八二十四年怎能禮請民國六年去世的月霞來主持禪堂其實霞後堂是別有其人的我在鼓山那年該是十一月初吧霞首座來佛學院向心道法師辭行說到他存著希望來鼓山但非常不滿鼓山禪堂的風氣自己無法改善又不能向虛老辭職只能不辭而別溜單而去他就偷偷的去了不知他到了那裡二慈舟法師受月霞老的啟迪所以教宗華嚴但他行在戒律淨土慈老的確到了鼓山但因緣不成熟沒有能成立戒律學院年譜八三頁在民國二十年下說到辦戒律學院其實是成立湧泉佛學院的誤傳他也沒有在佛學院講課三宗鏡法師湖北人民國二十年他是湧泉寺的監院沒有參與學院的教職四大醒法師是廈門南普陀寺閩南佛學院的代理院長民國二十年夏鼓山宗鏡監院代虛老來廈門閩南佛學院禮請大法師任湧泉佛學院副院長人事全由大法師安排大法師為了成立湧泉佛學院曾去鼓山二次但沒有任教職五心道法師傳略編者不知心道是誰從佛光大辭典釋氏疑年錄找到了宋代的心道一五八一一二九附入註四六六頁作為鼓山佛學院教師心道的事跡民國與宋代距離八百多年怎麼可以糅合為一呢我所知道的民國心道是湖北人閩南佛學院甲班畢業與來台的默如戒德是同班同學宗鏡監院來閩院心道以同鄉相識的關係也出來招待大法師也就推介他去鼓山任佛學院教務主任他離鼓山後去西北弘法如民國佛教大事年紀說民國二十五年心道等成立青海佛教居士林請太虛法師任導師一八二頁民國三十一年心道法師赴寧夏講經並接任承天寺住持二二六頁這才是湧泉佛學院教務主任心道的事跡如傳略再版似乎可以參攷修正
