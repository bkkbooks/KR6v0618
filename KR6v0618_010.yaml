body:
  text: 我與盧勝彥民衆日報上蓮香的從印順導師的一篇文章説起那是對我的盧勝彥與我而寫的盧勝彥是歸依我的但不是我親自為他歸依的中國佛教的習慣歸依以後頒發一張歸依證作為受歸依的證明盧勝彥在尋找印順導師一文中附有歸依證並注明印順導師親手頒豫的歸依證我沒有親自主持歸依禮怎麼能説是我親手頒豫的歸依證蓮香卻説與你隔壁居住時勝彥拿了歸依證給你看你看完親手頒交回給勝彥給我看我還他這是後來的事能説是親手頒豫頒交嗎蓮香頒豫是不能如你這樣解説的我記得盧勝彥從美國回來見我只是我在病中的一次他帶了五個弟子來我沒有説過蓮生努力向前我不知蓮生是什麼怎會這樣説盧勝彥原文説每次返台均拜訪他老人家而且均説蓮生努力向前這與蓮香所説五次回國見過兩次也多少不同了所以盧勝彥的每五次返台均拜訪他均説蓮生努力向前是照著他自己的意思而寫出來的盧勝彥在釋迦牟尼吃肉一文也提到了我他説我的歸依師頂頂大名的印順導師就如此説佛教不是吃素的宗教我從來沒有這麼説對於素食我寫有關於素食問題編入妙雲集下編第八册教制教典與教學頁九五一八可以參閲他在這篇文字中説我大口喝酒大塊吃肉吃酸喝辣一齊來我才是保持傳統話似乎説得太離譜了也許想到就寫説溜了嘴吧試問釋迦佛大口喝酒嗎在佛制的戒律中出家與在家佛弟子可以任性的大口喝酒嗎如説這才是傳統佛教那真是謗佛謗法了
