body:
  text: 灌頂在佛法中的起因與發展一一灌頂為祕密大乘佛法的重要儀式不只是儀式還有多層次的也就是發展所形成的多重意義灌頂而成為佛教的成為祕密大乘所特重的試從史的發展略為敘述灌頂本是印度國王的即位禮即位禮有多種儀式而以水灌頂是重要的節目賢愚經説頂生王即位時四天王即下各捉寶瓶盛滿香湯以灌其頂時天帝釋復捉寶冠來為著戴之大正四四三九下這似乎是神話其實這是宗教的即位典禮正表示了天神的授與權位華嚴經十地品也説太子坐白象寶妙金之座帳張大網縵建大幢幡然香散花奏諸音樂取四大海水置金瓶內王執此瓶灌太子頂是時即名受王職位墮在灌頂剎利王數大正一二六上以四大海水來灌頂表示了四海以內歸國王統治的意思印度阿利安人是從西方來的與西方以色列人立國王以香膏膏頂是相近的在傳説中灌了頂就登王位但還不是轉輪王要國王持齋戒行仁政感得七寶才成為統一天下的轉輪聖位灌頂是印度古代的國王即位禮二神教的國王即位禮灌頂怎麼會與佛法發生關係主要是釋迦牟尼以下簡稱釋尊出生王家是王太子如太子瑞應本起經説釋尊誕生不久有仙人來占相認為有三十二大人相者處國當為轉輪聖王主四天下若不樂天下而棄家為道者當為自然佛度脫萬姓大正三四七四上所以佛與輪王一樣都是有三十二大人相的七寶經説輪王有七寶輪寶象寶馬寶珠寶女寶居士主藏臣寶主兵臣寶以仁政化治天下釋尊佛也有七寶那就是七覺支以此度脫衆生大正一四九三上南傳一六二九五輪王的輪寶從空中飛來所到的地方都降伏了以此來比喻佛説法名轉法輪降伏衆生的煩惱由於釋尊出生於王族佛與輪王的關係早就被人聯想著的如長阿含經二遊行經説佛滅度後葬法當如轉輪聖王大正一二上南傳七一二六七傳説的古代轉輪聖王是父子相傳的如國王的功德不夠所行不如法那就沒有七寶成為一普通的王了與王子意義相對應的是佛弟子中的大阿羅漢如説我是佛子從佛口生從法化生得佛法分非得財分大正二一三二中聖果是從聽佛口説法依法的修證而來的從佛得到法分智慧證知正法而不是世間那樣但取得父親的財物在這一意義下證得究竟聖果的佛弟子都可説是佛子輪王有千子佛子更多舍利弗智慧第一可説是佛的長子佛對舍利弗説如轉輪聖王第一長子應受灌頂而未灌頂已住灌頂儀法如父之法所可轉者亦當隨轉汝今如是為我長子鄰受灌頂而未灌頂住於儀法我所應轉法輪汝亦隨轉大正二三三中南傳一二三三輪王的長子在將灌頂而沒有灌頂時就助理輪王的政務舍利弗是佛的長子也是將灌頂而還沒有灌頂已經助佛揚化為衆説法未曾疲倦了這是佛法中説到的佛子與灌頂這當然是比喻佛與弟子間佛法是沒有灌頂儀式的雖説舍利弗是佛長子鄰受灌頂然依佛法的經律所説佛涅槃後弟子即使是舍利弗還在世也不可能繼承佛位的所以阿含經的佛子與灌頂説只是少分的譬喻而已但將引發這一思想的發展二一大乘佛法以菩薩發心修行而成佛為宗菩薩在長期的修行歷程中到將成佛以前不是輪王長子那樣經灌頂而登王位嗎佛子與灌頂在菩薩修行成佛中才是恰好的譬喻大乘初期發展而成的菩薩行位是十住或譯十住地十住是一發心住二治地住三修行住四生貴住五方便具足住六正心住七不退住八童真住九王子住十灌頂住十住是菩薩修行成佛的十階位是以輪王長子繼承王位為譬喻的其中發心住如願生王家生貴住如誕生在王家了方便具足住如學習書算等知識技能童真住如漸長為少年王子住如立為王太子灌頂住如經灌頂而登上王位大乘的十住説與大衆部分出的説出世部大事所説的十地有部分的共同性如大事八地名生誕因緣九地名王子十地名灌頂是與十住説的生貴王子灌頂相同的菩薩十住説的成立顯然受到了大事的影響參閲拙作初期大乘佛教之起源與開展一七一一八四十地説興起與十住的名目不同而含攝了十住説的部分內容如第十地名法雲法雲地也説到了灌頂如華嚴經説十方一切諸佛從眉間出清淨光明從大菩薩頂上而入此菩薩得先所未得百萬三昧名為已得受職之位墮在佛數佛子如轉輪聖王所生太子王執此瓶灌太子頂是時即名受王職位菩薩受職亦復如是諸佛智水灌其頂故名為受職大正一二六上十方佛的光明流入大菩薩頂以輪王長子受灌頂為譬喻而説諸佛智水灌其頂故十方佛光明入菩薩頂就是佛智慧的入菩薩頂有十方佛加持菩薩的意義經這樣的佛光智水灌頂就入法雲地墮在佛數還不是究竟成佛摩訶般若波羅蜜經也説住十地中當知如佛大正八二五九下如佛如十四夜的明月還沒有圓滿成佛還需要進修也如灌頂為王還要具十善行七寶來應才成為灌頂聖王華嚴經的佛光入頂可説是佛為菩薩灌頂雖還不是世俗一般的灌頂儀式但智水灌頂有加持意義灌頂後修行成佛與後起的祕密大乘接近了一步二十住與十地西元二年前成立所説的佛光智水灌頂也還是象徵的西元五世紀上半傳説為鳩摩羅什等譯的禪密要法經佛陀跋陀羅譯出的觀佛三昧海經傳出了觀想中的灌頂禪密要法經是聲聞的禪觀佛陀跋陀羅是著名的禪師所譯的達摩多羅禪經也是聲聞的禪觀集他曾譯華嚴經所以觀佛三昧海經在聲聞的念佛三昧中含有大乘念佛觀的內容西元五世紀印度的祕密乘已漸漸的流行了聲聞的瑜伽行也就有了灌頂的觀行一禪密要法經説如修行勤苦而身虛心勞的可以觀想釋梵護世諸天使持金瓶盛天藥水釋提桓因在左護世諸天在右持天藥灌頂舉身盈滿身體潤澤如膏油塗大正一五二五一下帝釋與護世的四大天王持金瓶盛藥而灌頂與賢愚經所説頂生王受灌頂的情形是相同的觀想天藥入頂實從傳説的天人益其精氣而來如觀火大而身體枯憔的也有觀灌頂法觀佛以澡瓶水灌頂以水治火大正一五二六中觀佛三昧海經中觀如來缺瓫盆相滿時光明照頂之時如人執瓶灌藥入頂從頂入已貫徹表裡爾時行者身心安隱復當起心作一藥想先作身想身想既成開頂令空作梵王想作帝釋想作諸天手持寶瓶想持藥灌想藥入頂時遍入四體及諸脈中大正一五六六四下這都是增益身心精氣的藥灌頂觀二禪密要法經説見佛身微妙如淨琉璃手持澡瓶住立空中瓶內盛水狀如甘露其水五色五光清淨如琉璃珠柔軟細滑灌行者頂滿於身中當自念言如來慈父以此法水上味甘露而灌我頂此灌頂法必定不虛爾時復當更起想念惟願世尊為我説法雖聞説法於義不了復見世尊以澡瓶水灌行者頂這是在禪觀中見佛灌頂請佛説法一再的佛為灌頂而觀行不斷深入的稱為觀佛三昧灌頂之法能淨除罪業豁然意解成阿羅漢的大正一五二五六中下禪密要法經所説的主要是不淨觀經説不淨觀想是大甘露甘露灌頂聖法大正一五二五四下不淨觀與數息觀稱二甘露門在大乘與祕密大乘的影響下在修行不淨觀的過程中有了以見佛以瓶水灌頂的觀法灌頂觀無論是天神灌頂或如來灌頂都含有加持的意義那時候灌頂是普遍的流行了三一經灌頂而登王位再進而成輪王的世俗禮儀佛法中用來比喻佛子經佛光入頂而入如佛位再進修而成佛含有加持授與意義的灌頂成為祕密大乘佛法的重要行儀在密乘中有瓶灌頂祕密灌頂慧智灌頂第四灌頂四種灌頂是先後次第發展而成立的真可説是灌頂儀的是瓶灌頂後三者是引申加持傳授的意義而也稱之為灌頂的密乘中的瓶灌頂起初是怎樣與祕密結合起來的呢在漢譯中北涼曇無讖所譯金光明經中功德天説咒而説是灌頂章句必定吉祥大正一六三四五中東晉竺難提所譯請觀世音消伏毒害陀羅尼經也説此灌頂陀羅尼章句大正二三七下宋疆良耶舍所譯觀藥王藥上二菩薩經也説到説是障煩惱海灌頂陀羅尼大正二六六一下這幾部稱為灌頂章句的神咒或陀羅尼的是以現生利益治病得財寶除災障等為主的稱為灌頂章句的是晉宋間西元四四五年的譯品同時或更早的竺法護等所譯的大乘經為了護持佛法而説咒的都作咒術章句陀羅尼句總持章句灌頂章句是與現生利益的低級咒語開始發生關聯的以現生利益為主的咒術西元三世紀起次第傳來如七佛八菩薩所説陀羅尼經對陀羅尼的名目都夾注有晉言有些是個別傳出的經古人編集而成為大部現在經藏中有灌頂神咒經傳為帛尸梨密多羅所譯是不可信的這是十二部各有名目集合而總稱為灌頂神咒經的依僧祐出三藏記集別列十一部附注説從七萬二千神王咒至召五方龍王咒凡九經是舊集灌頂總名大灌頂經從梵天神策普廣經拔除過罪經凡三卷是後人所集足大灌頂為十二卷大正五五三一中舊集本為九部僧祐以第十二拔除過罪經是宋孝武帝大明元年西元四五七秣陵鹿野寺比丘慧簡依經抄撰所以編入疑偽雜録大正五五三九上其實這是藥師經的初譯本經慧簡發現而抄傳出來不能説是偽經的這十二部經都説到灌頂章句一再説到十二部灌頂章句微密妙典十二部咒灌頂章句灌頂章句十二部要藏灌頂章句十二部真實咒術等大正二一四九七下四九八下十二部經本是十二分教的舊譯大抵因此而纂集十二部為一部資料應該是晉代舊有的經我國古德集成九部合於九部經後來又總集十二部為一部經過古德的纂集當然會參加些中國東西如説有震旦國我遣三聖在中化導大正二一五一二中大村西崖的密教發達志説到洗浴淨衣長齋塗壇畫幡懸蓋燒香散華用鏡照魔神名印法等事相頗備焉豈可以支那撰述而付忽諸乎世界佛學名著譯叢七二一三三灌頂神咒經中多説神名也有咒語還有印法但都是咒術章句如吳支謙所譯的八吉祥神咒經其實是稱念八佛名號在求他力護助的意義下稱佛名稱菩薩名稱神名誦咒語是沒有太多差別的稱佛名神名等都已神密化而稱為神咒了這部稱念神名咒語的大灌頂經説到了灌頂與傳授如經説受此護身神典者先當禮敬十方佛次禮經寶次禮聖僧次禮度授與經之師皆當專心一意偏露右肩長跪合掌師當右手持文弟子以右手受之師以右手持法水灌弟子頂上若有比丘樂受是典應懸五色幡蓋散華燒香齋戒一心不食五辛酒肉浴身潔衣香汁塗作壇從壇上受大正二一四九七中微妙灌頂章句十二部典不可妄授持與人也若有信心欲受持者師當一心如法度授與師師相承受是章句不得輕度授與人也若有受者當如上法大正二一五二下咒術章句當時已有寫本所以説右手持文弟子以右手受之在授受時舉行瓶水灌頂的儀式表示了神力的加持授與從經文看來傳受是決不隨便的要莊嚴壇場弟子清淨身心還説到法應七歲授與一人那是極嚴格了師師相承受是章句正是祕密授受的意思祕密大乘的灌頂法這部經有了明確的記録這主要是咒術章句的授受所以也就稱為灌頂章句佛教的灌頂儀式是因咒術授受而開始的二印度神教的咒語多少滲入到部派中隨著大乘佛法陀羅尼的發達有佛教的咒語流傳出來咒語其後有印法觀法是祕密傳授的漸與灌頂相結合而灌頂儀式是要有壇場曼荼羅的祕密的咒法印法等處處傳出當然儀式會多少不同有歸類而求大致統一的必要這就是西藏所傳事續的四部總續我國曾譯出三部唐善無畏譯出蘇悉羯羅經蘇婆呼童子請問經異譯妙臂菩薩所問經不空譯出蕤呬耶經重於修持方法的靜慮後續我國沒有譯出蕤呬耶經就是大日經疏所説的瞿醯經這部經的梵語為譯義為一切曼荼羅共通的完備的祕密坦特羅續所以或譯為祕密總續此外初唐無極高所譯的陀羅尼雜集也是分為佛部蓮華部金剛部諸天部而又以都會曼陀羅作結的事續舊譯雜密是各別傳出的曼陀羅與灌頂法不一定相同如蕤呬耶經説我今都説三千五百曼陀羅中次第之法夫曼陀羅又有其三重亦有四重亦有多重其最外院廣開一門亦有如是開四門者大正一八七六下七六四中所以事續的灌頂應依事續所説不能以後起的密乘行者的意見為準量的灌頂式有他力加持的意義所以在事續中灌頂是不限於傳授密法的蕤呬耶經説到了兩類的四種灌頂一傳法灌頂息災灌頂增益灌頂降伏灌頂二四種灌頂一者除難二者成就三者增益己身四者得阿闍梨位大正一八七七二上息災增益降伏是護摩火供的三類在祕密佛教早期也可以舉行灌頂來達成的第二類的四種灌頂經上説若有被難所著為除難故作灌頂者此名除難灌頂為求安樂及與富貴并求男女除不祥故作灌頂者此名增益灌頂大正一八七七二上這可見增益即增益己身而息災與降伏統稱為除難灌頂了得阿闍梨位就是傳法灌頂成就是入曼陀羅而學習明咒的為了修學而速得成就再受加持的灌頂所以也名受明灌頂灌頂不限於傳授密法如除難的灌頂也見於蘇婆呼童子請問經如説將彼著障之人令入坑中面向東坐念誦人咒師於壇西面面向東坐誦真言與彼灌頂如是四瓶次第應灌作此法已彼著障人者即得解脫此曼陀羅非獨能除一切毗那夜迦諸如色類悉皆獲利所求窺者並皆滿足諸餘疾病亦復能差又復能消滅無量罪障大正一八七二四下七二五上這是除難降伏為主又能息災增益的以增益為主的灌頂如陀羅尼集經説若婦人無兒而欲得兒者婦人在曼荼羅中合掌念觀世音菩薩阿闍梨灌其頂上即得聰明端正男女具諸相好一切求願法亦如是大正一八八一九上中總之早期的祕密佛法灌頂是不限於傳授的還有為本尊灌頂自己灌頂的修法者所修的真言咒屬於某部佛天的就造佛天的像供在曼荼羅壇中稱為本尊或作主尊像是用金屬檀香木材或用蠟作的但到底是形像而已並不等於佛天要得到本尊加持所以先為本尊灌頂也就是加持本尊如蘇悉地羯羅經説若欲真言主尊增加威德應灌頂之用部尊主真言或用部母真言持誦一百八遍然後灌其真言主頂復當獻供復作護摩并加念誦如是作者能令本尊增加威力速得悉地念誦時應灌本尊灌頂本尊所祈之願速得成就大正一八六二上為了求本尊的加持先加持本尊像使他更加威靈些這應該是早期低層次的我國民間的神像也有這樣的情形作法不同説到為自己灌頂如蘇悉地羯羅經説依灌頂法亦通灌頂其物亦通灌頂自身大正一八六二七中自灌而説得分明的如陀羅尼集經大正一八七九四中説今從佛請三昧陀羅尼功德之水灌頂身心三業清淨行願具足即將十六水瓶上牛糞香水壇上脫去衣裳面正東立擎水瓶頭上淋口云十方一切佛賜與我某甲一切菩薩行願先從中心帝殊羅施光聚灌身心以次取瓶一一灌盡著衣服入道場行道作業上説是以瓶水自己灌頂以求成就所願的還有以此真言及手印而自灌頂以灌頂印相取水持誦真言三遍而自灌頂的大正一八六九五中這是在三時持誦中掬水灌頂大正一八六七上而不是瓶水灌頂可説是日常修法中的水淨陀羅尼集經説要為弟子灌頂阿闍梨先自取壇中座主上水罐作灌頂法印次把水罐舉兩手擎罐自頂上口誦心咒七遍灌之直向下注大正一八八九一中下這也是為自己灌頂的一類三作為密法傳授的灌頂事續有二種灌頂如蕤呬耶經説為弟子灌頂的阿闍梨要先蒙阿闍梨傳授與傳法二種灌頂大正一八七六下蘇悉地羯羅經明確的説曾入大曼荼羅而受灌頂復為先師而歎德者汝從今往堪授灌頂為阿闍梨獲斯印可方合自手造曼荼羅須依法則次第亦合授與弟子真言大正一八六四下六五上蘇悉地羯羅供養法也説得最勝受明灌頂奉阿闍梨之所印可令傳法灌頂乃至令作諸餘灌頂大正一八六九二下二種灌頂是無可疑的無論是世法出世法先要從人受學學得有了相當成就才可以傳授給別人從師長受灌頂就是蒙阿闍梨灌頂也名受明灌頂師長準豫傳授給別人是傳法灌頂如約可以為人師傳他密法説也名為阿闍梨灌頂無論作法是怎樣的事續的修持者為師長印可可以造壇為人灌頂成為阿闍梨在灌頂史的發展上是不容懷疑的智慧灌頂等上三類灌頂已沒有水灌頂的形儀如要知道上三灌頂可閲宗喀巴所著法尊所譯的密宗道次第廣論
