body:
  text: 永懷學友去年九月我到了星加坡住在寶光佛堂與慧嚴精舍靜養十一月十日晚上八點鐘明聖接到一通電話就嗚嗚咽咽的哭起來問他什麼事起初不肯說怕我不好睡後來終於說出來演公法師因心肌梗塞去世了這太突然了十一日早上我去福慧講堂那時演師的色身還安詳的睡在床上想起這次來星晤談了好幾次覺得演師的體力還可以怎麼竟突然的去了呢唉真如佛說的人命在呼吸間呀演師高壽八十與佛同年從演師對佛教的貢獻來說真是值得讚頌的他的一生從求學到從事僧教育從事社會的教化又從事社會福利事業他的講經說法而記錄的著作翻譯編成諦觀全集二十八冊諦觀續集十二冊還有六祖壇經講記弘法拾零等真可說著作等身對社會弘法除在台灣多年外他遊化了香港泰柬寮越南馬來西亞星加坡菲律賓美國對當地大乘佛教的日漸興盛功德是難以計量的他定住星加坡約三十年建般若講堂與福慧講堂建築是以弘法為中心的在福慧講堂成立了福利協會辦了安老院洗腎中心托兒發展中心開心停留站安樂之家福樂林等福利社會的善事受到星加坡社會的稱譽演師的一生可說是福慧雙修講堂名為福慧的確能彰顯了演師偉大的僧格我對演師的安詳去世除了讚歎總不免有些難忘的懷念記得民國農曆二十九年底我從貴陽回漢藏教理院見到了從香港來的演師與妙欽法師等青年學友三十年秋演師主持合江的法王學院請我同去三十五年春我與演師及欽師離開了四川經陝西河南而回到了江南他們二位受太虛大師慈命到杭州的武林佛學院執教三十八年上學期我在廈門南普陀寺主辦大覺講社演師與續明法師也來相助秋天我們都到了香港四十一年我們又先後的來到台灣在相見以來的五十六年中我與演師共住的時常相見的約有二十五六年在這不算太短的日子裡演師給了我說不盡的護持如一來台灣以前我的講說由演師記錄而成中觀論頌講記金剛般若波羅蜜經講記其他的攝大乘論講記大乘起信論講記等也是演師與欽師等共同記錄沒有他們的自動發心以我當時的衰弱身體不可能有妙雲集上編那些講記的二三十二年在重慶出版了我的第一部著作印度之佛教那時在生活清苦的抗戰大後方自己又沒有錢怎麼能自己出版這主要是得到演師的支持三在香港時時局動盪生活相當的不安定演師與續師為太虛大師全書的出版斷斷續續的負責校對同時也為我的作品負起向印刷廠接洽校對寄發等全部責任二三年中竟出版了佛法概論般若心經講記評熊十力新唯識論青年佛教與佛教青年性空學探源大乘是佛說論佛滅紀年抉擇談淨土新論大乘起信論講記中觀論頌講記勝鬘經講記等十多種演師們能無條件的為佛法而奉獻使衰弱多病的我也更堅強的為佛法而精勤四到了台灣我的中型肺結核使我不能不靜養由於欽師的推介好幾次受請去菲律賓在休養及出國期間我在台北善導寺新竹福嚴精舍等應負的法務大都由演師代理這樣的學友對我的認同與護持雖由於因緣殊勝定住星加坡弘法我們相見的機會不多了但在我的心中可說五十六年如一日而今竟突然去世我怎能不深深的懷念呢我到四川見到了幾位學友如演師欽師與續師大家都真誠的為佛教為眾生而修學也都願為佛教為眾生而奉獻這使我相當的歡喜可是民國五十五年續師在印度去世六十五年欽師又在菲律賓去世而今八十五年演師又在星加坡去世了大家都去了卻留下衰朽不堪的我唉業緣未了死何難我只有慚愧還有什麼可說呢不過我與學友們的相見不會太久了我們相見的第一句話應該是大家回人間去人間正需要純正的佛法呀
