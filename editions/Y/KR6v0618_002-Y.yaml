body:
  text: 起信論與扶南大乘一前言大乘起信論傳說是馬鳴所造陳真諦所譯的在我國佛教界這部大乘起信論可說是受到高度推重的但在隋法經的眾經目錄中被編入眾論疑惑類隋均正的四論玄義更明確的說起信論一卷人云馬鳴菩薩造北地諸論師云非馬鳴造論昔日地論師造論借菩薩名目之到唐代也還有人評議近代日本佛教界望月信亨等再度提出討論論斷起信論是中國人所造為多數學者所同意我國有梁啓超的大乘起信論考證引用日本學者所說而讚許造起信論的中國人的偉大中國而反對起信論最徹底的是南京支那內學院這是以唯識宗思想為準繩而否定大乘起信論的內院學者呂澂作起信與禪對於大乘起信論來歷的探討指起信論是依魏譯五一三年譯入楞伽經而造的比較楞伽經的異譯與現存的梵本可見魏譯楞伽是有錯誤的依之而造的起信論當然也是錯誤了其實即使起信論是依譯文正確的楞伽經而作論義又正確也未必能為呂澂等所認同呂澂不是曾說楞伽於體用染淨之判猶未瞭然嗎站在一宗一派的觀點來衡量方便多門的佛法是不太適當的起信論非馬鳴造非真諦譯這是文獻考證問題而義理又當別論我覺得起信論的作者是依據參照不少經論而不只是魏譯楞伽經的起信論的思想主要是依從海道而來特別與扶南弘傳的大乘有關以下要略的介紹幾點二扶南曼陀羅的譯典一扶南佛教略說扶南見於中國史書的是從西元三世紀到六世紀扶南是現在的高棉或作柬埔寨地區的古國起初見到的扶南還是裸體的由於印度文化的傳入扶南也就印度化而大有進步流傳的有印度教佛教特別是大乘佛教的興盛梵本的經典也非常多佛教的聲聞學派也有多少流傳六世紀中本是附屬於扶南的真臘日漸強大進而統一了扶南以後中國的史書也就只說真臘了二文殊所說般若經與法界體性無分別經扶南人曼陀羅仙或作曼陀羅據續高僧傳說曼陀羅於梁武帝天監二年西元五三大齎梵本遠來貢獻敕與扶南人僧伽婆羅共譯由於曼陀羅未善梁言故所出經文多隱質雖說譯文不太理想而對中國佛教的影響卻是深遠的曼陀羅譯經三部一文殊師利所說摩訶般若波羅蜜經二卷與唐玄奘所譯大般若波羅蜜多經第七曼殊室利分同本異譯曼陀羅譯本被編入大寶積經四十六會名文殊說般若會助譯的僧伽婆羅後來又別譯一部一卷比對唐譯與曼陀羅所譯一卷本顯然地有了缺佚二法界體性無分別經二卷被編入大寶積經八會名法界體性無分別會三寶雲經七卷扶南人須菩提在陳代再譯名大乘寶雲經八卷文殊師利所說摩訶般若波羅蜜經是一部很有名的經典與般若部的風格相近說般若也說空義但已有如來藏思想的傾向如說眾生界量如佛界量如來界及我界即不二相這部經為大乘起信論所採用的是一行三昧唐譯作一相莊嚴三摩提如大乘起信論說依是三昧故則知法界一相謂一切諸佛法身與眾生身平等無二即名一行三昧關於一行三昧文殊所說摩訶般若波羅蜜經這樣說法界一相繫緣法界是名一行三昧入一行三昧者盡知恆沙諸佛法界無差別相法界一相繫緣法界這是論文所依而沒有不同的經說恆沙諸佛法界無差別論說佛法身與眾生身平等無二雖各有所重而法義是相通無礙的曼陀羅的另一譯本法界體性無分別經可以推定為與起信論的本覺始覺有關如大乘起信論說本覺義者對始覺義說以始覺者即同本覺始覺義者依本覺故而有不覺依不覺故說有始覺凡夫二乘菩薩佛的始覺本來平等同一覺故起信論立覺與不覺二義因眾生的不覺引向於覺而說始覺其實覺體本來如此平等不二的本覺始覺的安立可說是非常特出的應與法界體性無分別經有關如經上說一一切智心是心如實解本始平等如隨所聞其心體性解知一切眾生體性解知一切諸法體性二無覺無有解無有覺解故即是空也若能如實解布施體性解施體性故解如實始體性解如實始體性故解諸法體性解諸法體性故解諸一切眾生體性三解身口者解覺寂靜解覺寂靜故解眾生寂靜解眾生寂靜故解一切法寂靜解一切法寂靜故解如實始寂靜四知諸法寂故知如實始五覺知住於如實始故是名菩提非住如實始覺知住於如實始故是名菩提上引經文第一則是發菩提心第二至四這三則明六波羅蜜行後一則是證得菩提第一則所說的一切智心就是菩提心經上說一切智心無等等心三界最勝心與摩訶般若波羅蜜經所說是阿耨多羅三藐三菩提心無等等心不共聲聞辟支佛心何以故是一切智心無漏不繫故意義是相近的但經說是心一切智心如實解本始平等與起信論的本覺始覺平等不二相同只是說解而不是覺罷了在上面所引的經文中或說解或說知或說覺或說覺知或說覺解或說解知覺解知三字無疑是可以通用的經上說解如實始體性解如實始寂靜知如實始覺知住於如實始這些文句如解如實始知如實始覺知如實始到底是什麼意義這真不免是文多隱質了這應該是始解始知始覺知由於譯者不善梁言依原文直譯譯為解始知始覺始在漢文中不免難於了解不免文句不通了解一般是了解信解但也不只是一般的了解從海道來廣州的求那跋陀羅於宋元嘉西元四三五四五三中譯出的雜阿含經卷一五說於苦聖諦當知當解於集聖諦當知當斷於苦滅聖諦當知當證於苦滅道跡聖諦當知當修當知當解的解玄奘是譯作遍知的這是對現實生死的徹底知可見雜阿含經當解的解與開解解悟的意義相當所以解也可以是無漏智的與知覺的意義相通從這一意義說是心如實解本始平等等於是心如實覺本始平等而解始也就是始覺了三一行三昧與解脫道論附帶地說到兩點一曼陀羅所譯文殊師利摩訶般若波羅蜜經不但為大乘起信論所採用隋智顗的摩訶止觀也說到常坐的一行三昧隋唐間四祖道信西元五八六五一以來這部經對禪宗的影響更為深遠道信曾遊歷江南所以僧籍在吉州今江西吉安縣在廬山大林寺又住了十年這是天台家的道場所以回到江北今湖北省黃梅在雙峰創開道場弘揚的禪門是在傳統的楞伽經下融合文殊師利所說摩訶般若波羅蜜法門特重常坐的一行三昧到了五祖弘忍也在黃梅弘化西元六五二六七九重視一行三昧的方便在文殊師利所說摩訶般若波羅蜜經中一行三昧是有修習方便的如經說欲入一行三昧應處空閑捨諸亂意不取相貌繫心一佛專稱名字一行三昧是以稱念一佛名為方便的弘忍及他的弟子法如神秀等都著重方便正如杜朏的傳法寶紀所說及弘忍法如大通神秀之世則法門大啟根機不擇齊速念佛名令淨心念佛淨心確是容易普及的難怪能法門大啟了壇經所批評的教人坐原文作座看心看淨不動不起正是這一行三昧的方便常坐念佛淨心然六祖慧能的禪門說摩訶般若波羅蜜也還是文殊師利所說摩訶般若波羅蜜經的法門只是著重深義而已楞伽與般若合一再融合江南有老莊思想的牛頭禪印度禪就演化為有中國特色的禪宗了在禪宗的發展中曼陀羅的文殊般若起著難以估量的大用二協助曼陀羅譯經的僧伽婆羅據續高僧傳說是扶南國人出家後偏業阿毘曇是修學小乘的受具足戒二十歲滿後聞齊國弘法隨舶至都住正觀寺為天竺沙門求那跋陀羅弟子復從跋陀精研方等求那跋陀羅是死於宋太始四年西元四六八的不可能是齊代僧伽婆羅的大乘師大唐內典錄作為求那跋摩弟子復從跋陀研究方等跋陀到底是誰求那跋摩死於宋元嘉八年西元四三一總之僧伽婆羅在齊代的史實並不清楚到梁初除了助曼陀羅譯經外天監五年西元五六起譯出十部原文都是曼陀羅從扶南帶來的所譯的十部大乘以外也有屬於部派佛教的如阿育王經解脫道論解脫道論屬於赤銅鍱部即一般所說的南傳佛教解脫道論約為西元一世紀時優波底沙所造全論分十二品以戒定慧次第論述解脫的正道這部論可說是西元五世紀覺音所造清淨道論的藍本覺音是加以補充抉擇使清淨解脫道的敘述更為正確充實這部解脫道論在中國不能受到佛弟子的重視可見中國已專弘大乘了從解脫道論的譯出可見在扶南的大乘盛行中聲聞部派的佛法也有多少的流行三從扶南來的真諦譯典一真諦的攝大乘論釋從扶南來的真諦三藏在所譯的攝大乘論釋中提到解性這與扶南曼陀羅所譯法界體性無分別經一再說到如實解解始同樣的使用解字這是值得注意的真諦是印度優禪尼人續高僧傳說梁武帝晚年派人送扶南使者回國便中邀請名德那時真諦在扶南遊化可能已有多年受到佛教界的尊重所以彼國乃屈真諦並齎大量經論恭膺帝制既素蓄在心渙然聞命先到達南海今廣州太清二年西元五四八閏八月始屆京邑今南京真諦受到當時政局的影響譯業極為艱困直到陳天嘉四五年西元五六三五六四終於在廣州譯出了攝大乘論與釋論攝大乘論釋是真諦所譯的主要論典依此而北地有攝論宗的宏傳攝大乘論是無著依阿毘達磨大乘經攝大乘品而造的釋論是世親所造世親的攝大乘論釋除真諦譯本外還有隋達磨笈多與唐玄奘的譯本對比三種譯本真諦的攝大乘論釋有補充增附的部分但決不是自己的解說而是有所依據的代表當時一分大乘行者的共同意見二依他性阿黎耶識通二分說攝大乘論是依阿毘達磨大乘經攝大乘品而造的這部經沒有傳譯過來所以不能充分的了解如依攝大乘論的體裁及片段的引述經文可以論定這部經是以虛妄分別的阿賴耶識為依止成立一切唯識的經典但與瑜伽師地論以來的思想有一些差別如依他起性有二分說無漏種子新熏說聖教與道屬圓成實性說多識論與一意識師並存說等這部經的思想立場當然是虛妄唯識說但對西元三世紀以來不斷傳出以真常的如來藏為依止建立一切染淨法的經典採取了溝通的傾向楞伽經與密嚴經約集出於西元五世紀繼承這一傾向而完成了真常唯心說生於西元六世紀的真諦在所譯的攝大乘論釋中不離虛妄唯識卻增多了真常的思想這裡還是先從解性黎耶說起真諦所譯的攝大乘論釋對攝論所引阿毘達磨大乘經此界無始時一切法依止偈有其他譯本所沒有的一段解釋如攝大乘論釋卷一說此界無始時此即此阿黎耶識界以解為性此界有五義如經言世尊此識界是依是持是處恆相應及不相離不捨智無為恆伽沙等數諸佛功德世尊非相應相離捨智有為諸法是依是持是處故言一切法依止依真諦譯此指阿黎耶阿賴耶的異譯識界是以解為體性的所以此界就是阿黎耶識界也就是阿黎耶識的解性日本某學者對於界以解為性作為界是解說為體性的意義的確界字是可以解說為體性的但這裡的以解為性依漢文的文法不可能解說為體性的而且在攝大乘論釋卷三還有這樣說聖人依者聞熏習與解性和合以此為依一切聖道皆依此生這裡的解性難道也可說解說為體性嗎真諦這一段文是引勝鬘經而說的如此界有五義就是勝鬘經說如來藏等五藏究竟一乘寶性論也引用這五藏說解說此界無始時頌攝大乘論立阿黎耶識勝鬘經說如來藏如來藏也就是如來界此識界真諦譯表示了阿黎耶識與如來藏有一種共同的內容所以攝論宗所說的阿黎耶識果報異熟識以外還有解性黎耶阿黎耶識有果報與解性不禁想起了攝大乘論對依他起性的解說如說依他起性有幾種若略說有二種一繫屬熏習種子二繫屬淨品不淨品性不成就這是說依他性的定義有二類不同一繫屬就是依熏習種子而起的名為依他起性這是虛妄唯識瑜伽行派的共同解說二有漏妄識分別此性或成煩惱或成業或成果報則屬不淨品若般若緣此性無所分別則成淨品依他性如為識分別就成為不淨染汙品類如為般若所緣無所分別就成為清淨是染汙或是清淨都沒有定性依因緣而染而淨所以名為依他起性這一解說是非常特出的可以成為染汙的分別性玄奘譯為遍計所執性也可以成為清淨的真實性這染汙清淨不定不成的就是依他性這一見解是出於阿毘達磨大乘經的如攝大乘論卷中說阿毘達磨修多羅中佛世尊說法有三種一染汙分二清淨分三染汙清淨分依何義說此三分於依他性中分別性為染汙分真實性為清淨分依他性為染汙清淨分譬如於金藏土中見有三法一地界二金三土於地界中土非有而顯現金實有不顯現此土若以火燒鍊土則不現金相自現如此本識未為無分別智火所燒鍊時此識由虛妄的分別性顯現不由真實性顯現若為無分別智火所燒鍊時此識由成就真實性顯現不由虛妄的分別性顯現是故虛妄分別性識即依他性有二分從經文及論文的解說比喻中這明顯的是繫屬淨品不淨品性不成就的依他性地界礦是阿黎耶本識一向只見是泥土如一般眾生阿黎耶識由虛妄識而顯現為染汙的分別性礦藏經過開採冶鍊那就顯出純金這如阿黎耶識為無分別智火所冶鍊就顯出清淨的真實性這不是染因生染果淨因生淨果的依他性真實性如金是本來就有的依智火而顯出真實性的清淨法界是了因所了而不是生因所生的依這樣去了解此界無始時的界可以說是生死雜染的因性種子識也可以說是本淨的法界或本淨真如攝大乘論的引經說是站在虛妄識界的立場但經文本義依他有二分當然可通於清淨法界真諦與究竟一乘寶性論都依如來藏解說頌文的界不是沒有根據的識界有二分的思想引起了楞伽經的結合了如來藏與阿黎耶藏識如大乘入楞伽經卷五說如來藏是善不善因無始虛偽惡習所熏名為藏識生於七識無明住地譬如大海而有波浪其體相續恆注不斷本性清淨離無常過離於我論其餘七識意意識等念念生滅瑜伽行派立八識楞伽經也立八識但八識是如來藏藏識心意意識及五識身如來藏是不生不滅的意意識等七識是念念生滅的阿黎耶藏識通二分真相即如來藏是不滅的藏識攝藏的虛偽熏習業相是可滅的這樣瑜伽行派依虛妄分別阿黎耶識的唯識說被統屬於真常的如來藏成為真常唯心說傳說依楞伽經而造的大乘起信論說依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿黎耶識確是有所依據的瑜伽行派以真如會通如來藏但所說的真如即空性圓成實性只是理性與依他起性不一不異而無關於依他起性的因果起滅所以呂澂稱之為性寂在真常大乘經中如來藏不只是性寂也是性覺的如大方等如來藏經說一切眾生貪欲恚癡諸煩惱中有如來智如來眼如來身結加趺坐儼然不動有如來藏常無染汙德相備足如我無異眾生身中的如來藏佛那樣的有智有眼能說只是性寂而不是性覺嗎又如勝鬘經說如來藏空性之智大乘密嚴經說如來清淨藏亦名無垢智那是更明顯的性覺說了楞伽經的偈頌品說內證智所行清淨真我相此即如來藏非外道所知如來藏就是我我能說沒有知性嗎所以呂澂主性寂而否定性覺是不能解說真常大乘經論的這樣真諦引如來藏說說界以解為性是有所據的如前法界體性無分別經所說的解與知覺是相通的所以真諦譯攝大乘論釋所說的此識界是解性又是因性與大乘起信論的心生滅阿黎耶識有覺與不覺二義可說是大致相近的三真實熏虛妄說依阿黎耶識的攝藏種子成立生死的流轉與還滅是瑜伽行派一致的見地說到無漏心的現起當然依出世無漏心種子但在瑜伽行派中對出世無漏心種子是有不同意見的如瑜伽師地論本地分與大乘莊嚴經論都立本性住與習所成二類攝大乘論以為種子是由熏習所成的眾生從來沒有無漏心怎能有本有無漏種本性住呢所以提出了無漏新熏說如論說此出世心從何因生汝今應答最清淨法界所流正聞熏習為種子故出世心得生此聞慧種子以何法為依止至諸佛無上菩提位是聞慧熏習生隨在一依止處此中共果報識俱生譬如水乳此聞熏習即非本識已成此識對治種子是聞熏習若下中上品應知是法身種子由對治阿黎耶識生是故不入阿黎耶性攝此聞熏習雖是世間法初修觀菩薩所得應知此屬法身攝依攝大乘論說種子是由熏習而有的凡愚眾生一向只是有漏心所以不可能成立本有無漏種的這樣出世的無漏心從何而生起呢攝論提出一項意見最清淨法界所流等流正聞熏習為種子故此出世心得生法界是真如的異名眾生位中雖因煩惱等所蔽而似乎不清淨其實本性是清淨的在修行過程中無漏智證法界起初清淨而還不徹底到成佛才是最清淨法界佛體現了最清淨法界為眾生說法眾生從聽聞中理解佛法而熏成的名聞熏習也就是正聞熏習聞慧熏習聞慧種子聞熏習還是世間法但與一般世間法就是高深的哲理神教也都是不同的這因為佛的教法從最清淨法界而來是最清淨法界的等流同類聽聞正法所生的聞熏習能引發一種出世超越世間斷除煩惱業苦的力量眾生的生死業報異熟識是阿黎耶識正聞熏習能引起對治阿黎耶識的力量所以正聞熏習在下中上由聞慧而思慧從思慧而修慧都不是阿黎耶識所攝是法身種子所以是法身所攝在唯識學中一切種子熏習都是依阿黎耶識的聞熏習的性質終究要斷除阿黎耶識的那眾生的聞熏習依止在那裡攝論還是說聞熏習共業報識俱生不過說了善巧的譬喻如乳不是水卻能依水而水乳交融但性質不同終究要達到斷除阿黎耶識的目的這如水乳交融如鵝飲乳而水卻被棄了最清淨法界等流教法是真實性聽聞而正確理解的是耳識與意識是依他起性虛妄分別虛妄的耳識意識受真實的教法影響而成正聞熏習這不是真實熏習虛妄於虛妄識中有了真實性的聞熏習嗎其實真能熏妄在真常的大乘經中都是肯認的真諦的攝大乘論釋說如經言世尊若如來藏非有於苦無厭惡於涅槃無欲樂願真諦所引述的是大寶積經四八勝鬘夫人會楞伽經也引用勝鬘經說依經說眾生的所以能厭生死苦樂欲涅槃是常住不變如來藏的作用因為生滅無常的六識或七識不能保持善惡業也不能保持過去的經驗剎那不住的怎能有厭生死而樂欲涅槃的願望由於如來藏常住不變能保持善惡業而有受生死苦的可能能保持過去的經驗才能在剎那不住的意識中有引起憶念的可能憶念過去現在世的苦才能厭生死苦而樂求涅槃這不是真常的使虛妄識能憶念生死苦而起厭離心嗎如真妄即使不相離沒有影響力這是不可能的真常大乘經的如來藏是真我的異名而唯識學者以真如法界去解說會通但多少存有異義真諦的思想是依阿毘達磨大乘經達成融會的目的但在純正的唯識學者就不免要異議了攝大乘論的無漏新熏說也是引用阿毘達磨大乘經的攝大乘論在說到真實性時說四種清淨如論說此中有偈幻等顯依他說無顯分別若說四清淨此說屬真實清淨由本性無垢道緣緣一切清淨法四皆攝品類攝論但說此中有偈然依安慧中邊分別論疏這二頌是引阿毘達磨大乘經的真實性有四種清淨一本性清淨二無垢清淨是瑜伽行派所共說的三道清淨釋論作至得道清淨是般若等波羅蜜及四念處等助道門四緣緣清淨釋論作道生境界清淨是清淨法界等流教法聽聞教法是引生道及助道法的所緣境四清淨出於阿毘達磨大乘經可見法界等流引生的聞熏習也是出於這部經了攝大乘論特有的教義可說都是本於這部經的四多心論與一意識師攝大乘論的依止勝相品以阿黎耶識為染淨依世間的雜染法世間與出世間的清淨法非依阿黎耶識不能成立說心意識時說到染汙意第七末那識成立的理由又處處說六識這明顯的是八識差別論者應知勝相品中安立十一識或四識成立唯識唯量唯二種種後又有諸師說此意識隨種種依止生起得種種名一段這是一意識師一心論與多心論在部派佛教中成為對立的學派一心論與大毘婆沙論的一心相續論者相近依一心論依根對境不同而說為六識其實只是一意識的相續攝論所說的一意識師引經也還是法句與阿含但真諦譯攝大乘論釋說諸師謂諸菩薩攝論所引述的一意識師顯然是當時的大乘學的一流玄奘譯的攝大乘論世親釋說非離意識別有餘識唯除別有阿賴耶識真諦譯作此中更無餘識異於意識離阿黎耶識此本識入意識攝以同類故阿黎耶識含攝在意識中真諦的見解是偏向一意識師的這類大乘的一意識師也是成立唯識的攝大乘論是多心論者又引述一意識師並存而沒有加以抉擇取捨這是很不尋常的這可能是八識差別是瑜伽師地論本地分的傳統而一心論的唯識學者是阿毘達磨大乘經的一流從論文的內容看來在一意識師成立唯識下引用阿毘達磨大乘經的四法相應能尋能入一切識無塵一意識說極可能是阿毘達磨大乘經的攝論一意識的唯識大乘對起信論作者是有啟發性的起信論的心阿黎耶識意業識轉識現識智識相續識意識六識分別事識這些名詞是從魏譯楞伽經來的然作為先後次第的生起意趣與一意識師相同我曾聯想到一僧伽婆羅所譯的解脫道論有九心輪說如有分與阿黎耶識相當轉動與業識見與轉識所受與現識分別與智識令起與相續識也有相類似的意義二瑜伽師地論卷一真諦曾譯十七地論五卷佚的五心說如率爾心與業識尋求心與轉識決定心與現識染淨心與智識等流心與相續識從細到粗從認識到動作各論都有此前後發展的傾向魏譯楞伽不是起信論的唯一依據可說起信論是博采眾說而自成體系的可參閱拙作大乘起信論講記四結論佛教的傳來中國一向著重於經西域傳來的其實從南方海道來的影響中國佛教也相當的大我因為不能同情支那內學院偏宗唐玄奘所傳護法戒賢一系的唯識學對大乘起信論作否定的攻訐所以民國三十九年講大乘起信論記錄成大乘起信論講記曾略為疏解晚年在法界體性無分別經中讀到如實解本始不二與解始引起深切的注意所以對扶南來的曼陀羅僧伽婆羅傳說是起信論的譯者真諦的譯典略加檢閱覺得扶南傳來的大乘經論有扶南大乘的特色當然這都是從印度傳入的但印度的經論多派別多唯識學也不限於玄奘所傳的那樣為了在當地容易流通傳布者是有某種選擇性與適應性的漸漸的會形成一地的學風以真諦三藏來說雖帶來二百四十夾可譯二萬多卷梵本但弘傳所宗的是瑜伽行派主要是攝大乘論這是依阿毘達磨大乘經攝大乘品而造的這部論依經有特色如依他性阿黎耶識通二分說無漏種子是新熏的以聞熏習為真實性這是真實熏虛妄說多心論而又別說一意識師不加抉擇取捨這是在瑜伽師地論的傳統下而引進阿毘達磨大乘經的思想實際上是在傳統的虛妄唯識的立場引進真常心如來藏學的思想在唯識唯心經典的發展上從解深密經到阿毘達磨大乘經再進就是楞伽經大乘密嚴經由於虛妄唯識學的興盛真常心真常我融攝他引起真常唯心思想的大成在思想演進過程中阿毘達磨大乘經與攝大乘論起著中介的作用真諦是一位虛妄唯識論者但贊同阿毘達磨大乘經與攝大乘論的思想傾向所以在他的譯典中多少引入真常論的思想也以妄識為依止的思想融入真常論中如拙作如來藏之研究所說真諦在陳太建元年西元五六九入滅在真諦生前他的眾多譯典大多流行在嶺南到隋代西元五八九完成了南北統一的大業因北周滅法西元五七四五七七而南下的僧侶才帶著梁陳主要是扶南來的譯典傳入北方以攝大乘論釋為主的南學充實了北方固有的地論宗又發展出攝論宗承受這些思想參考西元五一三北魏翻譯的入楞伽經等綜合融貫而出現了大乘起信論在中國佛教中這部論起著深遠的影響也不妨說是中國人的偉大了我從扶南大乘說到起信論只是不能同意偏執的宗派意識所以從思想演化的觀點作少分的論究在本人對一切佛法的理解還是比較贊同虛妄唯識論的
