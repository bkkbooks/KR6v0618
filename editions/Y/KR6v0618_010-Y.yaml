body:
  text: 我與盧勝彥民眾日報上蓮香的從印順導師的一篇文章說起那是對我的盧勝彥與我而寫的盧勝彥是歸依我的但不是我親自為他歸依的中國佛教的習慣歸依以後頒發一張歸依證作為受歸依的證明盧勝彥在尋找印順導師一文中附有歸依證並注明印順導師親手頒予的歸依證我沒有親自主持歸依禮怎麼能說是我親手頒予的歸依證蓮香卻說與你隔壁居住時勝彥拿了歸依證給你看你看完親手頒交回給勝彥給我看我還他這是後來的事能說是親手頒予頒交嗎蓮香頒予是不能如你這樣解說的我記得盧勝彥從美國回來見我只是我在病中的一次他帶了五個弟子來我沒有說過蓮生努力向前我不知蓮生是什麼怎會這樣說盧勝彥原文說每次返台均拜訪他老人家而且均說蓮生努力向前這與蓮香所說五次回國見過兩次也多少不同了所以盧勝彥的每五次返台均拜訪他均說蓮生努力向前是照著他自己的意思而寫出來的盧勝彥在釋迦牟尼吃肉一文也提到了我他說我的歸依師頂頂大名的印順導師就如此說佛教不是吃素的宗教我從來沒有這麼說對於素食我寫有關於素食問題編入妙雲集下編第八冊教制教典與教學頁九五一八可以參閱他在這篇文字中說我大口喝酒大塊吃肉吃酸喝辣一齊來我才是保持傳統話似乎說得太離譜了也許想到就寫說溜了嘴吧試問釋迦佛大口喝酒嗎在佛制的戒律中出家與在家佛弟子可以任性的大口喝酒嗎如說這才是傳統佛教那真是謗佛謗法了
