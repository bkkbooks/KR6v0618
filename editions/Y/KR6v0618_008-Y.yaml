body:
  text: 為自己說幾句話一七年前搜集些對我的寫作所引起的反應編成法海微波近七年來對我寫作而表示意見的似乎更多一些我不一定能看到看到了也沒有能記憶所以又託人找來一些資料在精神好些時偶爾翻閱在閱覽過程中知道有的反對有的贊同有的贊同而存有自己的想法思想是多元化的異見異忍異欲是當然的現象但讀了這文字的人對我的意見與事實可能會引起某些誤會我雖然虛弱無力寫寫停停的還是多少說明一下的好二先說我的寫作與日本學者及西藏所傳的關係我的大乘三系或作三論說是從太虛大師的三宗來的起初我贊同支那內學院的見解只有法性與法相二宗經過三年閱藏對於大乘佛法覺得虛大師說得對應該有法界圓覺一大流遊心法海六十年六九頁虛大師的三宗說最早見於民國十年的佛法大系立真如的法性論意識的唯心論妙覺的唯智論太虛大師年譜以下簡稱年譜一二三一二四頁十一年為了評破唯識抉擇談作佛法總抉擇談依窺基法苑義林章所說攝法歸無為之主故言一切皆如也攝法歸有為之主故言諸法皆唯識攝法歸簡擇之主故言一切皆般若立般若宗唯識宗真如宗年譜一四五一四八頁其後確定三宗的名稱為法性空慧宗法相唯識宗法界圓覺宗所以我分大乘佛法為三系性空唯名虛妄唯識真常唯心與虛大師所判的法性空慧宗法相唯識宗法界圓覺宗三宗的次第與內容相同契理契機之人間佛教一六頁我的大乘三系說最早提出是民國三十年寫的法海探珍三十一年的印度之佛教除了虛大師所說有所啟發外在這抗戰期間不通日文的我是不可能消化了日本佛教學者的研究成果所以我讀到台灣當代最偉大的思想家說這樣三系的排列方式日本佛教學者高楠順次郎於夏威夷大學講佛教哲學要義時已使用過了福報六十二期我非常歡喜有智者所見相同的感覺近來見到了一本佛教哲學要義是高楠順次郎所著藍吉富譯正文書局於民國六十七年出版的經仔細閱讀竟沒有大乘三系的排列與說明在該書緒論末分佛教為二大類一否定式合理論諸學派有俱舍成實法相三論四宗二內省式直觀主義諸學派含攝了華嚴天台真言禪淨律等宗派一一二頁這確是高楠順次郎著的佛教哲學要義但沒有三系的排列次第那作者為什麼要說日本佛教學者已使用過了呢日本近代的佛學對我是有相當影響的初到閩院求學讀到梁啓超的大乘起信論考證讀得非常歡喜這是引用日本學者研究成果的二十六年在武院讀到高楠順次郎與木村泰賢合編的印度宗教哲學史譯本商務印書館出版這不是談佛法也不知他的正確程度如何但從淵源發展演變而作史的敘述對我探求佛法的方向有著相當的啟發性也就因此墨禪所有的日譯多氏印度佛教史也借來閱覽揣摩但我不是盲從者二十三年初夏在武院對日人名字已忘三論宗綱要譯本商務印書館出版所說如羅什道生曇濟道朗的傳承以高麗朗與河西朗攝山僧詮與餘杭僧詮的混為一人可說無一不誤我以啞言筆名發表震旦三論宗之傳承海潮音十五卷六期一一的加以評破而提出我研究所得的三論宗傳承抗戰結束我經香港到台灣以後的寫作受到日本佛學界的影響要多些三十九年我在香港託人請到一部大正新脩大藏經這是中文的大藏但日本學者對不同版本的校注聲聞經律與巴利藏的比對同異與現存梵文校典的對勘的確給我研究上的不少便利四十一年從台灣去日本買了宇井伯壽的印度哲學研究宮本正尊的大乘小乘等又請了一部日譯的南傳大藏經我雖不通日文但對初期經律論的組織與漢譯聲聞三藏相比對也給了我很大的幫助五十年後為了寫作的參考又託人買了些日本學者的作品我參考日文著作的主要是說一切有部為主的論書與論師之研究原始佛教聖典之集成初期大乘佛教之起源與開展這三部書都說到了參考日本學者的書名然參考主要是資料而已如原始佛教聖典之集成一三頁說後二書為日本學者最近的名著雖然在原始佛教聖典集成之研究中不能隨和二書的意見但對資料上可說得到了最多的幫助上面這三部書關鍵性的重要部分在三十一年所寫印度之佛教已具體而微表達過的印度之佛教第四章四節法毘奈耶之初型重版本六三七七頁可說是原始佛教聖典之集成的雛形摩訶僧祇律雜跋渠與毘尼摩得勒迦的雜事等相近都是牒句而略釋的毘尼本母的發現論定為犍度部的根源原始佛教聖典之集成第五章摩得勒迦與犍度二五一三九四頁就是依此寫成的第九章原始集成之相應教六二九六九四頁及以後寫成的雜阿含經論會編是受到呂澂雜阿含經刊定記的啟發而研討完成的說一切有部為主的論書與論師之研究第二章阿毘達磨的起源與成立四三九頁以舍利弗阿毘曇為古型論定諸法的自體相共相相攝相應因緣為阿毘達磨初期的五大論題也只是印度之佛教第七章阿毘達磨之發達重版本一二三一四二頁的修正與廣說初期大乘佛教之起源與開展所作部派的分化與推定三一五三五二頁是印度之佛教的學派之分裂重版本九七一一二頁的重述日本寺本婉雅譯注的多氏印度佛教史列舉部派分化的不同傳說三六三三八二頁這些資料使我能從比較中作出論定大乘佛教的起源印度之佛教已多少說到一四三一四九頁一七九一八頁這三本書的主要依據是在早年凝成的理念下完成都是引用漢文大藏經來說明的民國五十九年我寫了一部中國禪宗史傅偉勳關於佛教研究的方法與迫切的課題中說我們中國學者還得仰賴常盤大定數不清的日本行家的著作從梁任公印順法師中國禪宗史的撰著必須引用柳田聖山等人的研究成果一九九年佛光山佛教學術會議實錄五三頁這部書我曾參考日本學者的著作但必須引用柳田聖山等人的研究成果卻是未必這本書引用的資料中國人說中國事我不覺得要參考外人的在寫作過程中偶然的在性圓處見到他胞兄林傳芳長在日本的存書中有有關禪宗的日文書也就借來參考一下柳田聖山初期禪宗史書之研究以為無相戒般若三昧七佛二十九祖說是牛頭六祖慧宗所說鶴林法海所記的神會晚年把他引入自宗由門下完成我不能同意他的見解曾加以評破中國禪宗史二六七二六八頁所以說我必須引用柳田聖山等的研究成果未免想入非非有人說沒有說你抄襲柳田聖山那也算難得了我覺得中國佛教太衰落了相形見拙中國佛教學者多少有些崇外心態似乎非引用日本人的研究成果從日本人的研究成果出發不可我從不反對參考吸收外國人的研究成果但自己不通外文只能以漢文藏經為主要依據不能廣泛的引用外人的研究文獻這是我最大的缺點希望讀者與評者不要以為我能消化日本學者的研究成果平添我虛偽的光榮三多氏的印度佛教史從無著世親到中觀與唯識者的論諍秘密大乘佛教的廣泛弘傳我的確是大多採用這本書的龍樹以前從釋尊時代到部派分化政局紛亂我是多取我國所傳及牛津大學的印度史西藏所傳大乘只有中觀唯識多氏的印度佛教史作者是覺囊巴派是真常唯心論者也自稱唯識見所以說多氏的印度佛教史提貢了他對印度佛教發展史的基本架構台灣最偉大的思想家見福報二十六期是我所不能同意的民國二十七年秋我從武昌到四川住縉雲山漢藏教理院讀到宗喀巴所著的菩提道次第廣論密宗道次第廣論辨了不了義善說藏論月稱的入中論是遲幾年才讀到的從宗喀巴的著作中接觸到月稱對中論空義的解說所以深受老莊影響的中國空宗三論宗我對他不再重視妙雲集下編十華雨香雲二二頁不過我對月稱的思想並沒有充分了解如月稱的中論注明顯句論我也沒有見到也許我有中國人的性格不會做繁瑣思辨從宗喀巴月稱那裡得些消息就回歸龍樹大智度論三十一年起講出而成的中觀論頌講記三十六年講出的中觀今論都是通過了大智度論三法印即一實相印的理念所以說中論是大乘學者的開顯阿含深義中觀論頌講記四三頁中論確是以大乘學者的立場確認空緣起中道為佛教的根本深義與聲聞學者辯詰問難並非破斥四諦三寶等法反而是成立抉發阿含的緣起深義將佛法的正見確立於緣起中道的磐石中觀今論二四頁總之我重視前期的龍樹學不是月稱應成派的傳人我與月稱思想的關係很少人提及唯一例外的是江燦騰居士他對月稱的思想似乎與我差不多知道得有限但他卻能從想當然的意境中作出論斷如說我是月稱的著作則提貢了他三系判教的理論基礎福報六十二期我的大乘三系是依虛大師的大乘三宗說次第內容都可說相同我的大乘三系說最早發表的是三十年寫的法海探珍那時我還沒有讀到月稱的入中論據我所知月稱與宗喀巴承認大乘有瑜伽行與中觀二大流而作了不了義的分別與支那內學院所見的相近他說月稱的著作提貢了他指印順三系判教的理論基礎不知他到底根據些什麼更離奇的他說印順以月稱入中論為依據撰寫唯識學探源學術成就甚高也未引起社會的注意新雨期二一頁入中論的譯出是民國三十一年四月十日於縉雲山漢藏教理院編譯處論末我的唯識學探源是民國二十九年在貴陽大覺精舍寫的那時入中論還沒有譯出我又不識藏文怎能以入中論為依據寫出唯識學探源而且入中論第六地是廣破唯識的我寫的是探求唯識學的淵源內容完全不同到底為了什麼要說我以月稱為依據還有他說印老事實上是透過月稱和宗喀巴的中觀思想來批判中國的傳統佛教當代三七期一四頁在他論印順法師與太虛大師對人間佛教詮釋各異的原因中也有類似的語句這也使我感到離奇我所批判的不只是中國傳統佛教還有印度後期神秘欲樂的傳入西藏的佛教月稱我不太知道只知入中論也說到持咒宗喀巴所樹立的黃教是通過菩提道次第要你知道不是要你廣修菩薩行而進修神秘欲樂他力急證的密宗道次第如法尊能海去拉薩修學不都是學得無上瑜伽的大威德而回來嗎這正是我所要批判的我會用他們來破斥中國佛教嗎我所依據的是中國傳譯的龍樹大智度論如敬答議印度之佛教無諍之辯一二一一二二頁說於大乘中見龍樹有特勝者非愛空也言其行則龍樹擬別創僧團而事未果其志可師言其學三乘共證法性空與本教之解脫同歸合惟初重聲聞行果此重菩薩為異耳言菩薩行則三乘同入無餘而菩薩為眾生發菩提心此忘己為人之精神也不雜功利思想為人忘我之最高道德於菩薩之心行見之以三僧祇行因為有限有量此任重致遠之精神也常人於佛德則重其高大於實行則樂其易而速好大急功宜後期佛教之言誕而行僻斥求易行道者為志性怯劣盡其在我之精神也蓋唯自力而後有護助之者菩薩乘為雄健之佛教為導者以救世為己任者求於本生談之菩薩精神無不合以此格量諸家無著系缺初義起信論唯一漸成義禪宗唯一自力義淨之與密則無一可取權攝愚下而已我是這樣的評判印度佛教也同樣的評判中國傳統佛教與月稱宗喀巴有什麼關係四我的大乘三系或三論性空唯名虛妄唯識真常唯心是繼承太虛大師的三宗法性空慧法相唯識法界圓覺次第與內容都是一致的名稱不同只是取義不同大師在議印度之佛教中也說佛陀行果讚仰而揭出眾生淨因之真常唯心論並沒有責難立名的不當那有關大乘三宗我與大師的差別在那裡這應該是由於修學的環境不同引起傳統與反省的差異當然也由於不同的個性虛大師十七十九歲一九五一九七讀法華楞嚴經在天童寺聽法華經習學禪堂生活聽道老講楞嚴經閱楞嚴蒙鈔楞嚴宗通愛不忍釋年譜二六三一頁閱藏期間一九一四一九一七初溫習台賢禪淨諸撰述尤留意楞嚴起信於此得中國佛學綱要于會合台賢禪的起信楞嚴著述加以融通抉擇從楞嚴提唐以後的佛學綱要而楞嚴攝論即成於此時年譜八四八五頁當時雖有政治的革命而大師接觸到章太炎譚嗣同等有關佛學的文字都還是宋以來的佛法傳統大師心目中的中國佛學就這樣的凝定了用來適應時代以從事中國佛教的復興運動直到晚年大師對中國佛教的衰落及說大乘教修小乘行的情況歸因於佛教徒對唐以來傳承的一切佛法在進行佛教革新運動中認為一切經是佛說的也就是說法是完善的而中國佛教的衰落問題在學佛法的人大師晚年民國三十三十二年由於發現門下思想的脫離中國傳統針對藏傳中觀講諸法有無自性問題撰閱入中論記對我的印度之佛教作議印度之佛教再議印度之佛教特在漢院講天台四教儀與中國佛學賢首五教儀及重禪觀的中國佛學我出家後民國二十年一九三一到虛大師任院長的閩院求學那學期的課程是三論玄義俱舍論雜集論日文與國文還有一門社會學在武院抗戰期間到漢院功課都相近漢院多藏文菩提道次第論等中國傳統的台賢禪淨似乎都不太重視這一學習環境與大師學習重心是不太一致的在我學習時期政局不穩定更有長期的抗日戰爭在佛學方面有西藏傳來的有日本學者著作的譯本南傳佛教也有一些介紹佛學不再是大師學習時代的單純了特別是我的根性不同在家時以三論唯識為研究對象理解到的佛法與現實佛教界的差距太大這是我學佛以來引起嚴重關切的問題這到底是佛法傳來中國年代久遠受中國文化影響而變質還是在印度就是這樣高深的法義與通俗的迷妄行為相結合呢遊心法海六十年五頁經過出家來八年的修學知道佛法為中國文化所歪曲的固然不少而佛法的漸失本真在印度由來已久而且越到後來越嚴重所以不能不將心力放在印度佛教的探究上遊心法海六十年一三頁在武院期間讀到日本高楠順次郎與木村泰賢合編的印度哲學宗教史等使我探求佛法的方法有了新的啟發從現實世間的一定時空中去理解佛法的本源與流變漸成為我探求佛法的方針遊心法海六十年九頁我對佛教史的探究不是一般的學問為研究而研究而是探其宗本明其流變抉擇而洗鍊之不違反佛法的本質從適應現實中振興純正的佛法契理契機之人間佛教二一頁中國佛教的衰落虛大師在人上著想雖說學理法革命而革新的只是適應時機的方便我當然也知道人的低落與墨守成規但從史的探求中確認佛法的衰落與演化中的神天化庸俗化有關遊心法海六十年五四頁佛教的衰落從印度到中國不只是人的低落而也是法的神化俗化由於這一理念不同在大乘三宗或三系的討論上呈現出彼此間的差異大師說三宗平等其實也有不平等而以宋以來的佛法傳統法界圓覺宗為最高妙為了支持這一理由以馬鳴的大乘起信論為早於龍樹無著的而我以為能立本於釋迦佛時初期佛教之淳樸宏闡中期佛教初期大乘經與龍樹論之行解梵化之機應慎攝取後期佛教虛妄唯識真常唯心之確當者庶足以復興佛教而暢佛之本懷也歟印度之佛教自序七頁我在大乘三系中重視性空唯名弘闡中期佛教之行解讀者可能多少有些誤解如現代中國佛教思想論集一論列我與虛大師對人間佛教詮釋各異的原因說印順法師基於緣起性空的義理是源於阿含光大於中論不能順從太虛大師的觀點據西藏月稱詮釋的中觀空義批評中國佛教圓融的特質一五一五二頁說我贊同緣起性空是正確的但我重視初期大乘經論並不只是空義而更重菩薩大行我不是西藏所傳的後期中觀學者是重視中國譯傳的龍樹論中論大智度論十住毘婆沙論所以在敬答議印度之佛教說於大乘中見龍樹有特勝者非愛空也並提出會通阿含及忘己為人任重致遠盡其在我的偉大的菩薩精神無諍之辯一二一一二二頁其實這在印度之佛教自序中早已說過了的而且龍樹在闡述菩薩廣大行中對念佛免難功德迴向眾生懺悔罪業煩惱即菩提易行與難行頓入與漸入等凡有他力的速成的也就是神教化傾向的都有不同印度後期論師的卓越見解智度論在印度失傳後期的中觀學者那裡知道佛世之淳樸虛大師是同意的那麼離佛世還不久多少天化而不太離譜時代的佛教總比後期的天佛一如好天神佛一如不只是魔梵混融的秘密大乘在真常唯心系中如大集經的寶幢分及楞伽經早已明白的說到如我在方便之道所引述的華雨集二冊一四一六頁我的意見是在印度佛教史中探求天神化漸漸的嚴重達到神佛不二的過程在這一發展過程中抉取初期大乘經龍樹論闡揚大乘解行而又能會通阿含我不是要依緣起性空而與真常唯心論諍的該文說要說服太虛大師放棄法界圓覺改宗緣起性空是很難的他的思想傾向宗教體驗都不是那一路線又怎麼能說服他改變自己去接受他所以我們說這是沒有標準答案的揀擇只在乎個人了現代中國佛教思想論集一一五五頁我在印度之佛教等提出我的大乘三系我是從經論發展的探求中認為初期的大乘經龍樹論性空唯名系是會通阿含而闡揚菩薩道的更契合釋尊的本懷我寫出來提貢佛教界參考對秘密大乘即天化的不表同意在那時現實環境中明知會毀多於譽的但為佛法著想還是不顧一切的表達出來這不是要與虛大師論諍也不是希望他的改變虛大師的思想凝定到那時快近三十年了希望他放棄而改宗那我真是太天真幼稚了說到宗教體驗我相信不但佛教其他宗教與低級巫術都是有些宗教體驗的不過淺深偏正不一罷了有宗教體驗的信心十足但並不等於事實或真理低層次的宗教體驗與自己的信仰自己所聽聞的有關閱讀或信仰什麼在靜定精神集中中就引發什麼體驗如讀法華經的就會引發靈山一會儼然未散的體驗現代少數基督徒把習禪引入自宗於是靜定中有見到馬利亞懷抱著孩兒有見背著十字架的耶穌所以宗教思想的淺深偏正不只以自己的宗教體驗為準繩還是要在自己表達出來求得他人的共識大師的思想法界圓覺宗有宋以來的千年傳統要在佛教界取代他還真不容易呢五虛大師說人生佛教也說人間佛教我為什麼要專說人間佛教呢虛大師說人生佛教是針對重鬼重死的中國佛教我以印度佛教流入西藏的天神化情勢異常嚴重也嚴重影響到中國佛教所以我不說人生而說人間希望中國佛教能脫落神化回到現實的人間遊心法海六十年一八一九頁虛大師分自己的思想為三期一民國三年七月閉關以前二從閉關到民國十七年冬遊化歐美主張大乘的八宗平等八宗並弘三從遊化歐美到二十九年五月訪問緬印錫回來如我怎樣判攝一切佛法所說的第三期是大師的晚年定論內容分教之佛本及三期三系理之實際及三級三宗行之當機及三依三趣所說的三依三趣是一依聲聞行果趣發大乘心的正法時期二依天乘行果趣獲得大乘果的像法時期三依人乘行果趣進修大乘行的末法時期像法時期印度進入第二千年的佛法正是傳於西藏的密法中國則是淨土宗如密宗在先修成天色身的幻身成化身佛淨土宗如兜率淨土即天國之一西方等攝受凡夫淨土亦等於天國依這天色身天國土直趣於所欲獲得的大乘佛果這是密淨的特點但到了現在末法開始依天乘行果的密淨是要被謗為迷信神權的不惟不是方便而反成為障礙了年譜四八四八一頁大師在再議印度之佛教也說淨密應復其輔行原位不令囂張過甚這是判淨密為附庸雖是法界圓覺但不再八宗並弘那樣的看作大乘主體了所以淨土與密乘在人間佛教中我與虛大師是一致的不過虛大師點到為止我卻依經論而作明確的論證如淨土法門我依龍樹十住毘婆沙論無著攝大乘論等傳為馬鳴所造的大乘起信論代表印度的大乘三系說明這是為生性怯劣所設的方便不是大乘菩薩的正常道台灣當代淨土思想的新動向中說淨土信仰既是中國佛教近世的主流印順法師在批評中國佛教時自然無法避開可是又不能沒有替代於是取與佛教早期思想淵源較深且又下生成佛的彌勒信仰替代西方往生的彌陀淨土淨土新論的思想和心理轉折都是由此一念而來人間淨土的追尋二一頁我從來沒有這樣的心理轉折這是作者代為設想的彌勒淨土也是天國土但由於彌勒將來下生成佛為中國人所嚮往的人間淨土龍華三會而當時又流行彌勒系的法相唯識所以彌勒淨土是虛大師一向提倡的如民國十三年元旦虛大師編慈宗三要三要是瑜伽的真實義品菩薩戒本與觀彌勒上生兜率天經年譜一六八頁十四年冬大師修彌勒七過舊年年譜二一五頁大師的慈宗要藏敘說轉逢長老自小雪峰攜古銅彌勒菩薩像至乃就南普陀寺後山兜率陀院設慈宗壇以奉之民二十一二十二年之交旦夕禪誦其中皈依者浸多有慈宗學會之設年譜三五二頁到三十五年五月大師應上海佛教界請講佛說彌勒大成佛經於玉佛寺年譜五二六頁三十六年三月大師於玉佛寺示寂弟子們助念彌勒聖號祝上生兜率再來人間年譜五三八頁虛大師提倡彌勒淨土只要是大師門下是無人不知的我只是繼承虛大師的遺風怎能說這是我與虛大師間的差異所在六民國四十二四十三年間我受到漫天風雨的襲擊我說真正的問題是我得罪了幾乎是來台的全體佛教出家同人華雨香雲六五頁楊惠南的台灣佛教的出世性格與派系鬥爭以為問題恐怕沒有那麼單純因為這還應該牽涉到印順的老師太虛太虛代表的是開明的改革派而圓暎則由江浙佛教界所擁護代表保守的傳統勢力當代三一期七四頁虛大師所代表的是適應時勢從革新中以發揚中國的佛教傳統所以被稱為開明的改革派新派是贊同改革運動的接受虛大師主辦的僧教育的依此說來台的慈航默如戒德印順東初依入閩院先後次第等都是閩院的學僧慈航以新僧自居在住持安慶迎江寺期間曾推動安徽佛教的改革呢年譜二九五頁民國十九年道源那時名能信也住過武昌佛學院所以我遭受的漫天風雨不能說沒有派系但如泛說江浙佛教界為保守勢力那顯然是與事實不符的江燦騰說關於佛法概論事件點出他來台灣進住善導寺以及佔了赴日代表的名額是整個事件的內在主因但是他忽略了思想上的差異才是根本原因所在例如他提到漫天風雨三部曲其一是圍勦圓明其二是慈航為文批他其三是反對派向政府檢舉而其中一和二即是思想上的差異所引起的當代台灣俠客誌二四頁說到思想問題我的印度之佛教是在重慶出版的台灣僅有三四冊自己的一冊不知丟在那裡了我來台不過一年這部書的思想一般是不大知道的當時在香港出版而流傳來台的是經與論的講記唯一引起注意的是淨土新論說他引起台中蓮友們的不滿我是同意的但對來台的長老與青年主要在北部不可能因此而引起大問題的我們還是聽聽中立者的意見吧道安法師遺集的日記中說四十二年七月十日現在來台灣的僧侶派系頗重反對印順李子寬太虛派的人太多了最少這一派是反對最厲害的人這中間不無蛛絲馬跡可尋七冊一一六五頁四十二年十二月廿四日慈航法師因二心及之唆使說印順根本不把他放在眼裡他聽了滿腹無明火高燒須彌山加之又以圓明罵他稱讚印順更是火上加油他寫文的動機無非是眼紅與受人愚弄而已印順乃一學者並無做大師之心從不與人爭名利因去年不該出席日本世界佛教聯誼會與來台住善導寺佔了他的位置以為印順不來善導寺的導師就是他的又加圓明要台灣的法師們都應當向印順學習的話更引起他們無限嫉恨的悶氣無處發洩這真是佛門無謂的風波七冊一二七九一二八四頁四十四年七月十八日前年農曆年底對印順之佛法概論利用中佛會發文通告台灣各寺院不得流通現在還不甘心又從中向警察局搗鬼印順真不值得遭人陰謀八冊一四一一頁道安法師遺集的當時日記不是與我平凡的一生所說的幾乎完全一致嗎大家為什麼要圍勦圓明慈老為什麼要寫假如沒有大乘如離去當時的事實背景泛說思想問題那是與事實不符的七獅子吼三十二卷六期有釋悟廣的大乘道風光無限文中引用大智度論以外大量引我的作品而附上作者自己的解說讀者很可能誤會以為他的解說就是我的見解所以要略辨一二他說導師所說學佛者當前的唯一目標須陀洹果十四頁下解脫道則是菩薩心行根本的根本解脫的正道加菩薩行等於菩提心十三頁上留惑潤生的惑絕不是惑業苦的惑確切的說是一種對眾生的悲心十三頁上這近處也就是根本佛教的純樸處解脫道十三頁上在一切佛法中我是宏闡中期佛教之行解也就是宏揚初期大乘的菩薩行深觀而廣大行的菩提道而不是初期佛教一般稱之為小乘的解脫道我的論究佛法有一原則在大乘法中依中觀來說中觀依唯識來講唯識依真常來講說真常的經論在論到聲聞乘的解脫道時也依聲聞法說決不依自己所宗重的而附會歪曲聲聞是解脫道菩薩是菩提道雖意義有相通處菩薩得無生忍含攝得聲聞的解脫道但菩提道決不是出發於斷煩惱的上述的四則中說證得初果是學佛法者當前的唯一目標是我在成佛之道中講三乘共法聲聞的解脫道而說的作者引此去解說菩薩道如說初發心的菩薩們要發心做菩薩要成佛度眾生先發斷自己煩惱的心至少要能斷無量生死的煩惱十四頁下這與我的解說菩薩發心是不相合的二則作者為了要說明菩薩要先修解脫道斷盡煩惱所以作出了新的解說菩提心是菩薩發心上求佛道下化眾生也就是從利益眾生中漸次增進到達圓滿的佛果初發菩提心是行菩薩道的信願可說是菩薩最偉大的志願他卻說解脫的正道加菩薩行等於菩提心這是作者所說佛法中從來沒有聽說過的怪論留惑潤生佛法中為什麼要說留惑潤生是什麼意義作者可能沒有考慮過也就是沒有了解菩薩為什麼要留惑照他自己的見解菩薩要先修解脫道斷盡無量生死煩惱再來度眾生所以想入非非的說留惑的惑是一種對眾生的悲心稱悲心為惑煩惱善惡不分這是末世佛法的又一怪論我說菩提心大悲心空性見三者是修菩薩行所必備的切勿高推聖境要從切近處學習起作者竟解說切近處為就是根本佛法的純樸處解脫道我寫作的原文是契理契機之人間佛教五九六頁讀者如檢閱原文就可以了解作者以解脫道來解說切近處的錯誤了其實這決不是無心的錯失或由於佛學知解的不足或是為了自己推重解脫道故意對菩薩行作出這些歪曲的謬論八聖嚴印順長老護教思想與現代社會說從這一點看印順長老倒頗近於只會看病而拙於治病的學者風貌佛教新聞九二期一三頁江燦騰佛學研究與修行說會有人用來批評印順說是佛教思想的巨人是行動實踐的侏儒引滄海文集中三四六頁二位所說可說非常正確我就是這樣的人不過說是思想的巨人未免稱譽過分了我曾一再表明自己一生為法的意趣虛大師所提倡的佛教教理教制教產改革運動我原則上是贊成的但覺得不容易成功出家以來多少感覺到現實佛教界的問題根本是思想問題我不像虛大師那樣提出教理革命卻願意多多理解教理對佛教思想起一點澄清作用遊心法海六十年七頁我不是為考證而考證為研究而研究的學者我只是本著從教典得來的一項信念為佛法而學為佛教而學希望條理出不違佛法本義又能適應現代人心的正道為佛法的久住世間而盡一分佛弟子的責任契理契機之人間佛教四七頁我覺得善財所參訪的大家都說我但知此一法門似乎專一對學習菩薩的初心學人也許會更落實些當然大菩薩們是不在此例的從一段事說起當代二十八期發表了台灣當代淨土思想的新動向說到我的淨土新論等有大批燒毀其書者並注明少數教徒即指大名鼎鼎的李炳南老先生台中炳老的弟子們覺得這篇文字有損炳老的完善形象經朱斐偕來南投認為這是無稽的謠言希望被人燒書的我代為炳老澄清我是經不起人家說好話的也就答應了寫了一篇台灣當代淨土思想的新動向讀後我只說傳播的謠言越來越多傳說我的念佛淺說被少數教徒焚毀那時的流言傳說非常多傳說是越說越多的傳說就是傳說是不用過分重視的華雨集五冊一二一三頁我將文稿寄給朱斐台中蓮友們見了表示不滿意我告訴大家當時我人在台北聽到的都是傳說原文注明是說的如經人不滿我的否認提出質問我要怎麼應付呢這篇文稿就寄給當代我當時覺得自己的寫作與思想不能為現實的佛教界所採取也就不免有些感慨所以在該稿末後寫下一句也許我是一位在冰雪大地撒種的愚癡漢這篇文稿當代的編輯者改以冰雪大地撒種的癡漢為主題台灣當代淨土思想的新動向讀後為副題這一題目冰雪大地撒種的癡漢引起了緣音昭慧洪啓嵩楊惠南等法師居士們寫作詩文來表示敬意由於編者擅自改變題目引起意外的反應使我深感佛教同人的為法熱誠更深感自己的愧赧幻生為印順導師說幾句公道話說到聖嚴法師出版他的博士論文明代的佛教印公導師也予以資助獅子吼二九卷七期三二頁上這是不正確的不知怎會引起這樣的傳說而為該文所引用也許聖嚴在日本時助我取得博士學位為當時某些人所反對譏嫌而有這離奇的傳說值得寫的事與理應該還有不少無奈衰朽餘生時寫時輟好不容易交代了一些重要問題只好就此擱筆了
