body:
  text: 自序這本書應該是我最後的一部民國六十年夏將以前的寫作與講記除獨立成部的分類而集成三編二十四册那時多住嘉義的妙雲蘭若所以名為妙雲集五十四年起我多寫成研究的大部短篇的就少了七十八年才將寫作與紀録的編集為五册六十七年秋以來多住台中的華雨精舍所以名為華雨集七十五年初冬感到身體的不舒適大甲永光寺的真智來見我我慨歎沒有一適當的地點可以靜養他説有南投山上有一房屋空著我曾去住過兩天我當天就去看看空屋在南投南岡工業區後面半山右方與後面都是樹木的確安靜這樣我就時常去住主要是夏天這所房屋是大甲李居士的在我的寫作中曾稱之為南投寄廬後來房屋奉獻給永光寺這才名為永光別苑作為永光寺僧短期修持與養病的地方在這永光別苑集成這一册所以就名為永光集八九老僧印順序大智度論之作者及其翻譯前言大智度論以下簡稱智論是摩訶般若波羅蜜經的釋論目前梵本無存僅有漢文譯本為鳩摩羅什所譯智論作者向來傳是龍樹但是近代學者如比利時的日本的干潟龍祥平川彰和加藤純章對此定論或則否定或則修正否定者如認為智論並非龍樹所作而係某一西北印度説一切有部而轉學大乘之學者所造加藤純章甚至認為作者不但不是龍樹而且很可能來過西域在此完成羅什也參與此一著作修正者如干潟龍祥雖仍肯定智論為龍樹所作但是以為鳩摩羅什在漢譯過程中已有所增修這些觀點詳見於左列論文一著郭忠生譯大智度論之作者及其翻譯諦觀第六二期民國七九年七月頁九七一七九二干潟龍祥著大智度論作者印度學佛教學研究第七卷第一號昭和三三年十二月頁一十二三平川彰著十住毗婆沙論著者印度學佛教學研究第五卷第二號昭和三二年三月頁一七六一八一四加藤純章著宏音譯大智度論的世界諦觀第五二期民國七七年元月頁一四七對於龍樹造論的古説學者們不同程度的否定性結論我覺得值得商榷審視其論議往往未能把握論典的特色未曾考量翻譯的過程但八六老僧已是衰病餘生不能完成寫作的心願了虧得昭慧法師願意發心所以特為他提供資料敘説些我的意見由他整理寫出發表以盡中國佛弟子應盡的一分責任大智度論對千餘年來的中國佛學影響極其深遠早年研讀斯論曾將相關論義分別類集對本論用心不少也曾有意依此寫就專篇説明龍樹對佛法的完整看法但因時間不充分這一心願未能完成外國學者對智論作者的看法我近來才透過期刊譯文而得悉其詳他們能突破語文障礙而研究這部僅存漢譯的大乘重要論典其資料搜羅之豐其用力之勤皆殊為難得我雖不能完全同意他們的論點卻因此一增上緣而促成本文的撰述少分達成早年的心願這只能説是因緣不可思議吧第一章大智度論之翻譯第一節從佛典漢譯的程序談起晉代佛教聖典的翻譯與現在的個人翻譯是不同的如增一阿含經的翻譯依道安的增一阿鋡經序説經是外國沙門曇摩難提所誦出的佛念譯傳曇嵩筆受余與法和共考正之僧略僧茂助校漏失這是沒有梵本由曇摩難提背誦出來的佛念譯傳是翻譯梵文為中國語文的也還是口説將它筆記而成漢文的是曇嵩再由道安與法和考正文義僧略與僧茂助校漏失所以雖題作曇摩難提譯其實他只是誦出而已在古代譯經是集體事業依梵本古稱胡本而譯出也是集體完成的如鳩摩羅什譯諸經論當然包括大智度論羅什也只是將原文口譯為中國語文其中筆受的證義即論證義理的潤文的人還真不少呢所以因智論是羅什所口譯出的見到某些可疑就想像為羅什所加筆改變的那是沒有注意到古代譯經的實際情形了智論是摩訶般若波羅蜜經的釋論所以羅什是先譯經後譯論而又同時譯成的經的譯出如出三藏記集卷八大品經序大正五五五三中説弘始五年歲在癸卯四月二十三日於長安京城之北逍遙園中出此經羅什法師手執胡本口宣秦言兩釋異音交辨文旨秦王躬覽舊經驗其得失與諸宿舊義業沙門釋慧恭道悰等五百餘人詳其義旨審其文中然後書之以其年十二月十五日出盡校正檢括明年四月二十三日乃訖引文中括號內之文字為作者所加下同大品般若經的譯出當時的秦王姚興親自參加又有五百多位義學沙門詳審文義執筆寫成漢文的是僧睿當時的譯場是相當莊嚴鄭重的接著就翻譯釋論如僧睿的大智釋論序説經本既定乃出此釋論但論後的後記卻説是弘始七年十二月二十七日乃訖後記與僧睿的論序時間上似乎有點不合我以為後記作者會編經論為一了先譯經後譯論在智論的翻譯過程中發現經文與論文不合的就加以改正如大品經序説以釋論撿之猶多不盡是以隨出其論隨而正之釋論既訖爾乃文定經與論先後譯出論訖而後經定經論會編為一也就不妨説經與論同時譯出了僧睿的摩訶般若波羅蜜經釋論序大正二五五七中下説羅什法師於秦語大格唯識一往方言殊好猶隔而未通進欲停筆爭是則交競終日卒無所成退欲簡而便之則負傷於穿鑿之譏以二三唯案譯而書都不備飾幸冀明悟之賢略其文而挹其玄也羅什留住姑臧今甘肅省武威縣十七年才來到長安對秦語中國語文他是能説能寫的但佛典的譯出是給中國人讀的不但要文義通順明確還要有漢文的文學意味這樣才能引起讀者的愛好使佛法廣大流通從這一觀點來看羅什的秦語還是不夠水準對漢文的特色文學的優美方言殊好是沒有深入通達的如早期譯出的百論由於譯得太差弘始六年又重新譯出大品般若經原已譯出但在智論的譯出中對於經文又隨時加以修正這些都可證明在僧睿等衆多義學沙門的眼中羅什的秦語還是不大理想的面對羅什秦語能力不太理想之局限僧睿等筆受者有點無可奈何如果放下筆來好好的論究原本與秦語間的恰當性又要面臨譯場中人多口雜不容易得到定論的難題如果依據譯語譯語太繁而改寫成簡要而便於受持的論文又不免要被譏諷為穿鑿附會於是只好決定譯者怎麼説他們就怎麼記既然沒有好好的潤飾辭藻所以也只好要讀者略其文而挹其玄了雖然有這樣的局限但僧睿等筆受者終究不會忘記這是秦語譯本是為中國人而翻譯的第二節大智度論的卷數佛經的注釋在古代是經與論分別流傳的我國智顗的妙法蓮華經文句澄觀的大方廣佛華嚴經疏也還是這樣但大智度論一百卷實際上卻是經論會編摩訶般若波羅蜜經三十卷釋論七十卷出三藏記集卷二在大智論百卷的目録下還説到或分為七十卷但一般都將經論會編本稱為大智度論而説是百卷了論文的卷數在翻譯時就傳説為大智度論百卷更有誤傳為千卷者這就難怪要引起近代學者的懷疑了在此先引僧睿的經序與論後記再來解説出三藏記集卷一大智釋論序大正五五七五上中説論之略本有十萬偈偈有三十二字並三百二十萬言胡夏既乖又有煩簡之異三分除二得此百卷於大智三十萬言玄章婉旨朗然可見此論胡文委曲皆如初品法師以秦人好簡故裁而略之若備譯其文將近千有餘卷大智論後記大正五五七五中説論初品三十四卷解釋一品是全論其本二品已下法師略之取其要足以開釋文意而已不復備其廣釋得此百卷若盡出之將十倍於此智論百卷是經與論會編所成的如除去經文三十卷論文實在只有七十卷初品譯為三十四卷若經文一卷不計則論文為三十三卷二品以下是三分除二的略譯換言之論文七十卷扣去初品三十三卷則二品以下的論文實為三十七卷這三十七卷是三分除二的略譯近代學者都把智論所釋經本當作是二萬五千頌本其實智論末卷分明説到如此中般若波羅蜜品有二萬二千偈大般若品有十萬偈二萬二千偈的經本譯成經文有三十卷以此類推論本十萬偈約可譯成百三十六卷這是尚未略譯之原形除去初品論文三十三卷應該還有百零三卷但如今二品以下略譯為三十七卷那正是三分之中略去一九分所以古説三分除二可説是非常的正確但由於經與論合編為一泛稱大智度論百卷於是不免引起若干誤會一把合編百卷當作論文百卷二本來經文解釋大都是先詳後略的而智論的翻譯也是前詳後略僧睿等忽略了這點於是以為初品以一卷經文而得三十三卷釋論共為三十四卷那麼三十卷經的全部釋論其實是經論會編豈不是將近千有餘卷嗎那豈不是目前百卷本的十倍三誤以為智論原形將近千有餘卷於是推想現有十萬偈百卷的論本為略論這層層誤解都從經論會編而來後來大智度論百卷的説法傳到江東廬山慧遠在大智論抄序説約本略本以為百卷計所遺落殆過參倍他以為詳本智論應有三百卷以上那是三分除二引起的又一誤解三分除二得此百卷於大智三十萬言玄章婉旨朗然可見這幾句漢文意思非常明白百卷論文其實含有經文三十卷論文七十卷對摩訶般若波羅蜜經大智三十萬言已解釋得非常明白了但是由於僧睿等對智論卷數算法錯誤於是也引起近代學者的誤解以為大智三十萬言指的是智論所以説原本共有十萬偈若全部譯出將有一千卷其譯本僅一百卷約三十二萬中國字他把三十卷經的三十萬言錯會成百卷經論會本的字數三十二萬中國字了百卷全部是約有百萬字的而加藤純章則把僧睿的於大智三十萬言玄章婉旨解説為係就初品三四卷而言而三分除二則採慧遠的意見以為羅什攜來的略本為略譯本的三倍以上而略譯本所依的略本另有大本原本或有千卷之多但這完全是臆測之辭毫無文證可言所以他自己都對這種千卷原本稱之為虛幻並對其存在表示懷疑對中國文義的誤解外國學者是難免的我敢肯定地説摩訶般若波羅蜜經三十卷解經的釋論大智度論七十卷經論會編則為百卷泛稱會編本為大智度論百卷可説是引起卷數字數謬説的根源第三節有關論文譯語問題解疑佛典之所以要譯為漢文那是為了中國人閲讀之便佛法早期傳入中國譯文並不太理想解説也多少得採用中國文化中的傳統辭彙這就是格義的佛法到了晉代才有精通義學的西域天竺也在內沙門來華使佛法更為純正為了便於中國人理解在梵語辭彙下有時會加上晉言秦言的譯語如與中國風俗不同者則附上天竺外國等注釋若有深奧難解的術語也往往附有小字的注釋這一翻譯方式在中國佛典譯史中可説由來久矣苻秦時代在道安的主持下西元三八二三八五年就是這樣譯法的如僧伽提婆誦出的八犍度論在論文佛語云何答曰如來語一語聲八口行九口教十下小注云天竺十種皆語也四阿鋡暮抄解是鳩摩羅佛提誦出的在論文的手授下小注云外國婚禮夫親迎女澡夫手父以女手授夫故云爾又如耶舍誦出竺佛念譯語的鼻奈耶也説外國三時分一年春三月坐後一月詣佛詣師餘二時亦爾本文直接譯有天竺的如那先比丘經説生於天竺字陀獵天竺名象為那伽父母便字為那先羅什譯出智論也只是繼承這一譯風而已列舉了天竺九例其中天竺俗法凡造事成辦皆言到彼岸大正二五一四五中帝釋左面天王也右面天子大正二五二一九上之二例皆屬小字夾注而非論文天竺説時名有二種大正二五六五中天竺國法名諸好物皆名天物大正二五一二三中天竺語法衆字和合成語衆語和合成句大正二五三八中下天竺法以捉足為第一恭敬供養大正二五一六一下等都是解説經文的只因其與中國風俗不同所以加一天竺國法天竺語法等使讀者易於了解而已這都是筆受者的附筆不能如干潟龍祥那樣據此而認為這些文段是羅什加筆附加上去的關於秦言同意干潟龍祥的意見並引述了更多的秦言認係出於羅什或共譯者之手不知加注晉言秦言本是翻譯者早已有之的慣例非獨智論為然而且智論凡有秦言多數也是小字夾注如卷七大正二五一一下颰陀婆羅菩薩秦言善守剌那伽羅菩薩秦言寶積文殊尸利菩薩秦言妙德人名地名大抵是小字夾注我再舉一實例如説到佛的德號論文列舉而加敘述者如智論卷二大正二五七中七三中所説一婆伽婆有德巧分別有名聲能破二多陀阿伽陀如解如説如來三阿羅呵殺賊不生應受供養四三藐三佛陀正遍知五鞞侈遮羅那三般那明行足六修伽陀好去好説七路迦憊知世間八阿耨多羅無上無答九富樓沙曇藐婆羅提可化丈夫調御師十舍多提婆魔䨲舍喃天人教師十一佛陀知者十二阿婆摩十八悉達多論文解説婆伽婆順便解説佛的十號等從婆伽婆到三藐三佛陀分別解説時論文並未加秦言二字從鞞侈遮羅那三般那到佛陀論文是有秦言的但也有例外的時候如阿耨多羅秦言無上復次阿名無耨多羅名答以是故名無答這是二説之中一加秦言而一不加之例而佛陀的秦言知者只是論文的小注阿婆摩以下都是小字夾注的秦言這一段論文有沒有秦言是本文還是夾注都非常不統一我以為在智論中有些秦言與天竺當然是原文所無而為筆受者之所附入以便國人閲讀理解但如上文所引佛之德號決不能因有秦言二字而就否認這些文段認為是羅什所加筆的更何況誠如前第一節述羅什只是手執胡本口宣秦言而已何來機會在譯文上私下加筆呢適應中國人學習的在智論中還有三類一經名如智論説般若波羅蜜部黨經卷有多有少有上中下光讚放光道行又説如小品放光光讚等般若波羅蜜經卷章句有限有量般若波羅蜜義無量二説皆謂般若經有三本所説是一致的只是順序顛倒了一下般若經的下本是小品也就是道行般若經中本是放光般若經上本是光讚般若經把般若經的廣略三本稱作道行放光光讚這決計不是智論原文智論如要分別三者那也會稱作十萬偈本一萬八千或二萬偈本八千或四千偈本但這對中國人來説不如以過去譯經的名稱比對三本來得容易明了附為一提光讚般若經是晉太康七西元二八六年竺法護在涼州譯出的到晉太元元西元三七六年五月才傳到襄陽已是十卷的殘本這是中本但在那時可能有光讚是五百卷的傳説所以在智論譯出時筆受者就以光讚配上本像這樣雖經名不合原文但也不能説般若有三本的説法是羅什所附加上去的二國名或地名智論每説到大月氏與月氏也説到安息與大秦這些名稱是中國人所熟悉的月氏或作月支本是住在敦煌與祁連山間的民族西元前一七四年為胸奴所逼迫而移向西方占有大夏吐火羅月氏本分為五部其中名為貴霜的起初住在瓦罕谷西部起來統一五部向東西發展向東的進入北印度並推進到中印首都在犍陀羅的布路沙布邏在印度這是著名的貴霜王朝但在中國一向稱之為大月氏或月氏西元前二五年一世在波斯建立王朝史記稱之為安息在印度這裡是被稱為波羅婆或波剌斯的大秦國更遠在安息的西方自張騫通西域後史記記録下來的大月氏康居大夏安息大秦天竺等國或地名成為中國學者熟悉的西域國名在羅什翻譯以前這些早已為譯者之所通用如竺法護譯的密迹金剛力士經編入大寶積經第三會説釋種指賒迦安息月氏大秦劍浮以史記所用國名代替印度稱謂名稱不同但所指地區相同對中國人來説容易了解沒有不知所指在哪裡的困惑這樣的改譯是筆受者的方便決不能説是羅什加上去的三國王的名號一個國家的帝王天子是中國人習用的尊稱智論一再説到天子凶大臣受殃如今國王名天子天子聽正殿則外人可見如日天子繞四天下前三則是泛稱君王為天子後一則是日天印度的日天是太陽或太陽神與中國文義不合所以説日天子月天子也是如此泛稱君王為天子引起的誤解以為論主是避而不談貴霜王名字於是推論那可能是西北印人對外來統治者一種根深蒂固之反感甚至還以為這是一種作者對邊國弊生處的輕鄙第四節大智度論之譯者與筆受者摩訶般若波羅蜜經與大智度論七十卷的譯者是鳩摩羅什譯原文為漢文時有五百位義學沙門在座後增多為八百位而筆受者是僧睿可能還有一二人相助對羅什與僧睿這裡要略為敘述羅什的父親是天竺印度人母親是龜茲今新疆的庫車王妹在父母的熏陶下羅什可能從小就會説龜茲與天竺語傳説母親也會説天竺語羅什七歲時母親出家修行羅什也就跟著出家學習聲聞乘經文與阿毗曇九歲時跟出家後的母親到罽賓禮槃頭達多為師學習雜藏及中阿含與長阿含年幼的羅什能了達法義受到一般人的推崇那時的罽賓在印度當然是迦濕彌羅但在中國漢書所説的塞種王罽賓是烏仗那犍陀羅一帶説習慣了至西元五世紀初中國人還是以烏仗那犍陀羅一帶的罽賓如智猛既至罽賓城於此國見佛鉢法勇進至罽賓國禮拜佛鉢而佛鉢的所在地依玄奘所見那時只剩佛鉢臺故址那是在犍陀羅國的王城迦濕彌羅是説一切有部阿毗曇論師的重鎮不立雜藏而羅什到罽賓卻學習雜藏與中含長含所以羅什所到的罽賓可能是犍陀羅或五部盛行的烏仗那羅什十二歲時又隨從母親東歸中途在沙勒今疏勒住了一年學習阿毗曇發智論六足論及增一阿含進一步學習印度的四吠陀及種種世間學在此他意外地遇到了莎車今新疆莎車縣王子須利耶蘇摩學習大乘之中論百論等甚深空義學習大乘深義在傳説中似乎和他學習阿毗曇六足論及四吠陀等世間學同為在沙勒的那一年一年內學習這麼多應該是不可能的也許是住沙勒一年十三歲學習阿毗曇等佛法及四吠陀等世間學術後才遇到須利耶蘇摩開始廣學大乘經論這應有一段較長的修學時間二十歲滿他在宮中寺院受比丘戒可能是依佛陀舌彌為和尚的他依卑摩羅叉學説一切有部的十誦律大乘學者出家從來都受聲聞戒而出家的羅什並無例外羅什住龜茲的王新寺雖然年紀還輕但在此弘揚大乘名聲已大大的傳揚開來了西元三七九年僧純從龜茲得到了比丘尼戒本回長安在道安的比丘尼戒本所出本末序於王新僧伽藍下附注説九十僧有年少沙門字鳩摩羅什才大高明大乘學與佛陀舌彌是師徒而舌彌阿含學者也那時羅什還被形容為年少沙門怕不過三十歲吧西元三八四年苻秦建元十八年苻堅的大將呂光攻破了龜茲第二年回軍羅什也就隨呂光東行西元三八五年太安元年至達姑臧以苻堅為姚萇所害呂光就留在姑臧自立為後涼王這樣羅什也就留下在長達十七年的歲月中由於呂光父子對佛法沒有信心羅什的大乘深義也就默默然的無所表現西元四一年姚秦弘始三年後涼歸降了姚秦羅什這才被迎到長安那已是西元四一弘始三年十二月二十日由於秦王姚興崇信三寶禮遇羅什羅什這才大展弘才譯出經律論約三百卷使中國的佛法進入更純正的新階段羅什的大乘學是在沙勒時從莎車王子須利耶蘇摩學習的雖傳記中僅提到阿耨達經中百二論及十二門論但其他的大乘經論必由此而更深廣了達在漢書中莎車是西域小國但在佛教傳記中從于闐今和闐到疏勒的中間有子合國佛遊天竺記或作朱駒波洛陽伽藍記卷五朱俱波隋書卷八三遮居迦歷代三寶記卷一二遮居迦大集經卷五四斫句迦大唐西域記卷一二或論定為都城在今新疆葉城子合王治呼犍谷漢書西域傳呼犍谷就是瓦罕谷即蔥嶺南側山谷平地子合是西夜族的一支子合國忽而出現在蔥嶺山下後來又被稱為遮居迦等主要是大月氏五部五個氏族中的貴霜統一大月氏五部而發展起來向東發展一向以陀歷為中心的塞迦族被迫渡河而向南到達烏仗那是漢書所説的塞種王罽賓子合等西夜族被迫而一部分東下蔥嶺進住平地那就是法顯所見的子合了莎車也在子合遮居迦的統治區內可能民族不同故仍保有部分自治權法顯西元四一年所記的子合是國王精進有千餘僧多大乘學羅什見莎車王子須利耶蘇摩約在西元三六年前後玄奘稱為斫句迦僧徒都習學大乘教斫句迦還保有蔥嶺的部分此區山上國中大乘經典部數尤多佛法至處莫斯為盛也十萬頌為部者凡有十數自茲已降其流實廣這一傳説歷代三寶記續高僧傳卷二也有説是闍那崛多所傳所説的經典更多但作于闐東南二千餘里有遮居迦國不免方向顛倒了闍那崛多是隋開皇四至二十西元五八四六年在長安的從斫句迦而西南度過蔥嶺到達北印度的烏場烏仗那洛陽伽藍記卷五大正五一一二上説國王精進菜食長齋晨夜禮佛大唐西域記卷三大正五一八八二中説崇重佛法敬信大乘並學大乘寂定為業遲一些唐開元中慧超往五天竺國傳大正五一九七七下説烏長國此王大敬三寶足寺足僧僧稍多於俗人也專行大乘法也烏仗那古稱罽賓是北印度大乘佛法的重鎮從史地事實來看大乘教法之傳入中國多從烏仗那而斫句迦莎車在內更東達于闐西域的大乘教法主要是從南道傳來的由於莎車王子到沙勒鳩摩羅什受教這才經北道之龜茲而傳入中國莎車王子與羅什的因緣是不平常的惟有從莎車屬於斫句迦而斫句迦擁有衆多大乘經的關係才會對羅什大乘學的廣博與十萬頌摩訶般若波羅蜜經的釋論等之傳來不會感覺離奇而對智論卷百所説不可思議解脫經十萬偈諸佛本起經雲經大雲經各各十萬偈大正二五七五六中也就不覺得離奇了僧睿是摩訶般若波羅蜜經與智論的主要筆受者他曾經追隨過道安以道安為師在苻秦壬午西元三八二年翻譯四阿鋡暮抄解時已參預筆受的行列羅什譯摩訶般若波羅蜜經與智論的時候他已是知命之年所以在羅什門下他是一位年長的大德他有文學素養重視譯文的流暢典雅如翻譯法華經時曾建議改天見人人見天為人天交接兩得相見對於玄理他也有深厚的悟解但是對智論來説他筆受的譯文也還不是很理想的如義品在論中譯成六種名稱或譯為阿他婆耆經這是義品的音譯或譯作義品偈或譯為衆義經那是因為義品有十六章衆義的關係或譯利衆經利衆就是衆義利與義相通或譯為佛説利衆經或譯為佛利衆生經譯衆為衆生那就與原義不合了同一義品而有六種譯法這未免太草率了又如智論卷五四大正二五四四三中説釋提桓因釋迦秦言能提婆秦言天因提秦言主合而言之釋提婆那民論文解説釋提桓因別別解説倒還對但合為釋提婆那民就不免上下不合了又如智論卷三三大正二五三八上説廣經者名摩訶衍所謂般若波羅蜜經如是等無量阿僧祇諸經為得阿耨多羅三藐三菩提故説毗佛略呂夜反秦言未曾有經如佛現種種神力毗佛略義譯就是廣經之廣或譯方廣方等前標漢譯廣經而後以梵語的毗佛略作結前後不一致是不妥當的未曾有法是另一分教沒有先標阿浮多達磨就説秦言未曾有經也是不合體例的麗藏本把秦言未曾有附在呂夜反下寫成小字夾注那就更使人不知要怎麼讀甚至誤以為是毗佛略的漢譯呢這段文字實在寫得太含糊了又如智論所記結集三藏事是依據説一切有部而説的但卷三説到經的內容是集作四阿含增一阿含中阿含長阿含相應即雜阿含大正二五六九下這又不合説一切有部的次第了在道安的主持下曇摩難提已於乙酉西元三八五年譯出增一阿含經此經為大衆部末派所傳四阿含的次第增一阿含卷二大正二五四九下是説作增一中長雜的我想這一定是在羅什説到四阿含次第時僧睿已將增一阿含中記述的排列次第熟記在心也就這樣寫上去了總之智論的筆受者重玄理而忽略事相如誤以為釋論廣本有千餘卷從文字來説智論的翻譯是不太理想的這一點僧睿是有自知之明的故説二三唯案譯而書都不備飾幸冀明悟之賢略其文而挹其玄也第二章大智度論之作者第一節大智度論對佛法的根本立場大智度論之作者究係龍樹抑或另有其人如所説係西北印度之説一切有部學者欲探究此一問題我們先談智論對佛法的根本立場智論卷一大正二五六一中説一切實一切非實及一切實亦非實一切非實非不實是名諸法之實相本偈引自中論卷三觀法品大正三二四上一切實非實亦實亦非實非實非非實是名諸佛法末句文字似與智論略有出入其實比對中論卷三之長行大正三二五上中即可知兩偈意義相同云何令人知諸法實相答曰諸佛無量方便力諸法無決定相為度衆生或説一切實或説一切不實或説一切實不實或説一切非實非不實此中於四句無戲論聞佛説則得道諸佛以無量方便力為種種衆生説種種法門只要能離戲論則一切法門莫不能知諸法實相這是智論看待一切佛法的根本立場面對部派佛教紛雜的種種異説智論也持同樣的立場如卷一八説如是等種種異説無智聞之謂為乖錯智者入三種法門觀一切佛語皆是實法不相違背何等是三門一者蜫勒門二者阿毗曇門三者空門大正二五一九二上中若人入此三門則知佛法義不相違背能知是事即是般若波羅蜜力於一切法無所罣礙若不得般若波羅蜜法入阿毗曇門則墮有中若入空門則墮無中若入蜫勒門則墮有無中大正二五一九四上中部派佛教的三門都是依於佛説而開展的只是思想方法不同不得般若波羅蜜法於是陷於對立而互不相容的狀態此中阿毗曇分別法的自相共相因而引起一一法實有自性的執見所以墮在有中空門説法空若如方廣道人之惡取空則必墮在虛無中蜫勒分別的説實説假説真説俗是很可能墮入有無中的這種種論義都淵源於佛阿含説只是偏執而無法離戲論遂以為對方乖錯如得般若波羅蜜法亦即通達緣起即空即假名的中道則部派異義都有其相對真實性於一切法門自能通達無礙本著這樣的立場智論出入諸家而抉擇深義其中所涉及的不只是説一切有部的阿毗曇還包括當時全印度各學派的一切法門赤銅鍱部的七部阿毗曇龍樹沒有説到也許是孤傳海島對印度大陸佛教的影響不深吧當然其時錫蘭佛教在衰亂之中直到覺音之後才復興這也可能是龍樹未加注意的原因第二節大智度論與毗曇門第一項大智度論與説一切有部阿毗曇論究的主題包括自相共相相攝相應因緣説一切有部後來又增加果與成就等通稱論藏而實為論的一類智論卷二所提到的阿毗曇有八犍度阿毗曇六分阿毗曇及舍利弗阿毗曇三類先説八犍度阿毗曇八犍度初品是世間第一法後諸弟子等為後人不能盡解八犍度故作鞞婆娑大正二五七上八犍度論即是説一切有部迦旃延尼子所造之發智論被説一切有部當作根本論鞞婆娑此指大毗婆沙論是發智論的釋論與發智合稱阿毗曇身及義毗婆沙師毗婆沙義這是被看作説一切有部之主流的六分阿毗曇中第三分八品之名分別世處分是目犍連作六分中初分八品四品是婆須蜜菩薩作四品是罽賓阿羅漢作餘五分諸論議師所作大正二五七上六分阿毗曇就是一般所稱的六足論六足論是阿毗達磨法蘊足論阿毗達磨集異門足論阿毗達磨施設足論阿毗達磨品類足論阿毗達磨界身足論阿毗達磨識身足論有關六論的作者容有異説但從智論稱發智論為身稱六論為分視作支分可見龍樹時代此二者已有主從之分實則六分原是阿毗達磨的六部分本沒有附屬於發智論的意義由於發智論系的高度發達六論不免相形遜色毗婆沙師特重發智論以發智論説為主而解説會通六論六分於是形成發智論的附屬也就稱發智論為身六分為六足了除八犍度與六分之外智論還提到舍利弗阿毗曇有人言佛在時舍利弗解佛語故作阿毗曇後犢子道人等讀誦乃至今名為舍利弗阿毗曇大正二五七上舍利弗阿毗曇論今有姚秦弘始十六十七西元四一四四一五年曇摩耶舍與曇摩崛多譯本共三十卷全論分問分非問分攝相應分緒分等四分與法藏部四分律所説的論藏相合復與傳為雪山部之毗尼母經所説論藏相近這是上座部系的根本論書南傳阿毗曇分為六論法集論分別論界論人施設論雙論發趣論及論事説一切有部分為法蘊等六論及發智論論書最為發達其他上座部派大抵用這部本論但各部派的誦本多少有些出入漢譯本是分別説系與説一切有系分離不久階段的論書説一切有部有二系持經譬喻師阿毗達磨師前者後來轉化為經量部阿毗達磨師研求八犍度發智論而態度多少不同其中迦濕彌羅學者集成大毗婆沙論對論義的異同採取破斥論定的方式而成為説一切有部論師的主流但迦濕彌羅以外的阿毗達磨者還有犍陀羅師西方師與外國師態度較自由與寬容智論於法相分別方面大抵採取品類足論説而不取發智論與大毗婆沙論如其攝一切法有如阿毗曇攝法品中説是阿毗曇分別義之句此阿毗曇攝法品即是品類足論中之辨攝等品復次智論卷一八有一切法攝入二法中如千難品中説此應即品類足論辨攝等品中二法的部分而非千難品再如智論卷一九論四念處有如是等義千難中廣説卷二八有千問中亦有是問四聖種幾欲界繫幾色界繫幾無色界繫幾不繫此中千難千問皆是品類足論中之辨千問品由此可知智論對品類足論的重視有時它也採取西方師的論義如色界迦濕彌羅師只立十六處西方師卻立十七處智論卷七的千梵世天千大梵天大正二五一一三下與西方師同是將大梵天別立一處與迦濕彌羅師之大梵天無別處説法不同但是對於發智論與大毗婆沙論雖然所引不少卻常是採取嚴厲批判的態度如卷四大正二五九一下説是迦旃延尼子弟子輩是生死人不誦不讀摩訶衍經非大菩薩不知諸法實相自以利根智慧於佛法中作論議諸結使智定根等於中作義尚處處有失何況欲作菩薩論議卷二九大正二五二七三上説菩薩過三阿僧祇劫後百劫中種三十二相因緣迦旃延子阿毗曇鞞婆沙中有如是説非三藏中説又如卷二六大正二五二五五中下説迦旃延尼子別立十力四無所畏大悲三不共意止三不護為十八不共法智論因此指責道迦旃延尼子何以故如是説答曰以是故名迦旃延尼子若釋子則不作是説釋子説者是真不共法如汝所信八十種好而三藏中無何以不更説又如發智論卷一八説到菩薩大正二六一一八上齊何名菩薩答齊能造作增長相異熟業得何名菩薩答得相異熟業大毗婆沙論卷一七六大正二七八八六下八八七上依此廣釋雖經於三無數劫具修種種難行苦行若未修習妙相業者猶未應言我是菩薩齊何名菩薩答齊能造作增長相異熟業勿有生疑雖齊此位名為菩薩而菩薩名或由證得其餘勝法欲顯即由相異熟業得菩薩名不由餘法故作斯論斯論即指發智論在毗婆沙師的看法三大阿僧祇劫修習猶非真實菩薩必須到進修三十二相好的階段不但菩提決定而且趣決定這時才叫真實菩薩針對菩薩名義智論卷四大正二五八六下九一下引迦旃延尼子弟子輩言何名菩薩之長段文字大抵依大毗婆沙論但是卻加以嚴厲的破斥大正二五九一下聲聞法中摩訶迦旃延尼子弟子輩説菩薩相義如是摩訶衍人言是迦旃延尼子弟子輩是生死人不誦不讀摩訶衍經非大菩薩不知諸法實相何況欲作菩薩論議此下大正二五九一下九四上再以長段文字破他立自主張二阿僧祇劫滿得佛受記即是大相應名菩薩至於三十二相轉論聖王亦有諸天魔王亦能化作此相大正二五九二上本非菩薩之所特有齊此而名菩薩不當再者佛言無量阿僧祇劫作功德欲度衆生何以故言三阿僧祇劫三阿僧祇劫有量有限大正二五九二中在智論看來三祇修行有限量菩薩度生的願行是沒有三祇限量的説到六波羅蜜多大毗婆沙論卷一七八説如説菩薩經三劫阿僧企耶修四波羅蜜多而得圓滿謂施波羅蜜多戒波羅蜜多精進波羅蜜多般若波羅蜜多大正二七八九二上外國師説有六波羅蜜多謂於前四加忍靜慮迦濕彌羅國諸論師言後二波羅蜜多即前四所攝謂忍攝在戒中靜慮攝在般若大正二七八九二中智論很明顯的是採取外國師的看法其實這也是法藏部説出世部等及一般大乘經所通用的上來所述品類足論作者世友是西方師智論常引西方師外國師之論義這可説是不同於阿毗曇主流思想的但西方師外國師也還是説一切有部的一流譬喻師有前期的持經譬喻師如大毗婆沙論所説的法救與覺天等是説一切有部的四大論師之二在大毗婆沙論的集出中持經譬喻師受到全盤的否定這才改取現在有説演化為後期的經部譬喻師創始者傳説是呾叉始羅的鳩摩羅羅陀譯義為童受智論難破無過去未來但有現在一念頃以為是經部譬喻師對時間的看法復以為智論贊同説一切有部的時間觀其實不一定如此一現在有説其實是大衆部分別説部的古説童受只是改宗現在有而已二龍樹雖言佛智慧於三世中通達無礙大正二五二五四下二五五中但他絶對不是説一切有部三世實有論的主張者如卷二六大正二五二五五上説云何言佛智慧知三世通達無礙答曰諸佛有二種説法先分別諸法後説畢竟空若説三世諸法通達無礙是分別説若説三世一相無相是説畢竟空這明顯的是中觀者的二諦論世俗諦中説三世如幻有勝義諦中説三世畢竟空中論卷三觀業品已破斥經部譬喻師的種子説大正三二二上下如芽等相續皆從種子生從是而生果離種無相續若如汝分別其過則甚多是故汝所説於義則不然其實前期譬喻師的看法智論的確也已説到如卷一二大正二五一四八上説如一美色淫人見之以為淨妙心生染著不淨觀人視之種種惡露無一淨處等婦見之妒瞋憎惡目不欲見以為不淨淫人觀之為樂妒人觀之為苦行人觀之得道無豫之人觀之無所適莫如見土木以是故知好醜在心外無定也這正是譬喻者的見解如大毗婆沙論卷五六大正二七二八八中説譬喻者説謂如有一端正女人種種莊嚴來入衆會有見起敬有見起貪有見起瞋有見起嫉有見起厭有見起悲有見生捨應知此中子見起敬諸耽欲者見而起貪諸怨憎者見而起瞋諸同夫者見而起嫉諸有修習不淨觀者見而起厭諸離欲仙見起悲愍作如是念此妙色相不久當為無常所滅諸阿羅漢見而生捨由此故知境無實體境無實體也就是唯心論所説的空所以智論稱之為觀空大正二五一四八上智論提出三種空一分破空二觀空三十八空分破空即天台宗所説的析法空以疊為例將疊分析到極微這是説一切有部的見解觀空者外境可隨觀心而轉如譬喻師的見解智論雖提這二種空但其本意是究竟的本性空十八空譬喻師雖不是阿毗曇但因為早期也是説一切有部的一大流所以附説於此俾完整窺知智論取捨於説一切有部諸家之間而特傾向於西方阿毗曇師氏推斷作者係住錫於西北印度某一説一切有部之僧伽藍是否有部比丘且不問留待後詳吾人宜先慎勿以為作者係由正統有部之迦濕彌羅師而轉入大乘的第二項大智度論與犢子部犢子部從説一切有系分出犢子部又分出正量部法上部賢胄部密林山部等四部後來正量部弘傳極盛取得了犢子系中的主流地位而且成為四大根本派大衆上座説一切有正量之一犢子部的阿毗曇立不可説我智論卷一大正二五六一上提到這個見解犢子阿毗曇中説五衆不離人人不離五衆人是第五不可説法藏中所攝卷二大正二五七上提到阿毗曇的根源有人言佛在時舍利弗解佛語故作阿毗曇後犢子道人等讀誦乃至今名為舍利弗阿毗曇卷七大正二五一一中談到煩惱結有九結使有七犢子兒阿毗曇中結使亦同纏有五百結使數目同於説一切有部但有部説十纏犢子部卻説五百纏其實犢子部與説一切有部雖多分同而有少異若六若七與此不同餘多相似其中主要的是犢子部立不可説我不可説補特伽羅而有部是有法而無我的智論卷一所説提到犢子部的不可説我是敘述外計卷六二大正二五四九七中説諸法實相中無戲論垢濁故名畢竟清淨畢竟清淨故能遍照一切五種法藏所謂過去未來現在無為及不可説這是肯定以五法藏攝一切法的般若法門的容攝五法藏是十萬頌般若如唐譯大般若波羅蜜多經初分卷五四大正五三六中説住此六波羅蜜多佛及二乘能度五種所知海岸何等為五一者過去二者未來三者現在四者無為五者不可説卷四一六大正七八六上及卷四九大正七四九四上也都説到五種所知海岸五種所知彼岸但古譯的放光般若經光讚般若經以及羅什譯的摩訶般若波羅蜜經都是沒有的可見智論論主是見到了十萬頌般若的所以説遍照一切五種法藏而且智論卷二大正二五七四下説到一切法略説有三種一者有為法二者無為法三者不可説法此已攝一切法卷二六大正二五二五三中也這樣説都是説到一切智人時提到的此中有為法即三世法所以三種法其實就是五法藏可見智論是容攝五法藏為正義的這樣理解之後我們看平川彰所作的關於十住毗婆沙論的著者以為十住毗婆沙論和大智度論之間在教理上有許多相違故二書之作者或非同一人其相違點之一即是有關五法藏説的看法在十住毗婆沙論中提到五法藏者凡五次例如卷一大正二六七五中在説明佛是一切智人時也談到五法藏凡一切法有五法藏所謂過去法未來法現在法出三世法不可説法唯佛如實遍知是法平川彰認為論主的立場是採取五法藏説的而智論卻採取批判的立場因而兩論立場相違這未免是誤會智論了從上來的引述可以看出智論以五法藏攝一切法門立場是與十住毗婆沙論一致的智論所依經本摩訶般若波羅蜜經卷二大正八二三一上説菩薩摩訶薩行般若波羅蜜名假施設受假施設法假施設如是應當學其他經本缺受假智論卷四一大正二五三五八中解説受假五衆因緣和合故名衆生諸骨和合故名為頭骨如根莖枝葉和合故名為樹是名受波羅聶提受波羅聶提即受假或受假施設我在説一切有部為主的論書與論師之研究中論到犢子部的三法度論和正量部的三彌底部論以不可説我為受施設依説這正是受假施設此受假施設正是龍樹中論我説即是無亦為是假名的假名蓋有依因取受之義我在空之探究中分析道依般若經三假來説緣起是法假空性應該是名假為什麼中論與般若經不同特別使用這受假一詞呢這應是從犢子部系來的而智論所依經本多一受假施設這正是中論所重視的假名一切假施設的通稱而這應是犢子部系來的不可説或受假在犢子部系本是約我説而智論則通約我法説説一切有部認為我是假有無實的古稱假無體家而犢子部的不可説我依五蘊立而不即是蘊古稱假有體家所以也可説有人的在中論中特多説到者説一切有部是很少説者的如第二觀去來品説去與去者第三觀六情品説見與見者第六觀染染者品第八觀作作者品第九觀本住品本住是神我的異名第十觀燃可燃品談到作作者第十二觀苦品説此人彼人第十四觀合品説見可見見者染可染染者第十七觀業品説作者與業第二十觀因果品説生者與可生第二十二觀如來品説受受者第二十三觀顛倒品説可著著者著第二十四觀四諦品説作作者作法中論卷三觀業品云諸煩惱及業作者及果報皆如幻如夢如炎亦如響大正三二三下中論青目釋亦云去法去者所去處是法皆相因待三法虛妄空無所有但有假名如幻如化大正三五下像這樣我法畢竟空我法如幻有智論中論和十住毗婆沙論都是相同的也是受到了犢子部的影響智論還有異於説一切有部而同於犢子部的那就是有部立五道趣犢子部加一阿修羅而立六道智論處處説五道又處處説六道而以六道説為正如卷三大正二五二八上法傳五百年後多有別異部部不同或言五道或言六道若説五者於佛經回文説五若説六者於佛經回文説六又摩訶衍中法華經説有六趣衆生觀諸義旨應有六道復次分別善惡故有六道善有上中下故有三善道天人阿修羅惡有上中下故地獄畜生餓鬼道若不爾者惡有三果報而善有二果是事相違若有六道於義無違卷一大正二五一三五下也略有説到這是不同於説一切有部而同於犢子部的六道説犢子部分出的正量部為了説明業力立不失法中論卷三觀業品出不失法如券業如負財物大正三二二中而加以破斥而智論卷三三大正二五三四下論布施者福業説此布施業雖過去乃至千萬世中不失譬如券要要即要約券要即是契約上述論文正是正量部義智論卷三二大正二五二九八下説一一法有九種一者有體二者各各有法三者諸法各有力四者諸法各自有因五者諸法各自有緣六者諸法各自有果七者諸法各自有性八者諸法各有限礙九者諸法各各有開通方便此下並説明一一法之九事有下如中如與上如這九事在智論卷三三卷二七又各有一文與妙法蓮華經的十如是大致相近茲列表如下法華經卷一相性體力作因緣果報本末究竟智論卷卅二法性體力因緣果限礙開通方便智論卷卅三業力所作因緣果報智論卷草七相性力因緣果報得失四説都有些差異但大致相近這可分為四類一性與相二體力所作三因緣果報四本末究竟或作限礙開通即通塞或作得失九事或十事顯然有共通的淵源妙法蓮華經文句是智者所講灌頂所記的卷三下大正三四四二下説釋論三十一明一一法各有九種達磨鬱多將此九種會法華中十如達磨鬱多唐湛然的法華文句記卷四中大正三四二二二下説此達磨鬱多羅是雜心論主婆沙有法救論師是雜心論主所承從師為名然而雜心論主法救梵語為達磨呾邏多與智者所説的達磨鬱多不合達磨鬱多應是犢子部分出的法上部所以十八部論音譯法上部為達磨鬱多梨達磨鬱多法上部是從部主立名的智論卷三三的業力所作與法華的體力作都是採取犢子系法上部的説明智論多明説説一切有部的阿毗曇而從説一切有部分化出來的犢子系説與中論在這方面頗為同步在前引不可説或受假方面特別如此顯見龍樹對犢子部學説的重視而在六道與九事或十事等方面智論是充分同情犢子部的無論是犢子部還是後來的大宗正量部它的化區極廣主要是西印度而不是北印度的第三節大智度論與空門及蜫勒門空門是聲聞部派而接近初期大乘的説我空也説法空智論卷一八大正二五一九二下一九三下引四經明空門之生空法空一頻婆娑羅王迎經二佛説大空經三梵網經四義品此中除第一經是説生空之外餘三皆解説法空不但這三種聲聞經典智論還説如是等處處聲聞經中説諸法空大正二五一九三下智論卷三一大正二五二九五中下在説明一切法空時又簡略地引述了聲聞藏的六或七經一先尼梵志事見雜阿含經巴利藏缺二強論梵志事如義品所説三大空經四羅陀經見雜阿含經五筏喻經見中阿含經的阿梨吒經六波羅延經是經集的彼岸道品利衆經是經集的義品智論以此例餘謂三藏中處處説法空換句話説空門仍是本於佛説非餘歸納起來聲聞派的空門引聲聞經以説法空的主要理由是一無我所二五陰法散滅三不落二邊四句的見解四佛法是非諍論處五智者不取著一切法空門與阿毗曇門的辨析事相是不同的這是著眼於佛法的理性方便引導趣入修證的立場三論玄義引真諦三藏所説大衆部分出的一説部説此部執生死涅槃皆是假名大正四五八下一切都是假名與智論所説的空義相合智論卷一大正二五六一上中説佛法中方廣道人言一切法不生不滅空無所有譬如兔角龜毛常無這是大衆部分出的一派在南傳論事中説到方廣部也名説大空部雖所説不同然與智論的方廣道人道人即比丘説一切法空無所有顯然是同一部派如方廣部説佛住兜率天宮人間佛是示現的化身所以施佛不得大果佛不住此間佛不説法方廣部執佛是超越現實人間世的不免重於超越而輕忽現實與智論中方廣道人説一切法空如龜毛兔角表現同一意境智論認為方廣道人所説是偏執是撥無一切法的邪見智論卷一八説空門時一再説到空門與邪見者的不同大正二五一九三下一九四上邪見人於諸法斷滅令空摩訶衍人知諸法真空不破不壞邪見人言諸法皆空無所有取諸法空相戲論觀空人知諸法空不取相不戲論觀真空人先有無量布施持戒禪定其心柔軟諸結使薄然後得真空邪見中無此事但欲以憶想分別邪心取空像這樣取諸法空相戲論但欲以憶想分別邪心取空是邪見而不是真空不合佛法説空的意義不但智論這樣認為就是中論也持同一立場中論卷二大正三一八下説大聖説空法為離諸見故若復見有空諸佛所不化智論卷二大正二五七上中説摩訶迦旃延佛在時解佛語作蜫勒乃至今行於南天竺蜫勒略説三十二萬言蜫勒廣比諸事以類相從卷一八大正二五一九二中説蜫勒有三百二十萬言佛在世時大迦旃延之所造佛滅度後諸得道人撰為三十八萬四千言若人入蜫勒門論義則無窮其中有隨相門對治門等種種諸門蜫勒或作𮔢勒都是篋藏的意思佛世大迦旃延所造的𮔢勒依智論説𮔢勒有隨相門對治門等種種論門論義是重於適應貫通的正如古人所説牽衣一角而衣來所以若人入蜫勒門論議則無窮其廣比諸事以類相從是比類諸事依意義相同而歸於同類這與毗曇門的分別法相辨析精嚴體例是大為不同的三論玄義依真諦説而陳述道大正四五九上佛在世時大迦旃延造論解佛阿含經至二百年大迦旃延從阿耨達池出更分別前多聞部中義時人有信其所説者故云多聞分別部依真諦所譯部執異論多聞分別部作分別説部玄奘是譯為説假部的三論玄義檢幽集卷五依真諦之部執異論而説大正七四六一上此是佛假名説此是佛真實説此是真諦此是俗諦分別説部即大迦旃延弟子説真説俗説實説假也許由此而落入有無中吧説假部是大衆部所分出的大迦旃延在佛世就弘法到阿槃提所以蜫勒論是流行於南天竺的真諦所譯的四諦論稱迦旃延為大聖引有分別部及名為藏論者不少每舉何相何用何緣何義為問與覺音清淨道論的相味現起足處相當類似味即作用緬甸的小部中有古典藏論為大迦旃延所造也許與智論所説的蜫勒𮔢勒有關上座分別説系的赤銅鍱部原是從西南印度優禪尼的分別説部所分出傳為大迦旃延所造的藏論流行於南印度也許是和舍利弗阿毗曇論一樣各派共傳而彼此增減有異吧總之蜫勒是流行於南印度的古典是大衆部系或分別説系赤銅鍱部所共的説本論作者對大衆部之思想表現出無言之輕蔑而在其著作中未置一詞由此而推定他可能為西北印説一切有部之比丘這是一種想像的看法如上面所説空門與蜫勒門都與大衆部系的思想有關而且如異部宗輪論大正四九一五中下説此中大衆部一説部説出世部雞胤部本宗同義者謂四部同説諸佛世尊皆是出世一切如來無有漏法如來色身實無邊際如來威力亦無邊際諸佛壽量亦無邊際一剎那心了一切法一剎那心相應般若知一切法菩薩為欲饒益有情願生惡趣隨意能往這些思想已成為大乘經中佛與菩薩的聖德了又如大衆部説有十方佛這已成為大乘佛教的定論智論中處處説的都是這些源自大衆部的佛菩薩觀能説本論作者對大衆部表現出無言的輕蔑嗎又如智論卷一五大正二五一七一中説佛弟子説非數緣滅是常又復言因緣法常因緣生法無常非數緣滅即非擇滅非擇滅無為非擇滅無為是多數部派所説的因緣法是緣起法緣起法常是説緣起是無為法這是大衆部等九種無為之一然則智論的非數緣滅是常與因緣法常豈不就是大衆部的非擇滅無為與緣起支性無為嗎總之智論是大乘論大衆部系的思想在智論中的重要性遠非他部所及並非如所説論主對大衆部表現出無言的輕蔑未置一詞的第四節三藏與四藏三藏是經律論藏四藏是在三藏之外加一雜藏説一切有部的結集傳説只有三藏立雜藏的現有文獻可知的是大衆部化地部法藏部以為智論所説的只是大乘和説一切有部所以廣論説一切有部之雜藏這又是錯誤的智論卷二説到王舍城結集只言三法藏卷四九則説四藏所謂阿含阿毗曇毗尼雜藏大正二五四一二上卷一一也説以四種法藏教人大正二五一四三下這四藏説不是説一切有部的從其他部派的雜藏南傳赤銅鍱部名為小部內容來看説一切有部也是有的但分為二類一法義偈頌類二傳説故事類但是對這些説一切有部是持保留態度而不與三藏等量齊觀的一法義偈頌類如有部傳本的雜阿含經卷四九大正二三六二下説優陀那即法句波羅延那見真諦諸上座所説比丘尼所説偈尸路偈義品牟尼偈修多羅修多羅是通稱又如根本説一切有部毗奈耶藥事卷三説到嗢拖南頌諸上座頌世羅尼頌牟尼之頌衆義經等五部大正二四一一中可見在漢譯有部系原始教典之中已説到三藏以外的偈頌偈頌每為文句所限又多象徵感興的成分依説一切有部是不能憑偈頌為法義準量的所以被判為有餘説不了義説如雜阿含經卷三五大正二二五五下二五六上説我於此有餘説答波羅延富鄰尼迦所問我於此有餘説答波羅延憂陀耶所問大毗婆沙論卷七九大正二七四一中也説諸讚佛頌言多過實但在智論中卻以義品明第一義悉檀明諸法空引波羅延經明法空明甚深智慧法這顯然是以偈頌為法義準量而與説一切有部的觀點不同二傳説故事類是十二分教中的本生譬喻因緣傳説中的故事在流傳的過程中各部派都有的每不免有所增減所以原則上説一切有部是不重視的十誦律就不説本生譬喻如薩婆多毗尼毗婆沙卷一大正二三五九中説凡是本生因緣不可依也此中説者非是修多羅非是毗尼不可以定義也大毗婆沙論卷一八三大正二七九一六中也説然燈佛本事當云何通答此不必須通所以者何此非素怛纜毗奈耶阿毗達磨所説但是傳説諸傳所説或然不然本生譬喻因緣等傳説是可能誤傳的不能引用為佛法的定量而應以三藏教説為依歸説一切有部的這一態度是理性的不輕率的信賴傳説根本説一切有部律雖含容了這些傳説而智論卻充分引用了這些傳説由此看出大乘通俗化的傾向與有部態度顯然不同智論卷五提到雜藏經所引偈頌內容與南傳小部經集三大品的精勤經相當這是引用其他部派的所引用的法句經也是其他部派的如是説一切有部的就名為法優陀那了以上是略述説一切有部中與雜藏相當的部分及其對雜藏所抱持的態度以明智論這方面與説一切有部之處理方式不相合至於三藏方面説一切有部的經藏是四部阿含但漢譯的四阿含經僅有雜阿含經與中阿含經是説一切有部系的長阿含經是屬於法藏部的增一阿含經屬於大衆部末派智論所引用的經多依説一切有部説一切有部的論藏與智論的關係如前阿毗曇中所説智論所引用的律藏主要是説一切有部的智論卷百大正二五七五六下説毗尼略説有八十部亦有二分一者摩偷羅國毗尼含阿波陀那本生有八十部二者罽賓國毗尼除卻本生阿波陀那但取要用作十部有八十部毗婆沙解釋又卷二大正二五六九下説二百五十戒義作三部七法八法比丘尼毗尼增一憂婆利問雜部善部如是等八應刪十部作毗尼藏依據智論認為優婆離誦出的律典重復了八十次誦出最後的定本為八十誦律到優波毱多時各部派各自改編就是現存的各部律説一切有部的十誦律就是優波毱多改編的長於資料的搜集但對律部的成立與分化還有待斟酌智論所説的二部律並無古傳定本與有部縮本的差別所謂優婆離重復了八十次誦出純屬想像誤解之辭其實二部律只是説一切有部律之分化為二一八十部律二十誦律部與誦是相通的如八十部就是八十誦十部就是十誦説一切有部是西方上座部系從摩偷羅而向北方罽賓烏仗那犍陀羅一帶發展而成的部派摩偷羅傳來的十誦律是有部中舊阿毗達磨師犍陀羅所承用的阿毗達磨的主流迦濕彌羅系之鞞婆沙師所用的律典也是從摩偷羅傳來的但含攝了多少本生譬喻因緣也就是稱為八十部律或摩偷羅國毗尼的根本説一切有部毗奈耶根本薩婆多部律攝卷一大正二四五二五上説佛説廣釋並諸事尼陀那及目得迦增一乃至十六文塢波離尊之所問摩納毗迦申要釋毗尼得迦並本母內容與十誦律大體相同如佛説是戒經二部波羅提木叉廣釋是二部波羅提木叉分別諸事是律事十六或十七事與律雜事這三部分是律藏的主體尼陀那以下是附隨部分大都是十誦律所有的十誦律與八十部律的先後應該是先有十誦律其後才有所謂八十部律的根有律如十誦律立七法八法十五法而根有律就由十六事進而十七事破僧事在十誦律中還在雜誦之內但在根有律中已獨立為一事與大莊嚴相結合而成為唐義淨所譯二十卷的大部這是先有十誦律的最有力證明其次十誦律卷六大正二三四四九上説結集論藏是為了若人五怖五罪五怨五滅智論卷二大正二五六九下亦作此説這與阿毗達磨法蘊足論的學處品第一相合法蘊足論是六分毗曇之一可説是早期的論典而根本説一切有部毗奈耶雜事卷四所説的論藏是摩窒理迦大正二四四八中與順正理論卷一大正二九三三中相合大毗婆沙論解説譬喻為如大涅槃持律者説所説大涅槃譬喻出於根有律雜事順正理論與大毗婆沙論都是晚於六分毗曇的迦濕彌羅系論典由此可證明較早期的是舊阿毗曇師所用的十誦律晚出的八十部律則為迦濕彌羅毗婆沙師所用的根有律智論以為從八十部律省略了譬喻本生而成為十誦律這是智論成立時代的一種傳説如我國古代也一向傳説小品般若是從大品般若抄出來的而事實上卻是先有小品而後有大品的增補所以智論的説法也只是隨順當時的傳説而已難免與事實會有差距説一切有部本來不重視傳説但流傳於北印度久而不免將譬喻本生融攝進去遂成為大部的根本説一切有部毗奈耶智論論主應該是從十誦律系而非迦濕彌羅系的説一切有部出家的所以不但對迦濕彌羅系統的論義作較嚴厲的責難如前毗曇門之所述而且説到結集律藏也還是列舉十誦律的內容其實不但是智論論主大凡印度出家的菩薩如提婆無著世親陳那等大論師也都是先從傳統部派佛教中出家而出家是不限於出生地的所以若因智論論主曾在西北印的有部出家而推論他不是南印度出生的龍樹那是不夠嚴謹的再者如前第二章第一三節所述智論的立場是大乘的從大乘的立場貫攝不同的聲聞法如阿毗曇門空門蜫勒門論主決不是局限於説一切有部的第五節佛教的中國與邊地智論卷二五大正二五二四三上説弊生處者安陀羅舍婆羅裸國也兜呿羅小月氏修利安息大秦國等在此邊國中生若在大衆中則多怖畏佛在迦毗羅婆中國生故無所畏邊國或邊地與中國見於律典釋尊所遊化地區為中國所不曾遊化地區即為邊地安陀羅舍婆羅兜佉羅修利安息大秦這些都是弊生處邊國安陀羅為龍樹時代興盛的大國而智論稱之為邊國乃以為智論作者所稱佛教之中國僅指使用雅利安語而又崇信宗教之國度而干潟龍祥則認為龍樹住在安陀羅國在此活動並受該國國王庇護安陀羅為當時二三世紀半南印度強盛之文化國度龍樹等諸學者輩出而智論竟以此為弊生處顯見此非龍樹之言而羅什面對如中華文化國之豪奢生活方有稱彼安陀羅為邊國之可能此皆忘卻佛教中中國與邊地之定義而引起之誤解佛法流傳南北之後從前的邊地佛教已大為興盛當地的佛弟子不甘於自居邊地乃引起釋迦佛以神通遊化各方的傳説如智論卷九大正二五一二六中下説釋迦牟尼佛在閻浮提中生在迦毗羅國多遊行東天竺六大城有時飛到南天竺億耳居士舍受供養有時暫來北天竺月氏國降阿波羅龍王又至月氏國西降女羅剎佛在彼石窟中一宿于今佛影猶在有人就內看之則不見出孔遙觀光相如佛有時暫飛至罽賓隸跋陀仙人山上住虛空中降此仙人仙人言我樂住此中願佛與我佛髮佛爪起塔供養塔于今現存佛到南天竺是神通而至的至北天竺見根有律藥事這是佛與金剛手夜叉乘空而往的智論所説四處與阿育王傳所説相類似這一乘空而往北天竺的傳説在根有律藥事中共有十四處這類神通遊化的傳説在佛教於阿育王時傳入錫蘭後也開始在錫蘭展開如島史説佛曾去錫蘭三次降伏夜叉龍王並與五百比丘在島上入定又如增一阿含經説給孤獨長者女修摩提嫁在多信裸形外道的滿富城焚香請佛佛與大弟子們都乘空而去這是東方邊地的分那婆陀那錫蘭與東方邊地智論雖沒有説但同是佛法擴展而引起的傳説智論作者重於南北印佛教而北方的佛教盛行傳説也就更多了第六節南天竺與北天竺本生譬喻因緣在大正藏是集為本緣部的這些都是傳説中的故事如用為教化的例證意義是大致相通的從地理暨歷史背景説到藏外資料推論智論作者為西北印度的學者理由是作者自然會偏好採用其所在地區之傳説故事這種推論與事實是大有出入的此下從五方面分析一本生等是一切部派所共有的有部以外大抵編在雜藏南傳名為小部編入經藏二列舉智論的十事都是本生以西元七世紀玄奘的大唐西域記及西元五世紀法顯之所巡歷為證認為這是烏仗那一帶的北印度然而我們也可以引用西元三世紀康僧會所出的六度集經支謙所出的撰集百緣經西元五世紀初鳩摩羅什所譯的大莊嚴論經曇學等經于闐聽來而集成的賢愚經等來證明不是北印度的智論的十事中四獨角仙人事智論卷一七説波羅㮈國山中有仙人波羅㮈國有淫女明説是中印度的波羅㮈而不是北印度其他九事智論都沒有明説是何處自亦不能判定其必然在北印度五羼提比丘為迦梨王割截身體賢愚經卷二作波羅㮈羼提波梨大正四三五九下六一切施王以身施乞者由乞者交與敵人六度集經卷二作波羅㮈國王名波耶大正三三六上八尸毗王割肉餵鷹大莊嚴論經卷十二作拘尸國王名曰尸毗大正四三二一中撰集百緣經卷四作波羅㮈國有王名曰尸毗大正四二一八中拘尸即迦尸國波羅㮈是迦尸國的大城這是如來初轉法輪處大凡佛陀過去生中的本生譬喻誰也不知在何處起初都是説在波羅㮈的著作智論的時代也還是如此怎能依五或七世紀大乘佛法盛行後北印度的傳説而説西北印度無疑是佛陀本生談之主要舞台呢本生談不但地名不一致人名也是如此像一釋尊前生從燃燈佛授記智論卷三五作須摩提善慧大正二五三一六中四分律卷三一作彌卻雲童子大正二二七八四上七八五中而後漢竺大力共康孟詳譯出的修行本起經卷上則作梵志儒童名無垢光大正三四六一下人名地名都依部派的傳説而不同是不能依法顯玄奘所説為定論的三阿耨達池等在佛教傳布中已成為佛教界公認的事如長阿含經法藏部本卷一八有從阿耨達池流出四河的記録大正一一一六下遠從錫蘭傳來的善見律毗婆沙卷一也説到了阿耨達池大正二四六八上以智論提及喜馬拉雅山之大湖阿那婆達多池即阿耨達池為例説明西北印度之地理在本論中之極大位置這可説是沒有説服力的難道那些提過阿耨達池的經律都與西北印佛教有淵源嗎四又舉智論好引阿育王經暨大莊嚴論經為例證明智論作者較迦膩色迦王相當後出所以他不可能如一般所信是西元一二世紀之人指龍樹然而阿育王經約西元一世紀即已傳出智論引用它那是理所當然而大莊嚴論經近代推定為經部本師鳩摩羅羅陀之譬喻莊嚴鳩摩羅羅陀比龍樹要早一些中論已破斥他的種子説了所以智論引其譬喻莊嚴實不能作為智論非龍樹作之根據五更引智論十四事認為出於大莊嚴論經也多似是而非如第四拘睒彌比丘論諍事出於律部各派律皆有記述第七佛為放牛人説法事出於有部的雜阿含經南傳藏則編入增支部第十一六牙白象十二鹿王十三國王捨身交豫敵國八尸毗王這些本生故事更是各部派所共傳的第三佛化除糞工人尼陀賢愚經卷六大正四三九七上説在舍衛城不在西北印第二弗迦羅城固然在北印但是智論也不是只提北印如其卷八大正二五一一九上即説到南天竺法師説法而斥外道之修行為狂相像這些都證明智論談本生譬喻未必都本諸大莊嚴論經更未必以西北印的流傳故事為主而是普及全印且大多為部派共傳又都流傳在龍樹之前若欲以此諸資料證明智論作者是西北印人而非龍樹那是不能成立的智論作者是曾遊歷北印度的所以他熟悉北印地區一再提到大月氏與罽賓卷九説到大月氏西佛肉髻住處國有人得癩風病求遍吉普賢菩薩而病愈事大正二五一二六下卷一一説到弗迦羅城的畫師大正二五一四一下但他決不是只説北印度事的如智論卷三大正二五七六下七七上説如漚祇尼大城富樓那跋檀大城阿藍車多羅大城弗迦羅婆多大城如是等大城多人豐樂而不住何故多住王舍城按指佛陀多住如下城舍婆提大城波羅奈迦毗羅婆瞻婆婆翅多拘睒鞞鳩樓城等答曰佛雖大慈等及以漚祇尼等諸大城是邊國故不住又彌離車弊惡人多善根未熟故這又是邊國彌離車問題如來不住邊地大城此中漚祇尼即優禪尼屬西南印度富樓那跋檀即分那婆陀那是東印度阿藍車多羅即西域記的堊醯車多羅在恆河上流弗迦羅婆多即西域記的布色羯邏伐底也就是前述弗迦羅城這是北印大月氏的王都説到邊地智論是從多方面敘述的前節説到的弊生地還有南印度的安陀羅呢智論作者我們可以肯定他與南印度有深密的關係般若經有陀羅尼四十二字是一切字根本智論當然也加以解説如卷四八説若聞荼字即知諸法不熱相南天竺荼闍他秦言不熱大正二五四八中若聞他字即知諸法無住處南天竺他那秦言處大正二五四九上若聞拏字即知一切法及衆生不來不去不坐不臥不立不起衆生空法空故南天竺拏秦言不大正二五四九上四十二字母是南印度古代的一種字母為南方傳出的般若經華嚴經所引用入法界品的遍友童子也唱説這四十二字母法藏部的四分律卷一一大正二二六三九上也説字義者二人共誦不前不後阿羅波遮那阿羅波遮那是四十二字母的前五字後來成為文殊的根本咒法藏部的化區起初是在今孟買以北及北面的地方這也是南印度智論對於南方的古字義引用南天竺的方言來解説這不是西域人或北印度人所能做到的唯其作者與南印度有關才能以方言來解説南印度古代傳來的字母所以以為智論作者偏好採用西北印資料是西北印人與事實大有出入所引藏外資料固不局限於西北印而普及全印所引四十二字母更是南印文化的産物如果我們不能找到強有力的證據推翻古來的傳記則智論作者是案達羅王朝時南印度人龍樹之説應豫以信賴第七節大智度論與大乘經論龍樹的十住毗婆沙論也是鳩摩羅什所譯出的共十七卷此論是十地經偈頌的解釋只譯出初地與二地如果全部譯出那也是一部大論平川彰的關於十住毗婆沙論之著者一文提出十住論與智論的五種異義以此而對兩論是同一作者保持存疑的態度如一智論卷三三説十二部經大正二五三六下而十住論卷九説九部經法大正二六六九中二智論卷一大正二五六一上不同意不可説法藏而十住論卷一大正二六七五中及卷一五大正二六一七下卻取不可説法三智論卷一三在家五戒可以部分受持大正二五一五八下而十住論卷七卻説在家應堅住五戒大正二六五六中四智論卷一三的過中不食在八戒以外大正二五一五九中下而十住論卷八卻把非時食列為第八大正二六六上中五智論卷四六以十善為總相戒大正二五三九五中卷一三別説在家出家戒法大正二五一六下一六一下而十住論卷一四但以十善戒明三乘戒大正二六九七中一中這些異義應從智論思想的特色去了解智論是可以含容不同説法的而不是非此不可如阿毗曇門空門𮔢勒門偏執了就會多生諍論如得般若則入三種法門無所礙此如前所述所以智論每有多樣性的思想如五道與六道智論是同意六道的卻又處處説五道如第一結集取説一切有部的三藏説卻又説四藏與雜藏結集三藏是依十誦律説而結集緣起卻依根本説一切有部毗奈耶雜事説而卷二所謂千人參加結集大正二五六七下還不知是採取哪一部派的呢十二部經中的優陀那智論説是無問自説義大正二五三七上但智論卷三三大正二五三七中又説抄集要偈作無常品作婆羅門品亦名優陀那這是説一切有部的用法有部一般是稱法句為法優陀那法集要頌的然而在智論中又一再的引用法句如卷一大正二五五九下等這豈祇是智論十住毗婆沙論也有這種前後不統一的情形如卷一五明明説了九部經的名字又説諸佛所教法所謂十二部經大正二六一六上智論破犢子部的不可説法藏又一再引用不可説法這些上來都已説到此處不勞重贅然則平川彰所述一二兩種異義並不構成兩論作者非同一人之論證條件第三有關受持五戒的異義依大毗婆沙論卷一二四這是犍陀羅國論師與迦濕彌羅論師也就是有部西方系與主流系之間的不同如大正二七六四五下六四六上説健馱羅國諸論師言唯受三歸及律儀缺減悉成近事迦濕彌羅國諸論師言無有唯受三歸及缺減律儀名為近事第四非時食戒是近住第八支是有部舊説但大毗婆沙論卷二七大正二七六四七中已説到問此有九支何以言八答二合為一故説八支離非時食名為近住離害生等名近住支二合為一是指將離塗飾香鬘離歌舞倡伎合為一支故説八支但是論主已區分八戒的主體近住及支分近住支而突顯離非時食的重要了同為説一切有部的薩婆多毗尼毗婆沙卷一大正二三五八下更是明確説到問曰夫以齋法過中不食乃有九法何故八事得名答曰齋法以過中不食為體以八事助成齋體共相支持名八支齋法是故言八齋不云九也然則第三四之異義只是有部的異解而作者在智論與十住論中所取不同只是造論的不同適應在智論作者含容異説的特色下這不是什麼嚴重的對立第五十善為總相戒是兩論所同論義不同只是解説的經文不同而已智論解釋的是般若經是須菩提舍利弗及釋尊等説的是大乘而又通教三乘的所以不能不説到在家與出家的多種律儀進而説菩薩十善尸羅波羅蜜的殊勝而十住毗婆沙論所解釋的是十住經是但為菩薩説的菩薩不一定是人不一定在佛世不一定有律儀戒所以重在用心的差別以此説明人天的十善行二乘的十善行與菩薩不共的十善戒波羅蜜經是應機而不同的釋經之論當然也有差別這不能説是二論矛盾更不能依此産生二論作者容或非一的懷疑其實只要熟悉印度論典則同一作者在不同著作中有不同意見也不足為奇智論引用了龍樹中論偈有的標明出處有的直引偈文而未明出處智論也引用了提婆的四百論漢譯為廣百論如卷一之非二安隱門偈大正二五六四中卷二六之若了知無我偈大正二五二五四上都出自四百論的破見品這一點已為丹麥兩位學者與所發現至於羅睺羅所作的讚般若波羅蜜偈智論卷一八更是長篇加以引述大正二五一九中一九一上提婆是龍樹的弟子羅睺羅是龍樹的再傳弟子如果智論是龍樹所造他會引用弟子與再傳弟子的作品嗎在的想法以此應可證明智論作者應出於初期中觀論者之後而且不可能是撰寫中觀論頌的龍樹但在佛教中師長與弟子間的年齡差距有時未必很大而龍樹又年壽極長約生活於西元一五二五年間所以引用弟子與再傳弟子的作品當然是可能的這一點日本學者宇井伯壽與干潟龍祥也認為龍樹有引用弟子及再傳弟子著作的可能如加藤純章大智度論的世界所説列舉智論所引三十三種大乘經也有值得商榷的地方如第二十九寶幢分認為智論卷二八引稱寶頂經大正二五二六六下是大集經的寶幢分其實智論引寶頂經説以明菩薩勝於聲聞這是原始的寶積經編入大寶積經第四十三會的普明菩薩會而不是大集經中的寶幢分此外十住毗婆沙論卷一七所説的寶頂經迦葉品大正二六一一八下也是寶積經的一分第三十二智論卷六所引文殊師利本緣大正二五一七上一八上不知原文出處其實這是諸法無行經末段文殊菩薩過去生中謗法的因緣此外智論説到大悲經雲經方便經等但有經名而就分別推定為十五大哀經三寶雲經二三慧上菩薩問大善權經智論只説到經名沒有説到內容這是很難斷定他是什麼經的附帶説明一點二十八大方等無想經曇無讖譯智論數數引到經中已説到佛性常樂我淨而有如來藏思想如果智論是龍樹所造有可能會引用到這部真常思想的經典嗎可能的初期的如來藏説依其經文所説可證明是興起於南印度而與一切世間樂見比丘有關這一點大法鼓經與大雲經即大方等無想經所説大同這位弘傳真常法門的比丘生於南印之娑多婆訶那案達羅王朝時代案達羅王朝亡於西元二三六年頃所以這位持法比丘不能遲於西元二世紀末而經典的集成則可能在西元三世紀間多羅那他的印度佛教史説南方阿闍梨龍叫與提婆同時也是龍樹的弟子是唯識中道義的唱道者多氏為西藏覺囊巴派是真常唯心論者在西藏真常唯心是依附唯識見的然則説真常我之大雲經的主人與提婆同時大雲經是有可能為龍樹所提及的沒有提到他的思想綜上所述可明白智論與十住毗婆沙論之作者同是龍樹應屬無誤智論雖引用若干大乘經乃至其弟子提婆與再傳弟子羅睺羅之文字片段時代皆不會晚於龍樹若以此而推論智論非龍樹造為證不成第八節大智度論的作者龍樹龍樹的傳記有一西元五世紀初鳩摩羅什傳出的龍樹菩薩傳二西元十七世紀西藏多羅那他的印度佛教史三西元千年後印度傳出的八十四大成就者傳龍樹是其中第二位已被祕密佛教化了多羅那他所説也有些祕密化他説龍樹曾在那爛陀寺弘法這是不足採信的因為那爛陀寺是西元四五世紀間鑠迦羅阿迭多帝日王開始經六代增建而完成的大學府時代顯然晚於龍樹龍樹怎麼可能會在這裡弘法呢羅什所傳的龍樹菩薩傳雖有離奇傳説但其離龍樹去世始過百歲比較其他傳記還是接近事實些故今依龍樹菩薩傳大正五一八四上一八五中略述如左一龍樹是南天竺梵志種天聰奇悟幼年就誦四吠陀及天文等世間學問所以弱冠二十歲已馳名當世了二也許是少年驕逸所以與友人求得隱形術潛入王宮去淫亂被發覺了僥幸的免於一死三龍樹這才悟到欲為苦本於是入山詣一佛寺塔出家受戒傳中沒有説到他從哪一個部派在哪裡出家從智論及本傳下述其下雪山讀大乘經一事而論他極可能是在北印度的説一切有部出家的四進一步他入雪山山中有塔塔中有一老比丘以摩訶衍經典與之這才進修大乘法門雪山在大乘時代指蔥嶺西南的興都庫斯山脈龍樹周遊諸國更求餘經使外道論師沙門義宗咸皆摧伏可説是大論師了五當時出家的大乘行者都是依傳統的聲聞部派出家的龍樹有立師教戒更造衣服脫離傳統的佛教而別立出家菩薩僧團的理想可能是為了避免諍執或被指為背叛佛教所以這一理想始終沒有實現六大龍菩薩接龍樹到龍宮以諸方等深奧經典無量妙法授之龍樹這才達到七地深入無生二忍具足的深悟有關龍樹入龍宮取經一事道安西元三八五年前的西域志已經説到了龍樹入龍宮應有事實成分地點在東南印的烏荼國即今奧里薩這裡在大海邊傳説是婆樓那龍王往來的地方這裡有神奇的塔傳説是龍樹從龍宮取來的這裡也是入法界品善財童子的故鄉有古塔廟所以龍樹從龍宮得大乘經的傳説我們不妨解説成龍樹在烏荼國的龍王祠廟中得大乘經七龍樹出龍宮後在南天竺大弘佛法也可能到處去弘法因為西域志就説到龍樹在波羅奈弘法建塔而玄奘則傳説龍樹受到案達羅王的護持晚年住南憍薩羅國都西南的黑峰山八去此世已來至今始過百歲南天竺諸國為其立廟敬奉如佛龍樹菩薩傳不是鳩摩羅什以後的人寫的更不是從付法藏因緣傳中節録出來的他的學生僧睿在大智釋論序中就已説到馬鳴與龍樹他説龍樹寄迹凡夫示悟物以漸又假照龍宮以朗搜玄之慧天竺諸國為之立廟宗之若佛傳而稱之不亦宜乎他在大智論記提到智論是在弘始七年十二月二十七日譯畢的而曇影的中論序也説到時有大士厥號龍樹爰託海宮逮無生忍中論譯出於弘始十一年譯在智論之後另有僧肇注維摩詰經説龍樹與外道論議阿修羅身首從空墜落也見於龍樹菩薩傳維摩詰經是在弘始八年譯出來的以上數例所述皆與龍樹菩薩傳同特別是僧睿序説傳而序之不亦宜乎然則馬鳴傳與龍樹菩薩傳在羅什譯經期間早已存在了但這不可能是羅什譯出的所以早期經録中缺這應該是羅什在西域時從須利耶蘇摩處聽來的事迹他到長安譯經時説出這些事迹而由弟子記録成傳這樣推算起來羅什在前秦建元十八年西年三八二年離開龜茲而向東方則傳説龍樹事迹一定流傳在此之前如果是從須利耶蘇摩處得來那還要比羅什入秦早二十多年西元三六二年之前那時傳説龍樹去世以來始過百歲所以或可推定龍樹生於西元一五二五這是一位很長壽的論師龍樹的著作我從傳記中認為可分前後二期前期是在北印度學聲聞三藏更學大乘然後周遊諸國更求餘經使外道論師沙門義宗咸皆摧伏那時的著作如中論回諍論廣破論等重在遮破外道及聲聞行者即沙門義宗的執著而開顯聲聞與菩薩的不二深觀質同而量異如毛孔空與太虛空也許龍樹評破聲聞與外道的執著所以一般誤會龍樹別立大乘出家僧團的本意説他驕慢後期是在烏荼國得到華嚴的不可思議解脫經等這以後他著大智度論十住毗婆沙論等是依不二深觀而明菩薩的廣大行前者重在論破後者重在釋經立破繁簡皆有不同當然文體也不可能一致以為這位龍樹菩薩傳中的主角是一位具有崇高理想的冒險家與那位撰寫中觀論頌之敏鋭且嚴厲之邏輯學者或是著作智論的博學之百科全書編者並不相當其實偉大的天才型論師那裡會像現代的專才局限在某一種模式之中呢他的性格並有沉潛與高明的異質性他的文采兼有剛健而淵博的多樣性所以不能説中論作者龍樹不可能是智論的作者的從印度傳入西藏的中觀派如佛護清辨月稱等都不知道有大智度論這成為近代學者懷疑智論是龍樹所造的理由之一其實大部的十住毗婆沙論也是印度後學所不知的我以為這是由於龍樹學衰落的關係即使在中國也不知羅睺羅以後的傳人以及龍樹後學的著作在西藏多羅那他的印度佛教史中説到世親的時代西元四五世紀間中印的僧護傳中論等給從南印度來中印受學的佛護與清辨至此龍樹學漸漸興盛起來被稱為中觀派那麼僧護以前呢據多氏説僧護從龍友處學來龍友從羅睺羅密多羅學羅睺羅密多羅從羅睺羅跋陀羅學然而從羅睺羅跋陀羅到西元四五世紀之間羅睺羅密多羅與龍友沒有事迹沒有著作也不為中國佛教界所知長達一個世紀的時期龍樹學顯然是衰落了西元三世紀起真常的如來藏説在南方興起又傳入北方北方因經部師大盛加上如來藏説的啓發而有大乘瑜伽行派的唯識思想興起經部與唯識向中印度宏傳開來好在智論學從烏仗那而流入斫句迦又從斫句迦的莎車王子而傳與羅什但是由於龍樹學在印度中衰又加以地區的距離這是後期中觀者不知有智論的主要原因吧最後要談到論文增刪的問題干潟龍祥仔細考察智論而認為其中有羅什之言或對中國人説明漢語的部分這已在前面説過印度的經論原文每因傳人而有所增減有所修改如同樣的中論各本的品名每有不同觀法品第十七或改作觀我品也有改作觀我法品的偈頌數目也有出入又如趙宋紹德等譯的佛説大乘隨轉宣説諸法經是羅什所譯諸法無行經的異譯而思想幾乎恰好相反所以智論在西方的長期流行中或不免有加一段刪幾句的情形然而沒有其他版本可作比較也就無從決定但這決非等於鳩摩羅什所加筆總之鳩摩羅什所譯的大智度論雖譯文不盡完美但不能不説是龍樹菩薩所造的昭慧記録八十年八月七日完稿參考資料龍樹造鳩摩羅什譯大智度論大正藏第二五册龍樹造鳩摩羅什譯十住毗婆沙論大正藏第二六册雜阿含經大正藏第二册增一阿含經大正藏第二册本緣部大正藏第三四册玄奘譯大般若波羅蜜多經大正藏第五七册大法鼓經大正藏第九册大寶積經大正藏第十一册大方等無想經大正藏第十二册諸法無行經大正藏第十五册彌沙塞部和醯五分律大正藏第二二册摩訶僧祇律大正藏第二二册四分律大正藏第二二册十誦律大正藏第二三册根本説一切有部毗奈耶大正藏第二三二四册根本薩婆多部律攝大正藏第二四册鼻奈耶大正藏第二四册毗尼母經大正藏第二四册阿毗達磨品類足論大正藏第二六册阿毗達磨法蘊足論大正藏第二六册阿毗曇八犍度論大正藏第二六册阿毗達磨發智論大正藏第二六册阿毗達磨大毗婆沙論大正藏第二七册四阿鋡暮抄解大正藏第二五册龍樹造鳩摩羅什譯中論大正藏第三册提婆造鳩摩羅什譯百論大正藏第三册那先比丘經大正藏第三二册四諦論大正藏第三二册吉藏撰金剛般若經疏大正藏第三二册智顗説灌頂記妙法蓮華經文句大正藏第三四册湛然述法華文句記大正藏第三四册吉藏撰三論玄義大正藏第四四册異部宗輪論大正藏第四九册費長房撰歷代三寶記大正藏第四九册阿育王傳大正藏第五册鳩摩羅什譯龍樹菩薩傳大正藏第五册慧皎撰高僧傳大正藏第五册法顯記高僧法顯傳大正藏第五一册玄奘述辨機撰大唐西域記大正藏第五一册楊衒之撰洛陽伽藍記大正藏第五一册道世集法苑珠林大正藏第五三册僧祐編撰出三藏記集大正藏第五五册論事南傳大藏經第五八册島史南傳大藏經第六册覺音撰清淨道論中華佛教文獻百科基金會多羅那他著寺本婉雅譯印度佛教史著郭忠生譯大智度論之作者及其翻譯諦觀雜志第六二期干潟龍祥著大智度論作者印度學佛教學研究七卷一號平川彰著十住毗婆沙論著者印度學佛教學研究五卷二號加藤純章著宏音譯大智度論的世界諦觀雜志第五二期印順著説一切有部為主的論書與論師之研究正聞出版社印順著初期大乘佛教之起源與開展正聞出版社印順著如來藏之研究正聞出版社印順著印度佛教思想史正聞出版社印順著佛教史地考論正聞出版社尊重古説抉擇新論印公老人新著撰述緣起釋昭慧今年暑假在上印下順導師住錫的永光別苑中筆者代老人整理了長約六萬字的論文大智度論之作者及其翻譯本文之作算是對近世學界質疑大智度論作者問題的一個總回應尊重古説反對現代學者的看法大智度論以下簡稱智論的作者向來傳説是龍樹但是近代學者如比利時的日本的干潟龍祥平川彰和加藤純章對此定論或則否定或則修正否定者如認為智論並非龍樹所作而係某一西北印度説一切有部而轉學大乘之學者所造修正者如干潟龍祥雖仍肯定智論為龍樹所造但是以為鳩摩羅什在漢譯過程中已有所增修加藤純章甚至認為作者不但不是龍樹而且可能來過西域在此完成羅什也參與此一著作和加藤純章的相關作品分別由郭忠生和許洋主筆名宏音二位居士翻譯並刊譯文於諦觀雜志之中導師在去年八月間才透過譯文而得悉其詳我幾次到華雨精舍請安他都向我提起此事表示他不同意其中論點末了老人總是喟然歎道可惜我老了寫不動了我靜靜聆聽著但竟然未曾意會自己可以代勞完成老人的寫作心願直到今年四月下旬老人到福嚴精舍避壽我去教課時得暇到他書房坐坐他又一次提及此事而感歎起來我忽然感悟這原是弟子所應效力完成的工作我怎能聽完了事呢於是也顧不得自己時間及能力有限的問題自告奮勇地把整理論文一事承當下來但表示五六月間教學忙碌無法立刻著手進行此一專篇的寫作待六月底後教學告一段落再到老人跟前住一段時日把論文完成老人聞之欣然我從他寬慰的神情中想到他不但是學尚自由不強人以從己就連宏法心願寫作計畫也都默默地一人承挑即使對弟子門生也不習慣開口指使以分派工作這樣尊重他人意願而不帶一毫強迫性格的長老座下的人無論是心靈的創意或是行動的取向都是極為自由的只是許多時候他必然苦了自己像此次寫作論文一事緣於我的遲鈍竟讓老人懸念數月遺憾自己未能盡中國佛弟子應盡的一份責任如果我始終遲鈍到底未能及時感悟承當老人也卒為衰病所纍而不能完成心願那豈不是當面錯過而留下中國佛教永遠的遺憾嗎六月草七日開始在導師的書房連續五天由老人提供資料講述意見我逐段整理再呈老人過目七月二日以後不得不中輟趕赴一連串夏令營的佛學課程八月初又開始在嘉義彌陀寺講述聲聞律之理論與實踐半個月八月五日至八日終於把論文完成敬託慧理法師送呈導師十五日授課畢我再到永光別苑請導師指正並於十六日寫完論文提要四千字時間是拖了一個半月但實際寫作只有十天左右在寫作的過程中深受導師明聖法師及其他住衆師父護念無諸瑣事煩心寫作將近完成階段又有學生悟殷海青維融三師為我查對出處及梵文我向導師笑稱這是老中青三代通力合作的成品親因緣是導師的智慧和學術功力我們只是增上緣罷了六月底滿山荔枝成熟空氣中瀰漫著花果的清香我沈浸在法喜之中分享老人智慧的果實忽然想到老人畢生遊心法海多少精湛獨到的見解都因文字及書籍發行的局限而罕為國外學者所悉此次撰著既是評論學界所説必然引起學界的注意和討論所以理應將資訊送達國際學術機構我是東方宗教研討會簡稱東宗的會員此一學會成員為國內各宗教研究之學者定期發行學報分送國際學術機構本期學報若能刊載導師近著則不但是東宗的光榮也將有利於資訊的傳布於是在徵得老人同意後電詢會長吳武夫先生的意見吳先生果然歡喜踴躍不但要將它刊在學報而且願由他出資成立的東宗出版社找人譯為日文英文然後發行中文日譯及英譯版書册推廣到國際學界本來我已應允在今年九月下旬的東宗年會中發表一篇有關聲聞律的論文臨時吳會長決定我的論文改在八月下旬的月會期間發表年會中由我代為宣讀導師的這篇近著這篇論文終於在九月草二日下午三時發表而且引起在座宗教學者之重視郭忠生和周伯戡兩位先生也在討論過程中提出寶貴的意見此外刻在日本深造的厚觀慧璉二位法師願意在日本找人日譯郭忠生居士也願將文中所有梵文名相再作一次查對以免拼寫錯誤有這麼多的因緣和合不敢説能盡善盡美但總算是大家分工合作盡中國佛弟子應盡的一份責任而報答印公導師哺育法乳之深恩於萬一尊重古説絶對不是由於情感上的偏執否定學者之新觀點也不挾雜非理性的因素這由印公導師在論文中凡有所立必有所據的嚴謹陳述可以看出特別是智論廣本千卷之説雖然也是古傳但是導師也一樣指出它的錯誤傳統佛教面臨現代佛教學的治學成果往往不是一味排斥就是全盤接受這都挾雜了情感與非理性的因素如何在傳統與現代中抉擇去取這要以理性態度審慎處理去取如何可以得當這就要有對佛法深刻體解的圓熟智慧導師的許多著作中都流露出這種不卑不亢而理性抉擇的圓熟智慧大智度論之作者及其翻譯即是一個成功的範例民國八十年九月二十四日于善導別苑
